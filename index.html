<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Culture Générale</title>
<style>
:root {
  --cream: #FFF8F0;
  --cream2: #F0E6D3;
  --border: #E0D0BC;
  --text: #2C2C2C;
  --muted: #888;
  --white: #FFFFFF;
  --shadow: rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; line-height: 1.5; }

/* NAV */
nav { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 8px var(--shadow); }
.logo { font-size: 1.25rem; font-weight: 800; margin-right: 2rem; padding: 1rem 0; }
.nav-btn { padding: 1.1rem 1.2rem; border: none; background: none; cursor: pointer; font-size: 0.95rem; color: var(--muted); border-bottom: 3px solid transparent; transition: all .2s; margin-bottom: -1px; font-weight: 500; }
.nav-btn.active { color: var(--text); font-weight: 700; border-bottom-color: var(--text); }

/* LAYOUT */
#app { padding: 2rem; max-width: 1000px; margin: 0 auto; }
.hidden { display: none !important; }

/* THEMES */
.page-title { font-size: 1.7rem; font-weight: 800; margin-bottom: .4rem; }
.page-sub { color: var(--muted); margin-bottom: 1.5rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 1rem; }
.theme-card { border: none; border-radius: 18px; padding: 1.8rem 1rem; cursor: pointer; font-size: 1rem; font-weight: 700; color: white; display: flex; flex-direction: column; align-items: center; gap: .6rem; transition: transform .18s, box-shadow .18s; box-shadow: 0 4px 15px rgba(0,0,0,.12); text-shadow: 0 1px 3px rgba(0,0,0,.2); }
.theme-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,0,0,.2); }
.theme-card .icon { font-size: 2rem; }

/* PANEL (setup) */
.panel { max-width: 480px; margin: 2rem auto; background: var(--white); border-radius: 20px; padding: 2rem; box-shadow: 0 4px 24px var(--shadow); }
.panel-title { font-size: 1.4rem; font-weight: 800; text-align: center; margin-bottom: .3rem; }
.panel-sub { color: var(--muted); text-align: center; margin-bottom: 1.8rem; font-size: .9rem; }
.form-group { margin-bottom: 1.4rem; }
.form-label { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: .6rem; display: block; }
.toggle-row { display: flex; gap: .5rem; }
.toggle-btn { flex: 1; padding: .7rem .5rem; border: 2px solid var(--border); border-radius: 10px; background: var(--white); cursor: pointer; font-size: .88rem; transition: all .15s; font-weight: 500; }
.toggle-btn.active { background: var(--text); border-color: var(--text); color: white; font-weight: 700; }
.btn-primary { width: 100%; padding: .9rem; background: var(--text); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background .15s; }
.btn-primary:hover { background: #444; }
.btn-back { width: 100%; padding: .7rem; background: none; border: 2px solid var(--border); border-radius: 12px; font-size: .95rem; cursor: pointer; margin-top: .5rem; transition: border-color .15s; font-weight: 500; }
.btn-back:hover { border-color: #999; }

/* QUIZ */
.quiz-wrap { max-width: 650px; margin: 0 auto; }
.quiz-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
.q-label { font-size: .85rem; font-weight: 700; color: var(--muted); white-space: nowrap; }
.prog-track { flex: 1; background: var(--cream2); height: 7px; border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; background: var(--text); transition: width .3s ease; }
.timer-circle { width: 42px; height: 42px; border-radius: 50%; background: var(--cream2); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.1rem; flex-shrink: 0; transition: background .3s; }
.timer-circle.warn { background: #FFF3CD; color: #856404; }
.timer-circle.danger { background: #FDEDEC; color: #C0392B; }
.question-card { background: var(--white); border-radius: 20px; padding: 2rem; box-shadow: 0 3px 20px var(--shadow); }
.q-num { font-size: .8rem; color: var(--muted); font-weight: 600; margin-bottom: .5rem; }
.q-text { font-size: 1.2rem; font-weight: 700; margin-bottom: .4rem; line-height: 1.4; }
.q-hint { font-size: .82rem; color: var(--muted); margin-bottom: 1.3rem; font-style: italic; }
.options { display: flex; flex-direction: column; gap: .6rem; }
.option { display: flex; align-items: center; gap: .75rem; padding: .85rem 1.1rem; border: 2px solid var(--border); border-radius: 12px; cursor: pointer; transition: all .15s; user-select: none; }
.option:hover:not(.locked) { border-color: #bbb; background: var(--cream); }
.option.chosen:not(.locked) { border-color: var(--text); background: #f5f5f5; }
.option.correct { border-color: #27AE60; background: #EAFAF1; }
.option.wrong { border-color: #E74C3C; background: #FDEDEC; }
.option.missed { border-color: #E67E22; background: #FEF9E7; }
.option.locked { cursor: default; }
.opt-box { width: 24px; height: 24px; border: 2px solid #CCC; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; transition: all .15s; }
.option.chosen .opt-box { background: var(--text); border-color: var(--text); color: white; }
.option.correct .opt-box { background: #27AE60; border-color: #27AE60; color: white; }
.option.wrong .opt-box { background: #E74C3C; border-color: #E74C3C; color: white; }
.option.missed .opt-box { background: #E67E22; border-color: #E67E22; color: white; }
.opt-text { font-size: .95rem; }
.validate-btn { margin-top: 1.2rem; }

/* RESULTS */
.res-wrap { max-width: 650px; margin: 0 auto; }
.score-hero { background: var(--white); border-radius: 20px; padding: 2.5rem; text-align: center; box-shadow: 0 3px 20px var(--shadow); margin-bottom: 1.5rem; }
.score-big { font-size: 5rem; font-weight: 900; line-height: 1; }
.score-sub { color: var(--muted); font-size: 1rem; margin-top: .3rem; }
.score-msg { font-size: 1.1rem; font-weight: 600; margin-top: 1rem; }
.recap-title { font-size: 1.05rem; font-weight: 700; margin: 1.5rem 0 .75rem; }
.recap-item { background: var(--white); border-radius: 14px; padding: 1.1rem 1.3rem; margin-bottom: .7rem; box-shadow: 0 2px 8px var(--shadow); border-left: 4px solid; }
.recap-item.ko { border-left-color: #E74C3C; }
.recap-q { font-weight: 600; margin-bottom: .35rem; font-size: .95rem; }
.recap-user { font-size: .83rem; color: var(--muted); }
.recap-ok { font-size: .83rem; color: #27AE60; font-weight: 600; margin-top: .2rem; }
.btn-row { display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap; }
.btn-row .btn-primary { width: auto; padding: .75rem 1.5rem; }
.btn-row .btn-back { width: auto; padding: .75rem 1.5rem; }

/* PROFILE */
.prof-wrap { max-width: 700px; margin: 0 auto; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(145px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.stat-card { background: var(--white); border-radius: 16px; padding: 1.4rem; box-shadow: 0 2px 10px var(--shadow); }
.stat-val { font-size: 2.2rem; font-weight: 900; line-height: 1; }
.stat-val.sm { font-size: 1.1rem; padding-top: .4rem; }
.stat-lbl { color: var(--muted); font-size: .82rem; margin-top: .3rem; }
.radar-card { background: var(--white); border-radius: 16px; padding: 1.5rem; box-shadow: 0 2px 10px var(--shadow); text-align: center; }
.radar-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
canvas { display: block; margin: 0 auto; max-width: 100%; }
.no-data { color: var(--muted); font-style: italic; padding: 2rem; }

@media(max-width:580px){
  #app { padding: 1rem; }
  .grid { grid-template-columns: repeat(2, 1fr); }
  .score-big { font-size: 3.5rem; }
  nav { padding: 0 1rem; }
  .toggle-row { flex-wrap: wrap; }
}
</style>
</head>

<nav>
  <span class="logo">🎓 Culture Générale</span>
  <button class="nav-btn active" id="nav-home" onclick="showPage('home')">Accueil</button>

    </div>

    <!-- RESULTS VIEW -->

    </div>
  </div>

</div>

// ============================================================
// THEME CONFIG
// ============================================================
const THEMES = [
  {name:"Histoire",    icon:"🏛️", grad:"linear-gradient(135deg,#C0392B,#E74C3C)"},
  {name:"Géographie",  icon:"🌍", grad:"linear-gradient(135deg,#27AE60,#2ECC71)"},
  {name:"Sciences",    icon:"🔬", grad:"linear-gradient(135deg,#2980B9,#3498DB)"},
  {name:"Sport",       icon:"⚽", grad:"linear-gradient(135deg,#D35400,#E67E22)"},
  {name:"Cinéma",      icon:"🎬", grad:"linear-gradient(135deg,#8E44AD,#9B59B6)"},
  {name:"Musique",     icon:"🎵", grad:"linear-gradient(135deg,#16A085,#1ABC9C)"},
  {name:"Littérature", icon:"📚", grad:"linear-gradient(135deg,#B7950B,#D4AC0D)"},
  {name:"Peinture",    icon:"🎨", grad:"linear-gradient(135deg,#D81B60,#E91E63)"},
  {name:"Astronomie",  icon:"🌌", grad:"linear-gradient(135deg,#1A237E,#3949AB)"},
  {name:"Politique",   icon:"🗳️", grad:"linear-gradient(135deg,#37474F,#546E7A)"},
];

// ============================================================
// PROFILE (localStorage)
// ============================================================
const PROFILE_KEY = 'quiz-cg-v1';

function loadProfile() {
  try {
    const raw = localStorage.getItem(PROFILE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  const def = { themes: {}, totalGames: 0, totalTime: 0 };
  THEMES.forEach(t => { def.themes[t.name] = { played: 0, correct: 0, total: 0, timeSpent: 0 }; });
  return def;
}

function saveProfile(p) {
  try { localStorage.setItem(PROFILE_KEY, JSON.stringify(p)); } catch(e) {}
}

function ensureThemes(p) {
  THEMES.forEach(t => {
    if (!p.themes[t.name]) p.themes[t.name] = { played: 0, correct: 0, total: 0, timeSpent: 0 };
  });
}

// ============================================================
// STATE
// ============================================================
let G = {
  theme: null, diff: 'Facile', timer: false,
  questions: [], qIdx: 0, selected: [], score: 0,
  results: [], interval: null, timerVal: 15,
  startTime: 0,
};

// ============================================================
// NAVIGATION
// ============================================================
function showPage(page) {
  clearTimer();
  document.getElementById('page-home').classList.toggle('hidden', page !== 'home');
  document.getElementById('page-profile').classList.toggle('hidden', page !== 'profile');
  document.getElementById('nav-home').classList.toggle('active', page === 'home');
  document.getElementById('nav-profile').classList.toggle('active', page === 'profile');
  if (page === 'home') showView('themes');
  if (page === 'profile') renderProfile();
}

function showView(v) {
  ['themes','setup','quiz','results'].forEach(n => {
    document.getElementById('view-'+n).classList.toggle('hidden', n !== v);
  });
}

// ============================================================
// INIT
// ============================================================
function init() {
  const grid = document.getElementById('themes-grid');
  grid.innerHTML = THEMES.map(t =>
    `<button class="theme-card" style="background:${t.grad}" onclick="selectTheme('${t.name}')">
      <span class="icon">${t.icon}</span>
      <span>${t.name}</span>
    </button>`
  ).join('');
}

// ============================================================
// SETUP
// ============================================================
function selectTheme(name) {
  G.theme = name; G.diff = 'Facile'; G.timer = false;
  const th = THEMES.find(t => t.name === name);
  document.getElementById('setup-name').textContent = `${th.icon} ${name}`;
  // reset toggles
  setActive('diff-row', 0);
  setActive('timer-row', 0);
  showView('setup');
}

function setActive(rowId, idx) {
  const btns = document.getElementById(rowId).querySelectorAll('.toggle-btn');
  btns.forEach((b,i) => b.classList.toggle('active', i === idx));
}

function selectDiff(d, btn) {
  G.diff = d;
  const btns = document.getElementById('diff-row').querySelectorAll('.toggle-btn');
  btns.forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function selectTimer(on, btn) {
  G.timer = on;
  const btns = document.getElementById('timer-row').querySelectorAll('.toggle-btn');
  btns.forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ============================================================
// QUIZ START
// ============================================================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  const pool = shuffle([...QUESTIONS[G.theme][G.diff]]);
  G.questions = pool.slice(0, 10);
  G.qIdx = 0; G.score = 0; G.results = []; G.selected = [];
  G.startTime = Date.now();
  showView('quiz');
  renderQ();
}

// ============================================================
// RENDER QUESTION
// ============================================================
function renderQ() {
  const q = G.questions[G.qIdx];
  G.selected = [];

  document.getElementById('q-counter').textContent = `Q ${G.qIdx+1}/10`;
  document.getElementById('prog-fill').style.width = `${G.qIdx * 10}%`;

  const card = document.getElementById('question-card');
  card.innerHTML = `
    <div class="q-num">Question ${G.qIdx+1} sur 10</div>
    <div class="q-text">${q.q}</div>
    <div class="q-hint">Sélectionnez la ou les bonne(s) réponse(s)</div>
    <div class="options">
      ${q.o.map((opt,i) => `
        <div class="option" id="opt${i}" onclick="toggleOpt(${i})">
          <div class="opt-box" id="box${i}"></div>
          <span class="opt-text">${opt}</span>
        </div>`).join('')}
    </div>
    <button class="btn-primary validate-btn" id="val-btn" onclick="validate()">Valider</button>
  `;

  const tel = document.getElementById('timer-el');
  if (G.timer) { tel.classList.remove('hidden'); startTimer(); }
  else { tel.classList.add('hidden'); clearTimer(); }
}

function toggleOpt(i) {
  const el = document.getElementById('opt'+i);
  if (el.classList.contains('locked')) return;
  const box = document.getElementById('box'+i);
  if (G.selected.includes(i)) {
    G.selected = G.selected.filter(x => x !== i);
    el.classList.remove('chosen'); box.textContent = '';
  } else {
    G.selected.push(i);
    el.classList.add('chosen'); box.textContent = '✓';
  }
}

// ============================================================
// VALIDATE
// ============================================================
function validate() {
  clearTimer();
  const q = G.questions[G.qIdx];
  const corr = q.c;
  const allOk = corr.every(c => G.selected.includes(c));
  const noWrong = G.selected.every(s => corr.includes(s));
  const isOk = allOk && noWrong;
  if (isOk) G.score++;

  G.results.push({ ok: isOk, q: q.q, opts: q.o, sel: [...G.selected], corr });

  // Show feedback
  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.add('locked');
    const box = document.getElementById('box'+i);
    if (corr.includes(i) && G.selected.includes(i)) {
      el.classList.remove('chosen'); el.classList.add('correct'); box.textContent = '✓';
    } else if (!corr.includes(i) && G.selected.includes(i)) {
      el.classList.remove('chosen'); el.classList.add('wrong'); box.textContent = '✗';
    } else if (corr.includes(i) && !G.selected.includes(i)) {
      el.classList.add('missed'); box.textContent = '!';
    }
  });

  const btn = document.getElementById('val-btn');
  btn.textContent = G.qIdx < 9 ? 'Question suivante →' : 'Voir les résultats →';
  btn.onclick = nextQ;
}

function nextQ() {
  G.qIdx++;
  if (G.qIdx >= 10) showResults();
  else renderQ();
}

// ============================================================
// TIMER
// ============================================================
function startTimer() {
  G.timerVal = 15;
  const el = document.getElementById('timer-el');
  el.textContent = 15; el.className = 'timer-circle';
  G.interval = setInterval(() => {
    G.timerVal--;
    el.textContent = G.timerVal;
    if (G.timerVal <= 5) el.className = 'timer-circle danger';
    else if (G.timerVal <= 8) el.className = 'timer-circle warn';
    if (G.timerVal <= 0) { clearTimer(); validate(); }
  }, 1000);
}

function clearTimer() {
  if (G.interval) { clearInterval(G.interval); G.interval = null; }
}

// ============================================================
// RESULTS
// ============================================================
function showResults() {
  clearTimer();
  const elapsed = Math.round((Date.now() - G.startTime) / 1000);

  // Update profile
  const p = loadProfile(); ensureThemes(p);
  p.themes[G.theme].played++;
  p.themes[G.theme].correct += G.score;
  p.themes[G.theme].total += 10;
  p.themes[G.theme].timeSpent += elapsed;
  p.totalGames++; p.totalTime += elapsed;
  saveProfile(p);

  const pct = G.score * 10;
  let msg = G.score === 10 ? '🏆 Score parfait ! Félicitations !'
          : G.score >= 8  ? '🌟 Excellent résultat !'
          : G.score >= 6  ? '👍 Très bien !'
          : G.score >= 4  ? '💪 Pas mal, continuez !'
          : '📚 Révisez et réessayez !';

  const wrong = G.results.filter(r => !r.ok);
  const wrongHtml = wrong.length > 0
    ? `<div class="recap-title">❌ Questions manquées (${wrong.length}/${G.results.length})</div>
       ${wrong.map(r => `
        <div class="recap-item ko">
          <div class="recap-q">${r.q}</div>
          <div class="recap-user">Votre réponse : ${r.sel.length ? r.sel.map(i=>r.opts[i]).join(', ') : '(aucune)'}</div>
          <div class="recap-ok">✅ Réponse(s) correcte(s) : ${r.corr.map(i=>r.opts[i]).join(', ')}</div>
        </div>`).join('')}`
    : `<div class="recap-title">✅ Toutes les questions réussies !</div>`;

  document.getElementById('results-content').innerHTML = `
    <div class="score-hero">
      <div class="score-big">${G.score}<span style="font-size:2.5rem;opacity:.4">/10</span></div>
      <div class="score-sub">${G.theme} · ${G.diff}</div>
      <div class="score-msg">${msg}</div>
    </div>
    ${wrongHtml}
    <div class="btn-row">
      <button class="btn-primary" onclick="startQuiz()">🔄 Rejouer</button>
      <button class="btn-back" onclick="showView('themes')">🏠 Accueil</button>
    </div>
  `;
  showView('results');
}

// ============================================================
// PROFILE
// ============================================================
function formatTime(s) {
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
  return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
}

function renderProfile() {
  const p = loadProfile(); ensureThemes(p);
  let gc = 0, gt = 0, favName = '–', maxP = 0;
  THEMES.forEach(t => {
    const td = p.themes[t.name];
    gc += td.correct; gt += td.total;
    if (td.played > maxP) { maxP = td.played; favName = t.icon + ' ' + t.name; }
  });
  const rate = gt > 0 ? Math.round(gc / gt * 100) : 0;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-val">${p.totalGames}</div>
      <div class="stat-lbl">Parties jouées</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${rate}%</div>
      <div class="stat-lbl">Taux de réussite global</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${formatTime(p.totalTime)}</div>
      <div class="stat-lbl">Temps total passé</div>
    </div>
    <div class="stat-card">
      <div class="stat-val sm">${maxP > 0 ? favName : '–'}</div>
      <div class="stat-lbl">Thématique préférée</div>
    </div>
  `;
  drawRadar(p);
}

function drawRadar(p) {
  const canvas = document.getElementById('radar-canvas');
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const n = THEMES.length;
  const r = Math.min(W, H) * 0.3;
  const labelR = r + 42;
  const step = (2 * Math.PI) / n;

  const data = THEMES.map(t => {
    const td = p.themes[t.name];
    return td.total > 0 ? td.correct / td.total : 0;
  });

  // Grid
  for (let lv = 1; lv <= 5; lv++) {
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const a = i * step - Math.PI / 2;
      const x = cx + (r * lv / 5) * Math.cos(a);
      const y = cy + (r * lv / 5) * Math.sin(a);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = '#E0D0BC'; ctx.lineWidth = 1; ctx.stroke();
  }

  // Axes
  for (let i = 0; i < n; i++) {
    const a = i * step - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
    ctx.strokeStyle = '#E0D0BC'; ctx.lineWidth = 1; ctx.stroke();
  }

  // Data polygon
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const a = i * step - Math.PI / 2;
    const x = cx + r * data[i] * Math.cos(a);
    const y = cy + r * data[i] * Math.sin(a);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(44,44,44,0.12)'; ctx.fill();
  ctx.strokeStyle = '#2C2C2C'; ctx.lineWidth = 2.5; ctx.stroke();

  // Dots
  for (let i = 0; i < n; i++) {
    const a = i * step - Math.PI / 2;
    const x = cx + r * data[i] * Math.cos(a);
    const y = cy + r * data[i] * Math.sin(a);
    ctx.beginPath(); ctx.arc(x, y, 4, 0, 2*Math.PI);
    ctx.fillStyle = '#2C2C2C'; ctx.fill();
  }

  // Labels
  for (let i = 0; i < n; i++) {
    const a = i * step - Math.PI / 2;
    const lx = cx + labelR * Math.cos(a);
    const ly = cy + labelR * Math.sin(a);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#2C2C2C'; ctx.font = 'bold 13px "Segoe UI", sans-serif';
    ctx.fillText(THEMES[i].icon + ' ' + THEMES[i].name, lx, ly);
    ctx.fillStyle = '#888'; ctx.font = '11px "Segoe UI", sans-serif';
    const pct = p.themes[THEMES[i].name].total > 0
      ? Math.round(p.themes[THEMES[i].name].correct / p.themes[THEMES[i].name].total * 100) : 0;
    ctx.fillText(pct + '%', lx, ly + 17);
  }
}
