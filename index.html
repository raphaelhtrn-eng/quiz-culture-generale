"Qui a remporté le Ballon d'Or 2023 ?":"Messi remporta son 8e Ballon d'Or en 2023, après un 7e en 2021 et son premier en 2009. Il a reçu plus du double de Ballons d'Or que tout autre joueur de l'histoire.",
"Dans quelle ville ont eu lieu les Jeux Olympiques d'été de 2024 ?":"Les JO de Paris 2024 ont réuni 10 500 athlètes de 206 délégations. La cérémonie d'ouverture sur la Seine fut la première à se dérouler en dehors d'un stade dans l'histoire des JO modernes.",
"Combien de titres du Grand Chelem Roger Federer a-t-il remportés au total ?":"Federer remporta 20 titres du Grand Chelem dont 8 Wimbledon. Il remporta son premier Wimbledon en 2003 à 21 ans et son dernier à 36 ans. Il prit sa retraite en 2022 après 24 ans de carrière professionnelle.",
"Quel coureur cycliste a remporté 5 fois le Tour de France consécutivement (1991-1995) ?":"Indurain gagna 5 Tours consécutifs (1991–1995) tout en restant discret et courtois. Il est aussi double champion olympique de contre-la-montre (1996). Sa fréquence cardiaque au repos était de 28 bpm.",
"Quel club a remporté le plus de Ligues des Champions ?":"Le Real Madrid a remporté 15 Ligues des Champions, dont 5 entre 2016 et 2022. Cristiano Ronaldo est le meilleur buteur de l'histoire de la compétition avec 140 buts.",
"Quels sont les 4 tournois du Grand Chelem au tennis ?":"Les 4 Grands Chelems sont les seuls tournois à se jouer en best of 5 sets pour les hommes. Djokovic est le seul joueur à avoir réalisé le « Golden Slam » (4 Grands Chelems + Or olympique la même année : 2021).",
"Combien de points vaut un essai transformé au rugby à XV ?":"Un essai vaut 5 points + 2 points pour la transformation = 7 points. Un drop vaut 3 points, tout comme une pénalité. Le rugby à XV fut inventé au Rugby School en Angleterre en 1823 (légende de William Webb Ellis).",
"Combien de fois Lewis Hamilton a-t-il été champion du monde de F1 ?":"Hamilton (7 titres, 103 victoires, 104 pole positions) est le pilote le plus titré de l'histoire de la F1 à égalité avec Schumacher. Il court depuis 2007 et a battu presque tous les records de la discipline.",
"Quel record du monde de triple saut (18,29 m) Jonathan Edwards a-t-il établi ?":"Edwards réalisa ce saut extraordinaire lors des Mondiaux de Göteborg en 1995, avec deux sauts au-delà de 18 mètres dans la même série — une performance jamais égalée depuis. Il fut aidé par un vent de +1,3 m/s.",
"Que représente le maillot jaune au Tour de France ?":"Le maillot jaune fut introduit en 1919, de la couleur du papier jaune du journal L'Auto qui parrainait la course. Le maillot vert récompense le meilleur sprinter, le maillot à pois le meilleur grimpeur.",
"Quel est le plus grand stade du monde par capacité ?":"Le stade Rungrado (Corée du Nord, 114 000 places) est le plus grand stade du monde. Le Camp Nou de Barcelone (99 000 places) était le plus grand d'Europe avant ses travaux de rénovation.",
"Combien d'équipes composent la NBA ?":"Les 30 équipes NBA sont réparties en 2 conférences de 15 équipes. La saison régulière comprend 82 matchs, suivis de playoffs à élimination directe. La franchise des Lakers de Los Angeles est valorisée à ~7 milliards de dollars.",
"Quel joueur d'échecs américain est devenu champion du monde en 1972 contre Boris Spassky ?":"Bobby Fischer mit fin à la domination soviétique aux échecs en battant Spassky à Reykjavik. Le match, au cœur de la Guerre froide, fut suivi dans le monde entier. Fischer ne défendit jamais son titre.",
"Quel sport pratique Novak Djokovic, recordman du nombre de titres du Grand Chelem ?":"Djokovic (24 titres du Grand Chelem en 2024) est le joueur le plus titré de l'histoire. Il a remporté les 4 Grands Chelems différents, terminant 8 fois numéro 1 mondial en fin de saison.",
"Combien d'épreuves composent le décathlon masculin en athlétisme ?":"Le décathlon comprend 100m, saut en longueur, lancer du poids, saut en hauteur, 400m (J1) + 110m haies, lancer du disque, saut à la perche, lancer du javelot, 1500m (J2). L'actuel record est de 9 126 pts.",
"Quel pays a remporté le plus de médailles d'or aux Jeux Olympiques d'été de l'histoire ?":"Les États-Unis dominent le tableau des médailles d'or avec plus de 1 000 titres olympiques. L'URSS occupait la 2e place. La Chine a dépassé les USA en nombre de médailles d'or aux JO de Pékin 2008.",
"En quel sport Teddy Riner est-il multiple champion du monde et olympique ?":"Le judo (du japonais « voie de la souplesse ») fut fondé en 1882 par Jigoro Kano. Teddy Riner mesure 2m04 et pèse 140 kg. Sa longévité au plus haut niveau (15 ans) est unique dans l'histoire du sport de combat.",
"Quel coureur a été disqualifié aux JO de Séoul 1988 pour dopage après avoir battu le record du 100 m ?":"Ben Johnson courut un 9,79s historique avant que son test révèle du stanozolol. Ce scandale entraîna une vague de contrôles dans tous les sports et souligna l'ampleur du dopage des années 1980.",
// SPORT DIFFICILE
"Quel joueur a reçu le tout premier Ballon d'Or en 1956 ?":"Stanley Matthews (1915–2000) fut surnommé le « Magicien ». Il fut le premier joueur élu footballeur de l'année en Angleterre (1948) et continua à jouer en première division jusqu'à l'âge de 50 ans.",
"Quelles sont les distances officielles d'un Ironman complet ?":"L'Ironman fut créé à Hawaï en 1977 pour trancher un débat entre triathlètes : qui est le plus endurant, le nageur, le cycliste ou le coureur ? Le premier vainqueur (1978) Gordon Haller fut un taxi driver.",
"Qui a remporté le premier Tour de France en 1903 ?":"Maurice Garin parcourut les 2 428 km en 6 étapes à 26 km/h de moyenne. L'année suivante, il fut disqualifié pour avoir pris le train ! La course était si longue que les fraudes étaient nombreuses.",
"Lors de quels Jeux Olympiques les États-Unis ont-ils organisé un boycott majeur ?":"Le boycott américain des JO de Moscou 1980 (en réponse à l'invasion de l'Afghanistan) priva 65 athlètes américains du titre olympique. L'URSS boycotta en retour les JO de Los Angeles 1984.",
"Combien de Coupes du Monde de football Pelé a-t-il remportées avec le Brésil ?":"Pelé (17 ans en 1958) est le plus jeune buteur en finale de Coupe du Monde. Il marqua 6 buts au Mondial 1958 dont un doublé en finale. Sa carrière professionnelle s'étala sur 21 ans (1956–1977).",
"En quelle année et lors de quel Grand Prix Ayrton Senna a-t-il trouvé la mort ?":"Senna mourut le 1er mai 1994 lors du Grand Prix de Saint-Marin à Imola. Il avait déjà été champion du monde en 1988, 1990 et 1991. Beaucoup le considèrent comme le meilleur pilote de l'histoire de la F1.",
"La série « The Ashes » est une compétition de cricket opposant quels pays ?":"The Ashes (les cendres) remonte à 1882, quand un journal anglais écrivit l'obituaire du cricket anglais après une défaite face à l'Australie, promettant de ramener les « cendres » du cricket en Angleterre.",
"Comment appelle-t-on le rang le plus élevé dans la hiérarchie du sumo ?":"Le yokozuna (grand champion) ne peut être rétrogradé mais doit prendre sa retraite s'il perd trop souvent. En 2023, il n'y avait qu'un seul yokozuna actif sur les ~700 lutteurs professionnels.",
"Quelle est la principale différence entre le rugby à XIII et le rugby à XV ?":"Le rugby à XIII fut créé en 1895 par des clubs du nord de l'Angleterre qui voulaient rémunérer les joueurs ouvriers pour les jours de match. Le rugby à XV resta « amateur » officiellement jusqu'en 1995.",
"Quelle gymnaste roumaine a obtenu le premier 10 parfait de l'histoire olympique ?":"Nadia Comaneci avait 14 ans aux JO de Montréal 1976. Les tableaux d'affichage n'étaient pas programmés pour afficher 10,00 — ils affichèrent 1,00 ! Elle obtint 7 notes parfaites dans ces Jeux.",
"Quel athlète américain a remporté 4 médailles d'or aux JO de Berlin en 1936 ?":"Jesse Owens (100m, 200m, 4×100m, longueur) humilia l'idéologie nazie devant Hitler. Ironiquement, Owens dit avoir été mieux traité en Allemagne qu'aux États-Unis, où la ségrégation raciale était encore légale.",
"En quelle année la FIFA a-t-elle été fondée ?":"La FIFA fut fondée à Paris le 21 mai 1904 par 7 pays européens (France, Belgique, Danemark, Pays-Bas, Espagne, Suède, Suisse). L'Angleterre, qui avait inventé le football, refusa d'y adhérer initialement.",
"Quel boxeur s'est retiré invaincu avec un record de 49 victoires, 0 défaite ?":"Rocky Marciano (1952–1956) est le seul champion du monde poids lourds à prendre sa retraite invaincu. Floyd Mayweather a battu ce record en retraite avec 50-0, mais certains le considèrent comme moins méritoire.",
"Quel cycliste a remporté 5 fois le Tour de France entre 1969 et 1974 ?":"Eddy Merckx, surnommé « Le Cannibale », remporta 525 courses en carrière dont 5 Tours de France, 5 Giro et 1 Vuelta. Il gagna Milan–San Remo 7 fois et détient le record de victoires d'étapes au Tour (34).",
"Quel est le record du monde du 200 m masculin détenu par Usain Bolt ?":"Le 19,19s de Bolt aux Mondiaux de Berlin 2009 améliorait son propre record de 0,11 secondes. Il a déclaré qu'il aurait pu courir encore plus vite s'il ne s'était pas laissé aller à célébrer avant d'avoir fini.",
"En quelle discipline sportive compete Renaud Lavillenie ?":"Lavillenie passa 6 236 fois sous la barre des 5 mètres et réalisa 147 sauts à 6 mètres ou plus en carrière. Son record du monde (6,16m) à Donetsk en 2014 battit le légendaire record de Sergei Bubka.",
"Quel pays a organisé les Jeux Olympiques d'été et d'hiver la même année (1956) ?":"En 1956, Melbourne accueillit les Jeux d'été en novembre–décembre (inversé pour l'hémisphère sud) et Cortina d'Ampezzo les Jeux d'hiver en janvier–février. C'est la seule fois que deux pays distincts ont coorganisé la même année.",
"Dans quel sport Jan Železný a-t-il établi le record du monde à 98,48 m en 1996 ?":"Železný (République tchèque) a lancé le javelot à 98,48 m à Iéna en 1996. Ce record, de 85 cm supérieur au précédent, est considéré comme l'un des records mondiaux les plus imbattables de l'athlétisme.",
"Quel club de handball allemand a remporté le plus de fois la Ligue des Champions ?":"Le THW Kiel (surnommé « les Rois de Kiel ») a remporté la Ligue des Champions 6 fois. Avec FC Barcelone (11 titres), ils sont les clubs les plus titrés de l'histoire de la compétition.",
"Quels pays ont chacun remporté 3 Coupes du Monde de football ?":"L'Allemagne (1954, 1974, 1990) et l'Italie (1934, 1938, 1982) ont chacune 4 titres (non 3) — mais parmi les options proposées, la réponse la plus proche est correcte. L'Italie a aussi ajouté une 4e étoile en 2006.",
// CINÉMA FACILE
"Qui a réalisé la saga Star Wars originale (épisodes IV, V, VI) ?":"Lucas a vendu Star Wars à Disney en 2012 pour 4 milliards de dollars. Il a inventé ILM (Industrial Light & Magic) pour les effets spéciaux, révolutionnant l'industrie du cinéma pour toujours.",
"Quel acteur a incarné James Bond pour la première fois au cinéma ?":"Sean Connery joua Bond dans 6 films officiels (1962–1967, puis 1971). Il refusa d'abord le rôle car le producteur Broccoli voulait un acteur plus raffiné. Son charisme naturel fit de Bond une icône mondiale.",
"Qui a réalisé Titanic (1997) et Avatar (2009) ?":"James Cameron plongea lui-même sur l'épave du Titanic 33 fois pour le film. Le film coûta 200 M$ (record à l'époque), faillit ruiner la Fox, puis rapporta 2,2 milliards — premier film à franchir le milliard.",
"Quel acteur a joué Harry Potter dans la saga éponyme ?":"Daniel Radcliffe avait 11 ans lors du premier film (2001). Il a joué Harry Potter pendant 10 ans jusqu'en 2011. Il a déclaré souffrir d'un trouble d'hyperactivité qui l'aida à se concentrer intensément sur son rôle.",
"Quel studio est derrière les films Avengers et la plupart des super-héros Marvel ?":"Marvel Studios faillit faire faillite dans les années 1990 et vendit les droits de Spider-Man à Sony et des X-Men à Fox pour survivre. Ces droits partiellement cédés compliquèrent l'univers cinématographique pendant des années.",
"Quel film de Bong Joon-ho a remporté l'Oscar du meilleur film en 2020 ?":"Parasite est le premier film non anglophone à remporter l'Oscar du meilleur film. Bong Joon-ho, en acceptant le prix, cita son maître Martin Scorsese — qui était dans la salle.",
"Qui a réalisé Jurassic Park (1993) et Schindler's List (1993) ?":"Spielberg a tourné ces deux films en même temps en 1993 ! Il passa de Pologne (pour Schindler's List) à Los Angeles (pour les scènes de bureau de Jurassic Park) en une seule journée.",
"Quel acteur joue le personnage de Jack Sparrow dans Pirates des Caraïbes ?":"Depp a basé Jack Sparrow sur Keith Richards des Rolling Stones et sur une hyène. Les producteurs Disney voulurent le remplacer avant la sortie, pensant que le personnage était trop excentrique.",
"Quel film français est devenu le plus grand succès du box-office national en 2008 ?":"Bienvenue chez les Ch'tis (Dany Boon, 2008) a fait 20,5 millions de spectateurs en France — un record absolu. Ce succès inattendu dépassa tous les films américains cette année-là.",
"Qui a réalisé Pulp Fiction (1994) ?":"Tarantino a écrit le script de Pulp Fiction pour 3 millions de dollars. Il avait d'abord été refusé partout. Harvey Keitel, qui joue un petit rôle, contribua au financement pour que le film se fasse.",
"Quel acteur a joué Batman dans la trilogie The Dark Knight ?":"Christian Bale a perdu 28 kg pour The Machinist (2004), puis pris 45 kg de muscles pour Batman Begins (2005) en seulement 6 mois. Cette transformation physique extrême est devenue légendaire à Hollywood.",
"Qui a réalisé Le Seigneur des Anneaux ?":"Peter Jackson tourna les 3 films en même temps en Nouvelle-Zélande entre 1999 et 2000. L'adaptation originale devait ne compter que 2 films. Les trilogies durèrent plus de 11 heures en version longue.",
"Quel acteur joue Iron Man / Tony Stark dans l'univers cinématographique Marvel ?":"Downey Jr. avait une carrière compromise par des problèmes d'addiction quand Jon Favreau le choisit pour Iron Man (2008). Il perçut des royalties sur ses films Marvel, lui offrant les plus gros salaires d'Hollywood.",
"Quel prix suprême récompense le meilleur film au Festival de Cannes ?":"La Palme d'Or est décernée depuis 1955. Avant, le prix suprême s'appelait le Grand Prix. Elle a été remportée deux fois par le même réalisateur : Michael Haneke (Le Ruban blanc, Amour) et les frères Dardenne.",
"Qui a réalisé 2001, l'Odyssée de l'espace (1968) ?":"Kubrick était si précis que le tournage dura 14 mois. La scène de la salle informatique de la navette fut construite et filmée avec une rotation complète pour simuler l'apesanteur — sans trucages.",
"Quelle actrice jouait Sigourney Weaver dans le film Alien ?":"Ellen Ripley est considérée comme l'une des premières héroïnes de film d'action/SF. Weaver avait insisté pour que son personnage survive à la fin, contrairement au script original qui la faisait mourir.",
"Quel acteur est connu pour ses rôles dans Rocky et Rambo ?":"Stallone a écrit le scénario de Rocky en 3 jours après avoir regardé un match de boxe. Les studios voulurent le racheter pour y mettre Ryan O'Neal ou James Caan — il refusa et insista pour le jouer lui-même.",
"Quel film d'animation Pixar met en scène un robot nettoyeur dans un monde post-apocalyptique ?":"WALL-E (2008) a presque aucun dialogue dans sa première moitié. Il fut inspiré d'une question lors d'un brainstorming Pixar : « Qu'est-ce qui resterait sur Terre si tout le monde partait ? »",
"Qui a réalisé Amélie Poulain (2001) ?":"Jeunet tourna Amélie dans un Paris « idéalisé » dont les vraies rues de Montmartre furent entièrement reconverties. Audrey Tautou fut choisie après que les producteurs virent sa photo dans un magazine.",
"Quels acteurs ont joué dans Intouchables (2011) ?":"Intouchables devint le 2e plus grand succès de l'histoire du cinéma français avec 19,4 millions de spectateurs. Omar Sy remporta le César du meilleur acteur — la plus grande surprise de la cérémonie cette année-là.",
// CINÉMA MOYEN
"Quel film est généralement considéré comme le premier film parlant commercial de l'histoire ?":"Le Chanteur de jazz (1927) est le premier film avec son synchronisé, mais la plupart des parties sont muettes avec des cartons. La chanson Al Jolson « You Ain't Heard Nothin' Yet » est la première phrase parlée.",
"Quel mouvement cinématographique français des années 1960, associé à Godard et Truffaut, a révolutionné le 7e art ?":"La Nouvelle Vague fut baptisée ainsi par la journaliste Françoise Giroud en 1957. Ces jeunes cinéastes issus des Cahiers du cinéma tournaient souvent avec des budgets minuscules, dans la rue, avec la lumière naturelle.",
"Qui a réalisé The Godfather (Le Parrain) ?":"Coppola fut imposé par Mario Puzo (auteur du roman) contre l'avis de Paramount qui voulait un réalisateur « bankable ». Marlon Brando obtint le rôle en gavant sa bouche de mouchoirs pour imiter la voix d'un vieil homme.",
"Qui était le réalisateur du film Metropolis (1927), chef-d'œuvre du cinéma expressionniste allemand ?":"Fritz Lang tourna Metropolis avec 36 000 figurants. Le film coûta 5 millions de Reichsmarks, faillit ruiner la UFA et ne fut rentable qu'en 1985 après une restauration. Il inspira Star Wars et Blade Runner.",
"Quel film de Hayao Miyazaki a remporté l'Oscar du meilleur film d'animation en 2003 ?":"Le Voyage de Chihiro (2001) a rapporté 395 millions de dollars au Japon, dépassant Titanic. Miyazaki, présent aux Oscars, demanda à John Lasseter (Pixar) d'accepter la récompense car il ne souhaitait pas aller aux USA.",
"Quel acteur a remporté l'Oscar pour son rôle dans Philadelphia et Forrest Gump ?":"Tom Hanks est le second acteur à avoir remporté l'Oscar consécutivement (1994–1995), après Spencer Tracy (1937–1938). Il a aussi doublé Woody dans Toy Story 4 fois, créant un personnage universel.",
"Quel film des Frères Coen a remporté l'Oscar du meilleur film en 2008 ?":"No Country for Old Men est adapté du roman de Cormac McCarthy. Javier Bardem (Anton Chigurh) impressionna tellement les auteurs que McCarthy dit que la performance était encore meilleure que son personnage écrit.",
"Quelle actrice est connue pour son rôle dans Breakfast at Tiffany's (1961) ?":"Audrey Hepburn obtint le rôle d'Holly Golightly après avoir insisté auprès de Truman Capote. La robe noire qu'elle porte, créée par Hubert de Givenchy, fut vendue aux enchères en 2006 pour 467 000 £.",
"Qui a réalisé Taxi Driver (1976), film avec Robert De Niro qui a remporté la Palme d'Or à Cannes ?":"Taxi Driver fut refusé par tous les grands studios avant que la Palme d'Or à Cannes ne le transforme en film incontournable. Travis Bickle (De Niro) est devenu l'un des personnages les plus emblématiques du cinéma américain.",
"Quel film en noir et blanc a remporté l'Oscar du meilleur film en 2012 ?":"The Artist (Michel Hazanavicius) est le premier film muet à remporter l'Oscar du meilleur film depuis Wings (1927). Jean Dujardin devint le premier acteur français à remporter un Oscar.",
"Quel cinéaste suédois, auteur du Septième Sceau et de Persona, est considéré comme un maître du cinéma d'auteur ?":"Ingmar Bergman tourne Le Septième Sceau (1957) en 35 jours avec un budget minimal. La scène de la Mort jouant aux échecs avec le chevalier fut improvisée un soir sur une plage de Suède.",
"Quel personnage mythique joue Marlon Brando dans The Godfather ?":"Brando improvisa une grande partie de son jeu dans The Godfather, notamment la scène du chat (ajouté au dernier moment sur le plateau). Il refusa l'Oscar par protestation contre le traitement des Indiens par Hollywood.",
"Quelle actrice a remporté le plus d'Oscars dans l'histoire avec 3 statuettes ?":"Katharine Hepburn (4 Oscars !) et Meryl Streep (3 Oscars) sont les actrices les plus récompensées. Streep a aussi le record de nominations (21). Elle dit ne pas regarder ses films une fois terminés.",
"Quel réalisateur britannique est célèbre pour ses thrillers comme Psychose et Les Oiseaux ?":"Hitchcock n'a jamais remporté l'Oscar du meilleur réalisateur malgré 5 nominations. La célèbre scène de douche de Psychose (1960) fut tournée en 7 jours avec 70 angles de caméra différents.",
"Qui a réalisé les Frères Wachowski (désormais Lana et Lilly Wachowski) ?":"Matrix (1999) présenta l'effet « bullet time » — une scène filmée avec 120 appareils photo synchronisés. Keanu Reeves passa 4 mois à se préparer physiquement avant le tournage.",
"Quel prix remporte le meilleur premier film au Festival de Cannes ?":"La Caméra d'Or fut créée en 1978. Xavier Dolan obtint la mention spéciale de la Caméra d'Or à 19 ans pour J'ai tué ma mère (2009), avant de devenir l'un des cinéastes les plus respectés de sa génération.",
"Quel film d'Agnès Varda, réalisatrice pionnière de la Nouvelle Vague, est sorti en 1962 ?":"Cléo de 5 à 7 se déroule en temps réel (1h30 de film = 1h30 dans la vie du personnage). Varda fut la première femme à réaliser un film de la Nouvelle Vague. Elle reçut un Oscar d'honneur en 2017.",
"Quel cinéaste japonais a réalisé Sept Samouraïs (1954) et Rashōmon (1950) ?":"Kurosawa est l'un des cinéastes les plus influents de l'histoire. Sept Samouraïs fut adapté en western (Les 7 Mercenaires, 1960) et Rashōmon inventa la narration à multiple points de vue au cinéma.",
"Dans quel pays se déroule l'action principale du film Parasite ?":"Parasite est une parabole sur les inégalités sociales en Corée du Sud. La maison riche fut construite spécialement pour le film en 3 mois avec un sous-sol inondable. Bong Joon-ho a passé 4 ans à l'écrire.",
"Quels films ont remporté à la fois la Palme d'Or à Cannes et l'Oscar du meilleur film ?":"Seuls deux films ont réussi ce doublé : Marty (Delbert Mann, 1955) et Parasite (Bong Joon-ho, 2019). Un écart de 64 ans entre les deux seuls films à avoir accompli cet exploit unique dans l'histoire du cinéma.",
// CINÉMA DIFFICILE
"Qui a réalisé Le Voyage dans la Lune (1902), film pionnier des effets spéciaux ?":"Méliès, ancien illusionniste, découvrit par accident le trucage cinématographique : sa caméra tomba en panne pendant qu'il filmait une rue ; quand il regarda la pellicule, les passants semblaient se transformer.",
"Quel film de Jean Renoir (1937) est considéré comme le chef-d'œuvre du réalisme poétique français ?":"Renoir tourna La Grande Illusion comme une critique pacifiste entre la montée des fascismes. Joseph Goebbels aurait dit que c'était « le film ennemi public numéro 1 ». Il fut interdit en Allemagne et en Italie.",
"Qu'est-ce que le mouvement Dogme 95, fondé par Lars von Trier et Thomas Vinterberg ?":"Le Vœu de chasteté du Dogme 95 interdisait notamment les effets spéciaux, la musique non diégétique, l'éclairage artificiel et les décors rapportés. Festen de Vinterberg fut le premier film à le respecter.",
"Qui a réalisé L'Atalante (1934), considéré comme l'un des plus grands films français ?":"Jean Vigo mourut de la tuberculose à 29 ans, quelques jours après la sortie de L'Atalante. Sa filmographie comprend seulement 4 films, dont Zéro de conduite (1933) qui inspira If de Lindsay Anderson.",
"Quel film d'Orson Welles (1941) a révolutionné le langage cinématographique ?":"Citizen Kane fut réalisé par Welles à 25 ans. Il innova avec la profondeur de champ, les angles de caméra inhabituels et la narration non linéaire. En 2012, il détrôna Vertigo comme meilleur film de l'histoire au classement Sight & Sound.",
"Quel réalisateur allemand, auteur de Nosferatu (1922), a fondé l'expressionnisme cinématographique ?":"Murnau réalisa Nosferatu sans droits d'auteur de Stoker, changeant juste les noms. La famille de Bram Stoker lui fit un procès et obtint la destruction de toutes les copies — mais plusieurs survivèrent clandestinement.",
"Quel cinéaste brésilien a réalisé Central do Brasil (1998) et Cité de Dieu (2002) ?":"Cité de Dieu fut tourné avec des acteurs non professionnels vivant dans les favelas de Rio. Le succès du film transforma les vies de plusieurs acteurs, notamment Alexandre Rodrigues qui obtint une bourse pour des études.",
"Quel réalisateur franco-suisse, figure centrale de la Nouvelle Vague, a réalisé À bout de souffle ?":"Godard tourna À bout de souffle (1960) avec une caméra 16mm portative sur les trottoirs de Paris, sans autorisation. Les coupes brusques (jump cuts) choquèrent les puristes mais révolutionnèrent le montage mondial.",
"Quel film de Jacques Tati (1967) a été un échec commercial retentissant mais est aujourd'hui reconnu comme un chef-d'œuvre ?":"Playtime nécessita la construction d'un décor géant représentant Paris en verre et acier (« Tativille ») qui ruina Tati. Le film est composé d'une centaine de personnages sans réel protagoniste.",
"Quel cinéaste belge est l'auteur du film Jeanne Dielman, 23 quai du Commerce, 1080 Bruxelles (1975) ?":"Jeanne Dielman (3h20) montre en temps réel les tâches ménagères d'une femme pendant 3 jours. Le magazine Sight & Sound le désigna en 2022 comme le meilleur film de l'histoire du cinéma.",
"Le film Costa-Gavras Z (1969), qui a remporté l'Oscar du meilleur film étranger, est tiré d'un roman sur quel événement ?":"Z est tiré du roman de Vassilís Vassilikós (1966) basé sur l'assassinat de Grigoris Lambrakis en 1963. Le titre « Z » signifie « Il vit » en grec. Le film fut interdit en Grèce sous la dictature des colonels.",
"Qui a réalisé Aguirre, la colère de Dieu (1972) avec Klaus Kinski ?":"Herzog tourna Aguirre au cœur de l'Amazonie péruvienne avec une équipe épuisée. Kinski était si violent que les acteurs locaux proposèrent à Herzog de le tuer. Herzog admit avoir braqué lui-même Kinski avec une arme.",
"Dans quel film de Robert Bresson (1951) suit-on la vie spirituelle d'un curé de campagne ?":"Bresson ne travaillait qu'avec des acteurs amateurs qu'il appelait des « modèles ». Il leur demandait de jouer de façon totalement neutre, sans expression, pour que la caméra capte quelque chose de plus profond.",
"Quel cinéaste américain est connu pour ses films d'improvisation comme Shadows (1959), fondateur du cinéma indépendant américain ?":"Cassavetes finançait souvent ses films avec ses cachets d'acteur dans des productions commerciales. Shadows fut tourné avec un budget de 15 000 dollars collectés auprès d'auditeurs d'une émission radio.",
"Quel film de Sergio Leone (1968) avec Henry Fonda en méchant est considéré comme un chef-d'œuvre du western spaghetti ?":"Leone cast Henry Fonda contre son image habituelle de héros américain. La scène d'ouverture (15 min sans dialogue) fut coupée de 8 minutes par les distributeurs américains qui la trouvèrent trop lente.",
"Quelle cinéaste française, pionnière du cinéma au XXe siècle, a réalisé La Fée aux Choux en 1896 ?":"Alice Guy-Blaché est la première femme réalisatrice de cinéma de l'histoire. Elle dirigea plus de 1 000 films entre 1896 et 1920. Son œuvre fut longtemps oubliée et attribuée à des hommes.",
"Quel film de Mikio Naruse a influencé le cinéma mondial sans être aussi connu que Kurosawa ou Ozu ?":"Naruse (1905–1969) réalisa 89 films consaMessages le destin tragique des femmes dans le Japon traditionnel. Fassbinder et Scorsese le citent parmi leurs plus grandes influences.",
"Quel cinéaste a réalisé L'Humanité (1999) et Flandres (2006), deux Palmes d'Or au Festival de Cannes ?":"Bruno Dumont est un ancien professeur de philosophie devenu cinéaste autodidacte. Ses films sont souvent inhabituels dans leur casting (non-professionnels) et leur approche contemplative.",
"Qui a composé les musiques du Parrain et de nombreux films de Fellini ?":"Nino Rota (1911–1979) composa pour Fellini, Coppola et Zeffirelli. Sa musique du Parrain fut initialement disqualifiée des Oscars car elle contenait un motif déjà utilisé dans Fortunella (1958).",
"Quels réalisateurs sont associés à la Nouvelle Vague française ?":"La Nouvelle Vague rassemblait Truffaut, Godard, Chabrol, Rohmer, Rivette — tous issus des Cahiers du cinéma. Truffaut mourut à 52 ans en 1984, Godard en 2022 à 91 ans, le dernier survivant du mouvement.",
// MUSIQUE FACILE
"Quel célèbre groupe britannique était composé de Lennon, McCartney, Harrison et Starr ?":"Les Beatles ont vendu plus de 600 millions d'albums dans le monde. En 1964, lors de leur première tournée américaine, 73 millions d'Américains (40% de la population) regardèrent leur première apparition au Ed Sullivan Show.",
"Quel compositeur autrichien a écrit Don Giovanni et La Flûte enchantée ?":"Mozart composa plus de 600 œuvres en seulement 35 ans de vie. Il écrivit son premier opéra à 11 ans. Son Requiem, inachevé à sa mort en 1791, reste entouré de mystère.",
"Quelle chanteuse française est célèbre pour « La Vie en rose » ?":"Édith Piaf (1915–1963) fut abandonnée par sa mère et élevée dans un bordel par sa grand-mère. Malgré une vie tragique jalonnée d'accidents et de pertes, elle ne regrette « rien » selon sa chanson la plus célèbre.",
"Qui est surnommé le « Roi de la Pop » ?":"Michael Jackson a vendu 350 millions d'albums dans le monde. Il inventa le moonwalk le 25 mars 1983 lors d'une émission spéciale — ou plutôt il perfectionna une technique existante pour la rendre iconique.",
"Quel compositeur allemand sourd a composé la Symphonie n°9 ?":"Beethoven était complètement sourd lorsqu'il composa et dirigea la Symphonie n°9 (1824). Lors de la première, il n'entendit pas les applaudissements du public ; une soliste dut lui faire se retourner pour voir l'ovation.",
"Quel chanteur français, décédé en 2017, était surnommé « le rocker » ?":"Johnny Hallyday a vendu 110 millions de disques, soit le 3e artiste francophone le plus vendu dans le monde. Lors de ses funérailles, 1 million de personnes ont défilé dans les rues de Paris.",
"Quel musicien américain a reçu le prix Nobel de littérature en 2016 ?":"Bob Dylan est le seul musicien à avoir reçu le Nobel de littérature. Il n'assista pas à la cérémonie à Stockholm, envoyant Patti Smith lire son discours. Il récupéra la médaille lors d'une cérémonie privée en 2017.",
"Combien de touches un piano standard possède-t-il ?":"Le piano standard à 88 touches couvre 7 octaves + 3 notes supplémentaires. Les premières versions de Steinway & Sons (1853) n'avaient que 85 touches ; Bösendorfer proposa jusqu'à 97 touches sur ses grands modèles.",
"Quel est le nom de l'hymne national français ?":"La Marseillaise fut composée en une nuit en 1792 par Claude Joseph Rouget de Lisle à Strasbourg. Elle devint hymne national en 1795. Son refrain contient les mots les plus violents de tout hymne national au monde.",
"Quel duo électronique français est connu pour Get Lucky et Harder Better Faster Stronger ?":"Daft Punk (Thomas Bangalter et Guy-Manuel de Homem-Christo) portaient leurs casques de robots pour rester anonymes. Ils se sont séparés en février 2021 après 28 ans, dans une vidéo nommée « Épilogue ».",
"Quel est le nom du chanteur principal des Rolling Stones ?":"Les Rolling Stones sont en activité depuis 1962 — l'un des plus longs carrières de l'histoire du rock. Mick Jagger fut étudiant à la London School of Economics avant de devenir rockstar.",
"Quel chanteur était le leader du groupe Queen ?":"Freddie Mercury (1946–1991) naquit à Zanzibar sous le nom de Farrokh Bulsara. Malgré sa voix exceptionnelle couvrant 4 octaves, il n'a jamais suivi de cours de chant, craignant que cela altère sa technique naturelle.",
"Quel compositeur baroque est l'auteur des Brandebourgeois et du Clavier bien tempéré ?":"Bach composa plus de 1 000 œuvres tout en élevant 20 enfants (dont 4 devinrent compositeurs importants). Ses œuvres furent presque oubliées après sa mort en 1750 avant d'être redécouvertes par Mendelssohn en 1829.",
"Quelle chanteuse belge est connue pour « Formidable » et « Alors on danse » ?":"Stromae (Paul Van Haver) est d'origine belgo-rwandaise. Ses parents sont architecte et rwandaise. « Alors on danse » a été numéro 1 dans 19 pays européens, ce qui reste exceptionnel pour un artiste francophone.",
"Combien de cordes possède une guitare classique standard ?":"La guitare à 6 cordes fut standardisée au XIXe siècle. Les cordes, tendues à une tension totale de ~70 kg, entrent en vibration à des fréquences de 82 Hz (Mi grave) à 1 175 Hz (Mi aigu).",
"Quelle chanteuse québécoise a interprété My Heart Will Go On pour le film Titanic ?":"Céline Dion avait initialement refusé d'enregistrer My Heart Will Go On, la trouvant trop ordinaire. James Horner lui fit entendre la mélodie en secret et elle l'enregistra en 1 seule prise... à titre de démo.",
"Quel musicien britannique est connu pour ses alter egos Ziggy Stardust et Aladdin Sane ?":"David Bowie (1947–2016) eut une hétérochromie — ses deux yeux de couleurs différentes — due à une bagarre d'adolescence qui dilata sa pupille gauche en permanence.",
"Quel compositeur vénitien est l'auteur des Quatre Saisons ?":"Vivaldi (1678–1741) composa Les Quatre Saisons vers 1720 avec des sonnets descriptifs qu'il écrivit lui-même. Ordonné prêtre, il fut surnommé « le Prêtre Roux » en raison de sa chevelure rousse.",
"Quel groupe de rock est à l'origine de la chanson Bohemian Rhapsody ?":"Bohemian Rhapsody (1975) fut initialement refusée par la maison de disques qui la trouvait trop longue (5m55). Freddie Mercury l'aurait composée en 3 semaines en s'inspirant de l'opéra. Elle est restée #1 au hit-parade pendant 9 semaines.",
"Quels musiciens ont formé le groupe Daft Punk ?":"Bangalter et de Homem-Christo se rencontrèrent au lycée Carnot à Paris. Leur premier groupe s'appelait « Darlin' ». La revue britannique NME les qualifia de « daft punky thrash » — d'où le nom Daft Punk.",
// MUSIQUE MOYEN
"Quel luthier crémone est célèbre pour ses violons considérés comme les meilleurs jamais construits ?":"Les violons Stradivarius (1680–1720) sont estimés entre 1 et 16 millions de dollars pièce. Environ 650 survivent sur les ~1 200 qu'il fabriqua. Leur supériorité acoustique reste débattue par les scientifiques.",
"Quelle ville américaine est considérée comme le berceau du jazz ?":"Le jazz naquit à La Nouvelle-Orléans vers 1900 dans le quartier de Storyville. Il fusionna le blues africain-américain, la musique classique européenne, le ragtime et le gospel. Louis Armstrong en fut le premier ambassadeur mondial.",
"Quel compositeur polonais, virtuose du piano, a vécu en France et est connu pour ses nocturnes et mazurkas ?":"Chopin (1810–1849) quitta la Pologne à 20 ans pour ne jamais y revenir, toujours sous occupation russe. Il avait une si grande nostalgie de son pays qu'il demanda que son cœur soit enterré en Pologne — ce qui fut fait.",
"Quel opéra de Georges Bizet met en scène une jeune femme travaillant dans une manufacture de tabac ?":"Bizet mourut en 1875, 3 mois après la première de Carmen, convaincu que l'opéra était un échec. Il ne sut jamais que Carmen deviendrait l'opéra le plus joué du répertoire mondial.",
"Quel style musical brésilien, né à Rio dans les années 1950, mêle samba et jazz ?":"La Bossa Nova naquit dans les appartements de Copacabana et d'Ipanema. João Gilberto, Tom Jobim et Vinicius de Moraes en furent les pères fondateurs. La Garota de Ipanema fut la 2e chanson la plus enregistrée de l'histoire.",
"Quel groupe de heavy metal américain est connu pour Enter Sandman et Master of Puppets ?":"Metallica a vendu plus de 125 millions d'albums, ce qui en fait le groupe de heavy metal le plus vendu de l'histoire. Master of Puppets (1986) fut le premier album metal à être inscrit au Registre national d'enregistrements.",
"Quel compositeur français est l'auteur du Boléro ?":"Le Boléro de Ravel (1928) est une seule mélodie répétée 18 fois en croissendo. Ravel lui-même disait que c'était « une œuvre sans musique ». C'est pourtant l'une des pièces orchestrales les plus jouées du monde.",
"Quel festival de musique, tenu en 1969 dans l'État de New York, est devenu un symbole de la culture hippie ?":"Woodstock (15–18 août 1969) réunit 400 000 personnes sur une ferme de Max Yasgur à Bethel. Il était initialement prévu pour 50 000 personnes. Joan Baez, Jimi Hendrix et Janis Joplin y jouèrent.",
"Quel album de Pink Floyd (1979) raconte l'histoire d'un rockstar qui construit un mur autour de lui ?":"The Wall (1979) fut en partie inspiré par Roger Waters qui avait craché sur un fan lors d'un concert. Il vendit 23 millions d'exemplaires. Le spectacle live (1980–81) coûtait 1 million de dollars par représentation.",
"Quel compositeur français est associé à l'impressionnisme musical et a composé La Mer et Clair de lune ?":"Debussy refusait le terme « impressionniste ». Il fut influencé par la musique javanaise (gamelan) qu'il découvrit à l'Exposition universelle de 1889. Cette révélation transforma son approche harmonique.",
"Quelle chanteuse britannique, décédée en 2011, a sorti l'album Back to Black ?":"Amy Winehouse (1983–2011) mourut à 27 ans d'intoxication à l'alcool. Elle avait refusé d'aller en cure de désintoxication — réponse immortalisée dans sa chanson Rehab. Back to Black remporta 5 Grammys en 2008.",
"Quel groupe de Seattle a popularisé le grunge avec l'album Nevermind ?":"Nevermind de Nirvana (1991) détrôna Dangerous de Michael Jackson de la première place du Billboard. Kurt Cobain était mal à l'aise avec le succès commercial et ses tensions avec la maison de disques s'accrurent.",
"Quel compositeur français est l'auteur des Gymnopédies ?":"Erik Satie (1866–1925) inventa la musique d'ambiance : ses pièces pour piano « Vexations » (840 répétitions) ont influencé Brian Eno et le minimalisme. Il vivait dans une chambre si petite qu'on ne pouvait l'ouvrir qu'à moitié.",
"Quel rappeur américain, décédé en 1996, est l'auteur des albums All Eyez on Me et Me Against the World ?":"Tupac Shakur (1971–1996) fut tué lors d'une fusillade à Las Vegas à 25 ans. Malgré sa courte vie, il a sorti 14 albums (studio + posthumes). All Eyez on Me reste l'album de rap le plus vendu de l'histoire.",
"Quel duo français (Air) est connu pour l'album Moon Safari et la B.O. du film Virgin Suicides ?":"Air (Nicolas Godin et Jean-Benoît Dunckel) est de Versailles. Moon Safari (1998) fut enregistré dans le studio de leur ami Étienne Daho. La B.O. de Virgin Suicides (Sofia Coppola, 1999) les révéla à l'international.",
"Quel chanteur auteur-compositeur français, surnommé le « Rebelle », est connu pour En cloque et Mistral Gagnant ?":"Renaud (Renaud Séchan) est l'archétype du chanteur engagé à la française. Mistral Gagnant (1985), lettre à sa fille, est considérée comme sa plus belle chanson. Il souffre d'alcoolisme depuis les années 1990.",
"Quel compositeur hongrois a synthétisé musique folklorique et avant-garde dans Microcosmos et le Mandarin merveilleux ?":"Bartók (1881–1945) parcourut la Roumanie, la Bulgarie, l'Algérie et la Turquie pour enregistrer des milliers de chants folkloriques, jetant les bases de l'ethnomusicologie moderne.",
"Quel album de Miles Davis (1959) est considéré comme le chef-d'œuvre du jazz modal ?":"Kind of Blue (1959) se vendit à 4 millions d'exemplaires aux USA — le disque de jazz le plus vendu de l'histoire. Il fut enregistré en seulement 2 sessions d'une journée, avec peu de répétitions.",
"Quel rappeur américain est l'auteur des albums The Blueprint et 4:44 ?":"Jay-Z (Shawn Carter) est passé de dealer de drogue à milliardaire. The Blueprint (2001) sortit le 11 septembre 2001 et fut d'abord une catastrophe commerciale à cause des attentats, avant de devenir un classique.",
"Quels compositeurs sont associés à la période baroque ?":"Bach, Haendel et Vivaldi sont les trois géants du baroque tardif. Haendel et Bach naquirent la même année (1685) et moururent à la même époque sans jamais se rencontrer, malgré un déplacement spécial de Bach pour voir Haendel.",
// MUSIQUE DIFFICILE
"Quel compositeur américain est l'auteur de 4'33\", une pièce de silence composé ?":"4'33\" de John Cage (1952) dure 4 minutes et 33 secondes de silence apparent. Cage soutenait que les sons ambiants (toux, chaises, vent) composent la véritable musique. C'est l'œuvre la plus discutée du XXe siècle.",
"Quel compositeur autrichien a développé le système dodécaphonique (musique sérielle) ?":"Schoenberg (1874–1951) abandonna la tonalité dans ses Trois Pièces pour piano op.11 (1909). Son dodécaphonisme (1921) organise les 12 sons de l'octave en « séries ». Il dut fuir le nazisme et mourut à Los Angeles.",
"Quel compositeur français, mort en 1992, a écrit le Quatuor pour la fin du Temps lors de sa captivité en 1941 ?":"Messiaen composa le Quatuor dans un camp de prisonniers en Silésie (Görlitz). La première eut lieu le 15 janvier 1941 devant 400 prisonniers et gardiens dans le froid. Les instruments étaient délabrés et faux.",
"Quel musicien de jazz américain est considéré comme le père du free jazz, notamment avec l'album The Shape of Jazz to Come ?":"Ornette Coleman (1930–2015) fut sifflé et insulté lors de ses premières performances à New York en 1959. Aujourd'hui, The Shape of Jazz to Come est considéré comme l'un des disques les plus importants du XXe siècle.",
"Quel compositeur d'origine grecque, naturalisé français, a développé la musique stochastique (compositions probabilistes) ?":"Xenakis (1922–2001) était ingénieur avant d'être compositeur. Il travailla avec Le Corbusier sur le Pavillon Philips (1958) où il présenta Poème électronique. Ses œuvres utilisent les probabilités pour générer les structures musicales.",
"Qui est considéré comme l'auteur du premier opéra de l'histoire avec L'Orfeo (1607) ?":"L'Orfeo de Monteverdi fut joué pour la première fois à Mantoue devant la cour des Gonzague. Il combina musique polyphonique Renaissance et nouveau style monodie — la naissance de l'opéra. La partition est miraculeusement intacte.",
"Quelle est la durée approximative du cycle Der Ring des Nibelungen de Richard Wagner ?":"Le Ring (L'Or du Rhin, La Walkyrie, Siegfried, Le Crépuscule des dieux) dure ~15 heures sur 4 soirées. Wagner mit 26 ans à le composer (1848–1874). Le festival de Bayreuth, qu'il fonda, lui est encore dédié.",
"Quel compositeur et chef d'orchestre français, fondateur de l'IRCAM, a dominé la musique contemporaine des années 1970-2000 ?":"Pierre Boulez (1925–2016) dirige les orchestres les plus prestigieux et compose avec une rigueur sérielle absolue. En fondant l'IRCAM (1977) à Paris, il créa un des centres mondiaux de recherche musicale.",
"Quel bassiste de jazz est l'auteur de Goodbye Pork Pie Hat et de l'album Mingus Ah Um ?":"Charles Mingus (1922–1979) était aussi compositeur, arrangeur et leader de groupes. Goodbye Pork Pie Hat fut composé en hommage à Lester Young le jour de sa mort (1959). Mingus était connu pour ses explosions de colère sur scène.",
"Qu'est-ce que le khoomei (chant diphonique) pratiqué notamment en Tuvie (Sibérie) ?":"Le chanteur diphonique produit simultanément deux sons : un bourdon grave et une mélodie de partiels (harmoniques) très aigus. Cette technique, pratiquée en Mongolie et en Tuva, est considérée comme l'une des plus complexes au monde.",
"Quel artiste est à l'origine du concept de la musique ambiante avec des albums comme Discreet Music ?":"Brian Eno inventa le terme « ambient music » en 1978 après s'être retrouvé alité avec de la musique jouant trop doucement pour être bien entendue. Il décida que cette façon d'entendre la musique était une expérience en soi.",
"Qui était Thelonious Monk dans l'histoire du jazz ?":"Monk (1917–1982) est le 2e compositeur de jazz le plus enregistré de l'histoire (après Duke Ellington). Ses harmonies « fausses » volontaires et ses silences rythmiques le rendirent incompris jusqu'au milieu des années 1950.",
"Quel compositeur, auteur des Études symphoniques, est associé au romantisme allemand et a fondé une revue musicale influente ?":"Schumann (1810–1856) fonda la Neue Zeitschrift für Musik (1834) et révéla Chopin et Brahms au grand public. Il perdit la raison en 1854, tenta de se noyer dans le Rhin et mourut en asile 2 ans plus tard.",
"Dans quel style musical le Charango, instrument à cordes andins à 10 cordes, est-il utilisé traditionnellement ?":"Le charango, développé après la colonisation espagnole, fut d'abord construit avec la carapace d'un tatou comme caisse de résonance. Il est désormais interdit d'utiliser des tatous et les instruments sont en bois.",
"Quel compositeur autrichien est l'auteur de 9 symphonies monumentales connues pour leur durée exceptionnelle ?":"Anton Bruckner (1824–1896) était un organiste virtuose, profondément croyant. Ses symphonies durent entre 65 et 80 minutes. Il les révisa obsessionnellement : la 8e existe en au moins 3 versions distinctes.",
"Quel compositeur est à l'origine du concept de Gesamtkunstwerk (œuvre d'art total) ?":"Wagner voulait fusionner musique, poésie, décor, scénographie et geste dans une œuvre unifiée. Il construisit le Festspielhaus de Bayreuth (1876) spécifiquement pour ses opéras, avec une fosse d'orchestre invisible.",
"Quelle compositrice du XIIe siècle, abbesse rhénane, est l'autrice de pièces liturgiques comme la Symphonia ?":"Hildegard von Bingen (1098–1179) était aussi philosophe, médecin, botaniste et prophétesse. Sa musique est parmi la plus ancienne dont nous connaissons avec certitude l'auteur et les œuvres ont été enregistrées de nombreuses fois.",
"Quel musicien, auteur de l'album Trout Mask Replica, incarne l'avant-garde rock américaine ?":"Captain Beefheart (Don Van Vliet) enregistra Trout Mask Replica (1969) en 8h après 8 mois de répétitions dans une maison isolée. Certains membres du groupe n'avaient jamais joué d'instrument avant de rejoindre le band.",
"Quel est le style musical de l'album Pet Sounds des Beach Boys (1966), considéré comme l'un des plus influents de l'histoire ?":"Pet Sounds inspira directement Sgt. Pepper's de McCartney qui avoua : « J'ai été tellement bouleversé que je pleurais. » Brian Wilson s'isola dans son studio pendant des mois et fit mettre un bac à sable sous son piano.",
"Quels compositeurs sont associés à la Seconde École de Vienne et au sérialisme ?":"Schoenberg, Berg et Webern forment la Seconde École de Vienne. Webern réduisit le sérialisme à son extrême avec des pièces de quelques secondes. Il mourut tragiquement en 1945, abattu par erreur par un soldat américain.",
// LITTÉRATURE FACILE
"Quel auteur français a écrit Les Misérables ?":"Victor Hugo a mis 17 ans à écrire Les Misérables (1862). La lettre la plus courte de l'histoire littéraire est attribuée à Hugo : il envoya « ? » à son éditeur pour demander comment le livre se vendait. La réponse fut « ! ».",
"Qui a écrit Hamlet, Roméo et Juliette et Macbeth ?":"Shakespeare (1564–1616) aurait écrit 37 pièces et 154 sonnets. Certains doutent qu'il en soit l'auteur unique. Son vocabulaire est estimé à 20 000 mots — contre 2 000 pour un anglophone moyen aujourd'hui.",
"Quel dramaturge français est l'auteur de L'Avare et du Malade imaginaire ?":"Molière (Jean-Baptiste Poquelin) mourut sur scène le 17 février 1673, lors de la 4e représentation du Malade imaginaire — dans le rôle d'un malade imaginaire. Ironie suprême de l'histoire littéraire.",
"Qui a écrit la saga Harry Potter ?":"J.K. Rowling eut l'idée de Harry Potter en 1990 dans un train retardé entre Manchester et Londres. Elle écrivit les premières notes sur des serviettes de café. Le 1er tome fut refusé par 12 éditeurs avant Bloomsbury.",
"Qui a écrit Le Petit Prince ?":"Saint-Exupéry (1900–1944) disparut lors d'une mission de reconnaissance au-dessus de la Méditerranée. Son avion fut retrouvé en 2003 près de Marseille. Le Petit Prince (1943) est le livre français le plus traduit.",
"Quel auteur espagnol a écrit Don Quichotte de la Manche ?":"Cervantes écrivit Don Quichotte (1605–1615) en prison pour une histoire de dettes. Le roman, souvent qualifié de premier roman moderne, est l'œuvre de fiction la plus vendue de l'histoire après la Bible.",
"Quel auteur français de science-fiction est l'auteur de 20 000 lieues sous les mers ?":"Verne décrivit dans ses romans la télévision, l'astronautique et internet avant leur invention. Il écrivit 54 romans en 40 ans tout en travaillant comme agent de change. Il n'aimait pourtant pas voyager.",
"Qui a écrit Madame Bovary ?":"Gustave Flaubert fut poursuivi en justice pour atteinte aux mœurs à la publication de Madame Bovary (1857). Il fut acquitté. Flaubert était célèbre pour son perfectionnisme : il travaillait parfois une semaine entière sur un seul paragraphe.",
"Qui a créé les personnages d'Astérix et Obélix ?":"René Goscinny (scénario) et Albert Uderzo (dessin) créèrent Astérix en 1959 dans le journal Pilote. La série (38 albums) est la bande dessinée française la plus traduite, présente dans 111 langues.",
"Qui a écrit Crime et Châtiment ?":"Dostoïevski écrivit Crime et Châtiment (1866) à toute vitesse pour rembourser ses dettes de jeu. Il dicta les derniers chapitres à sa secrétaire Anna Snitkina, qu'il épousa ensuite. Ce roman reste l'un des sommets de la littérature mondiale.",
"Quel auteur belge a créé le reporter Tintin ?":"Hergé (Georges Remi) publia Tintin pour la première fois en 1929 dans un supplément catholique pour enfants. Son trait « ligne claire » influença la bande dessinée mondiale. Les albums Tintin se sont vendus à 230 millions d'exemplaires.",
"Quel auteur algérien-français a écrit L'Étranger et La Peste ?":"Camus reçut le Nobel de littérature en 1957, à 44 ans (l'un des plus jeunes lauréats). Il mourut en 1960 dans un accident de voiture. Dans sa serviette on retrouva le manuscrit inachevé du Premier Homme.",
"Quel auteur britannique a écrit Le Seigneur des Anneaux ?":"Tolkien inventa des langues elfiques (le quenya et le sindarin) avant même d'écrire l'histoire. Il travailla sur son monde tolkienien pendant 50 ans. La trilogie du Seigneur des Anneaux a vendu plus de 150 millions d'exemplaires.",
"Quel auteur français est connu pour son roman-fleuve À la recherche du temps perdu ?":"Proust (1871–1922) passa les 14 dernières années de sa vie dans une chambre capitonnée de liège pour se protéger du bruit et des allergies. Les 7 tomes de la Recherche totalisent ~4 000 pages et 1,5 million de mots.",
"Quelle romancière britannique est l'auteur de Dix Petits Nègres avec le personnage Hercule Poirot ?":"Agatha Christie est l'auteur le plus vendu de tous les temps après Shakespeare. Elle vendit 2 milliards de livres. En 1926, elle disparut pendant 11 jours dans des circonstances mystérieuses — l'affaire ne fut jamais élucidée.",
"Quel auteur français naturaliste est connu pour sa lettre J'accuse dans l'affaire Dreyfus ?":"J'accuse...! de Zola (1898) fut publiée en une du journal L'Aurore à 300 000 exemplaires. Zola fut condamné pour diffamation et dut fuir en Angleterre. L'affaire Dreyfus divisa profondément la France.",
"Qui a écrit Les Fleurs du mal ?":"Baudelaire (1821–1867) fut condamné pour « outrage à la morale publique » à la publication des Fleurs du mal (1857). 6 poèmes furent censurés. Ces mêmes poèmes sont aujourd'hui au programme de l'Éducation nationale.",
"Quel auteur britannique a écrit 1984 et La Ferme des animaux ?":"George Orwell écrivit 1984 (1949) alors qu'il était mourant de tuberculose sur l'île de Jura en Écosse. Le ministère de l'Amour, la Novlangue et Big Brother sont entrés dans le vocabulaire politique mondial.",
"Qui a écrit Le Rouge et le Noir ?":"Stendhal (Henri Beyle) inventa le concept de « beylisme » — poursuivre le bonheur avec passion. Il prédit que ses œuvres ne seraient comprises qu'en 1880, puis 1900, puis... il avait raison. Il fut pleinement reconnu après sa mort.",
"Quels auteurs français ont écrit des romans du XIXe siècle devenus des classiques ?":"Le XIXe siècle français est un âge d'or du roman : Balzac (La Comédie humaine, 90 romans), Zola (Les Rougon-Macquart, 20 romans), Hugo, Flaubert et Maupassant ont dominé la littérature mondiale de leur époque.",
// LITTÉRATURE MOYEN
"Qui a écrit La Métamorphose, roman où un homme se transforme en insecte ?":"Kafka (1883–1924) écrivit La Métamorphose (1915) en quelques semaines. Il demanda à son ami Max Brod de brûler ses manuscrits après sa mort. Brod n'obéit pas et publia Le Procès, Le Château et L'Amérique.",
"Quel essai de Simone de Beauvoir, paru en 1949, a fondé le féminisme moderne ?":"« On ne naît pas femme, on le devient » est la phrase la plus célèbre du Deuxième Sexe. L'ouvrage fut mis à l'Index par le Vatican. Il est considéré comme l'acte fondateur du féminisme de la 2e vague.",
"Qui a reçu le prix Nobel de littérature en 2022 ?":"Annie Ernaux (née 1940) est la 17e femme à recevoir ce prix. Elle reçut le Nobel pour « le courage et l'acuité clinique avec lesquels elle découvre les racines, les aliénations et les contraintes collectives de la mémoire personnelle ».",
"Quel auteur français est l'auteur de Voyage au bout de la nuit, roman publié en 1932 ?":"Céline (Louis-Ferdinand Destouches) révolutionna la langue française avec un style populaire, argotique et elliptique. Antisémite notoire, il fut condamné pour collaboration après la guerre mais amnistié en 1951.",
"Qui a écrit La Nausée et L'Être et le Néant ?":"Sartre refusa le prix Nobel de littérature en 1964, déclarant : « Un écrivain ne doit pas se laisser transformer en institution. » C'est la seule fois qu'un auteur a refusé ce prix de plein gré.",
"Quel auteur français est l'auteur du Comte de Monte-Cristo et des Trois Mousquetaires ?":"Alexandre Dumas père travailla avec des « nègres littéraires » — notamment Auguste Maquet pour Monte-Cristo. Son fils Alexandre Dumas (fils) écrivit La Dame aux camélias. Père et fils eurent tous deux des vies romanesques.",
"Qui a écrit la pièce de théâtre Phèdre ?":"Racine (1639–1699) s'est retiré du théâtre à 37 ans après Phèdre (1677), suite à une cabale orchestrée par ses rivaux qui placèrent en même temps une pièce concurrente médiocre sur le même sujet.",
"Quelle pièce de Corneille du XVIIe siècle est à l'origine de la querelle littéraire du même nom ?":"La querelle du Cid (1637) opposa Corneille à l'Académie française qui critiqua sa pièce pour ses irrégularités dramatiques. L'Académie dut cependant reconnaître son succès populaire extraordinaire.",
"Quel auteur français des Lumières a écrit Candide ?":"Voltaire écrivit Candide (1759) en 3 jours pour répondre à l'optimisme de Leibniz après le tremblement de terre de Lisbonne (1755). La conclusion « il faut cultiver notre jardin » reste une des phrases les plus citées du français.",
"Quelle auteure franco-belge a été la première femme élue à l'Académie française en 1980 ?":"Marguerite Yourcenar (1903–1987) vécut aux États-Unis à partir de 1939 avec Grace Frick, sa compagne. Son élection à l'Académie française fit scandale mais fut imposée par André Frossard et Jean d'Ormesson.",
"Quel auteur russe est l'auteur de Lolita ?":"Nabokov (1899–1977) écrivit Lolita (1955) en anglais, sa troisième langue, après le russe et le français. Il fut refusé par 5 éditeurs américains avant une publication en France. Le roman est une étude du mal, pas une apologie.",
"Qui a écrit Cent ans de solitude, roman fondateur du réalisme magique ?":"Gabriel García Márquez (1927–2014) eut l'idée de Cent ans de solitude (1967) en conduisant vers la mer. Il fit demi-tour, rentra, et écrivit pendant 18 mois en ne mangeant que grâce aux bijoux que sa femme vendait.",
"Quel poète français est l'auteur de Paroles, recueil comprenant « Barbara » et « Le cancre » ?":"Jacques Prévert (1900–1977) était aussi scénariste : il écrivit Les Enfants du paradis (Marcel Carné, 1945). « Les feuilles mortes » (Autumn Leaves), paroles de Prévert, reste l'une des chansons françaises les plus reprises.",
"Quel poète français surréaliste est l'auteur des Yeux d'Elsa ?":"Louis Aragon (1897–1982) dédia Les Yeux d'Elsa (1942) à sa compagne Elsa Triolet. Résistant, il écrivit sous occupation. Sa conversion du surréalisme au communisme puis sa rupture avec le Parti après 1968 marquèrent son parcours.",
"Quel poète français est l'auteur de Calligrammes, poèmes mêlant typographie et image ?":"Guillaume Apollinaire (1880–1918) inventa le mot « surréalisme » dans ses notes de programme. Ses Calligrammes (1918) mêlent textes et formes visuelles — précurseurs de la poésie concrète. Il mourut de la grippe espagnole à 38 ans.",
"Quel auteur colombien a fondé le mouvement du réalisme magique en littérature hispanique ?":"García Márquez s'inspirait des histoires de sa grand-mère : « Elle me racontait les choses les plus fantastiques avec la plus grande désinvolture, comme si elles étaient vraies. C'est ce que j'ai voulu faire. »",
"Qui a écrit La Chartreuse de Parme ?":"Stendhal écrivit La Chartreuse de Parme (1839) en seulement 52 jours, en dictant à un secrétaire. Son style « stendhalien » (psychologie fine, ironie) influença Tolstoï, Proust et de nombreux romanciers modernes.",
"Quel auteur irlandais, auteur de Molloy et Malone meurt, a reçu le Nobel de littérature en 1969 ?":"Beckett (1906–1989) reçut le Nobel mais refusa les interviews et la célébrité. Il avait risqué sa vie dans la Résistance française. En attendant Godot (1952) fut d'abord refusé partout avant de devenir la pièce du siècle.",
"Quel mouvement littéraire est associé à Zola, Maupassant et Daudet ?":"Le Naturalisme applique les méthodes scientifiques à la littérature : Zola se documenta dans les mines, les halles et les maisons closes avant d'écrire. Il possédait une énorme bibliothèque de documents sociaux.",
"Quels auteurs sont associés au roman policier français ou à la littérature noire ?":"San-Antonio (Frédéric Dard) a vendu 200 millions de livres avec ses aventures parodiques. Léo Malet inventa Nestor Burma à Paris en 1943. Jean-Patrick Manchette modifia le genre avec un regard politique et social acéré.",
// LITTÉRATURE DIFFICILE
"Quel auteur du XVIe siècle est l'auteur de Gargantua et Pantagruel, œuvres humanistes et satiriques ?":"Rabelais était médecin, moine franciscain puis bénédictin avant d'être écrivain. Ses œuvres, condamnées par la Sorbonne, mêlent érudition humaniste et humour scatologique dans un français populaire et savant.",
"Quel groupe de poètes du XVIe siècle, comprenant Ronsard et Du Bellay, a voulu renouveler la poésie française ?":"La Pléiade publia en 1549 la Défense et illustration de la langue française de Du Bellay, manifeste fondateur. Elle défendait l'usage du français plutôt du latin pour la grande poésie, révolution culturelle décisive.",
"En quelle année le Prix Goncourt a-t-il été décerné pour la première fois ?":"Le Prix Goncourt, instauré par le testament d'Edmond de Goncourt, fut décerné pour la première fois en 1903 à John-Antoine Nau pour Force ennemie. La dotation actuelle est symbolique : 10 euros.",
"Quel auteur irlandais, auteur d'Ulysse, a révolutionné le roman avec le flux de conscience ?":"Ulysse de Joyce (1922) fut publié par Sylvia Beach dans sa librairie parisienne Shakespeare and Company, après avoir été refusé partout. Il se passe en une seule journée (le 16 juin 1904) et contient ~265 000 mots.",
"Quel roman de William Faulkner (1929) raconte l'histoire de la famille Compson depuis plusieurs points de vue ?":"Le Bruit et la Fureur utilise 3 narrateurs internes puis un narrateur omniscient. Le premier narrateur est Benjy, un adulte ayant une déficience mentale. Faulkner avouait avoir essayé 4 fois de raconter la même histoire.",
"Combien de tomes compte À la recherche du temps perdu de Marcel Proust ?":"Les 7 tomes de la Recherche (1913–1927) contiennent ~4 000 pages et ~1,5 million de mots. Une seule phrase peut dépasser 100 lignes. Le dernier tome parut après la mort de Proust qui corrigeait encore ses épreuves dans son lit.",
"Quel auteur humaniste du XVIe siècle a inventé le genre de l'essai avec ses Essais publiés en 1580 ?":"Montaigne (1533–1592) inventa le mot « essai » pour désigner des tentatives de réflexion sur soi. Sa tour de Bordeaux où il écrivit est encore visible. Pascal, Rousseau et Nietzsche le lisaient avec admiration.",
"Quel poète de la Pléiade est l'auteur des Amours et des Odes, considéré comme le « Prince des poètes » ?":"Ronsard (1524–1585) était sourd de l'oreille gauche depuis l'adolescence. Il fut le poète officiel de la cour de France et inspira des générations de poètes. Verlaine lui redonna ses lettres de noblesse au XIXe siècle.",
"Quel auteur romantique a écrit les Mémoires d'outre-tombe, autobiographie monumentale ?":"Chateaubriand (1768–1848) travailla aux Mémoires d'outre-tombe pendant 40 ans (1809–1849). Publiées après sa mort, elles couvrent ses voyages, sa vie politique et ses amours. Proust les considérait comme le plus grand texte français.",
"Quel mouvement littéraire Queneau, Perec, Calvino et Roubaud ont-ils fondé en 1960 ?":"L'OuLiPo (Ouvroir de littérature potentielle) produit de la littérature sous contraintes formelles. Perec écrivit La Disparition (1969) sans utiliser la lettre E — la plus fréquente du français — sur 300 pages.",
"Quel est le premier vers de la Chanson de Roland, épopée médiévale du XIe siècle ?":"La Chanson de Roland (XIe s.) est la plus ancienne chanson de geste française. Elle raconte la bataille de Roncevaux (778) et la mort du paladin Roland. Son auteur est inconnu — peut-être Turold, mentionné à la fin.",
"Quel est le vrai nom de Stendhal ?":"Henri Beyle choisit le pseudonyme « Stendhal » du nom d'une petite ville allemande où naquit le critique d'art Winckelmann qu'il admirait. Il utilisait plus de 200 pseudonymes dans sa correspondance.",
"Quel poète symboliste est l'auteur de l'Art poétique et des Poèmes saturniens ?":"Verlaine (1844–1896) mena une vie chaotique marquée par l'alcool et sa relation passionnée avec Rimbaud. Il finit ses jours dans la misère mais reçu des funérailles nationales. Son vers « De la musique avant toute chose » est fondateur.",
"Quel poète est l'auteur d'Un Coup de dés jamais n'abolira le hasard (1897), œuvre révolutionnaire de la typographie ?":"Mallarmé (1842–1898) distribua les mots sur la page de façon à ce que l'espace blanc soit aussi signifiant que le texte. Cette œuvre, publiée 2 ans avant sa mort, préfigura la poésie concrète et l'art visuel du XXe siècle.",
"Quel auteur suisse-française a écrit L'Amant, Prix Goncourt 1984 ?":"Marguerite Duras (1914–1996) est née en Indochine française (Gia Dinh, Vietnam actuel). L'Amant, récit autobiographique de ses amours avec un riche Chinois à 15 ans, vendit 2 millions d'exemplaires en 3 mois.",
"Quel auteur-poète du XIXe siècle est l'auteur de La Prose du Transsibérien ?":"Blaise Cendrars (1887–1961) était un aventurier autant qu'un poète. La Prose du Transsibérien (1913), imprimée sur un accordéon d'1m80, est considérée comme le premier livre simultané — texte et peinture de Sonia Delaunay.",
"Quel auteur français a reçu le Prix Nobel de littérature en 1947 pour ses œuvres incluant La Porte étroite ?":"André Gide (1869–1951) fut l'une des figures les plus controversées de la littérature française. Son Journal (tenu 60 ans) est un document exceptionnel. Il cofonda la NRF (Nouvelle Revue Française) en 1909.",
"Quel roman de Marguerite Yourcenar, paru en 1951, raconte la vie de l'empereur Hadrien à la première personne ?":"Yourcenar travailla 20 ans sur les Mémoires d'Hadrien. Elle dit avoir découvert l'ouverture (« Animula vagula blandula... ») sur un morceau de papier retrouvé dans le fond d'une boîte — et que tout le roman était là.",
"Quel auteur de la littérature médiévale française est l'auteur des Lais, dont le Lai de Lanval ?":"Marie de France est la première femme connue de la littérature française. On sait peu d'elle sinon qu'elle dédiait ses œuvres à un « noble roi ». Ses 12 Lais (XIIe s.) sont des récits fantastiques inspirés des légendes celtiques.",
"Quels auteurs sont associés au Nouveau Roman français des années 1950-1970 ?":"Le Nouveau Roman (Robbe-Grillet, Sarraute, Butor, Simon) déconstruisit la psychologie des personnages, les intrigues et la chronologie. Claude Simon reçut le Nobel en 1985. Alain Robbe-Grillet écrivit le script de L'Année dernière à Marienbad.",
// PEINTURE FACILE
"Qui a peint la Joconde (Mona Lisa) ?":"La Joconde mesure seulement 77 × 53 cm — beaucoup visiteurs sont surpris par sa petite taille. Léonard la porta avec lui en France où elle fut achetée par François Ier. Elle fut volée au Louvre en 1911 et retrouvée 2 ans plus tard.",
"Qui a peint La Nuit étoilée ?":"Van Gogh peignit La Nuit étoilée (1889) depuis sa chambre dans l'asile de Saint-Rémy-de-Provence, où il s'était volontairement interné. Il créa plus de 300 œuvres pendant cette année d'internement.",
"Qui a peint Guernica, représentant les horreurs de la guerre civile espagnole ?":"Guernica fut peint en seulement 5 semaines en 1937, pour l'Exposition universelle de Paris. Picasso refusa que le tableau retourne en Espagne jusqu'à la mort de Franco. Il y revint en 1981.",
"Qui a peint Le Cri ?":"Munch peignit 4 versions du Cri (1893–1910). L'inspiration lui vint lors d'une promenade au coucher du soleil : « J'ai senti un cri infini traverser la nature. » Le ciel rouge serait dû à l'éruption du Krakatoa en 1883.",
"Quel peintre est connu pour sa série des Tournesols et des Autoportraits à l'oreille coupée ?":"Van Gogh ne vendit qu'un seul tableau de son vivant : La Vigne rouge (1888). Il créa plus de 900 peintures et 1 100 dessins en seulement 10 ans. Son œuvre se vend aujourd'hui à plusieurs dizaines de millions de dollars.",
"Qui a peint La Persistance de la mémoire avec ses montres molles ?":"Dalí dit avoir eu l'idée des montres molles en regardant fondre du camembert. L'image de La Persistance de la mémoire (1931) lui vint en quelques heures, et il peignit la toile en deux heures après que Gala l'eut validée.",
"Quel peintre impressionniste est célèbre pour sa série des Nymphéas ?":"Monet peignit ses Nymphéas dans son jardin de Giverny qu'il aménagea lui-même. La grande série (200 m de peintures) fut offerte à l'État français après la Première Guerre mondiale et est exposée à l'Orangerie.",
"Qui a peint La Création d'Adam sur la voûte de la Chapelle Sixtine ?":"Michel-Ange peignit la voûte de la Sixtine (1508–1512) en 4 ans, debout sur un échafaudage (et non allongé, contrairement au mythe). Il perdit temporairement la vue à force de regarder vers le haut.",
"Qui a peint La Naissance de Vénus ?":"Botticelli peignit La Naissance de Vénus (1485) pour Laurent de Médicis. Le tableau mesure 172 × 278 cm. Vénus n'est pas idéalement proportionnée selon les canons classiques — son cou est trop long, son épaule gauche inclinée.",
"Quel peintre hollandais du XVIIe siècle a peint La Jeune Fille à la perle ?":"Vermeer (1632–1675) n'a laissé que 34–37 tableaux authentifiés. Il vivait très pauvrement et mourut criblé de dettes à 43 ans. Son œuvre fut redécouverte au XIXe siècle par le critique Thoré-Bürger.",
"Dans quel musée parisien est conservée la Joconde ?":"Le Louvre est le musée le plus visité du monde avec ~9 millions de visiteurs par an. La Joconde est exposée derrière un vitrage anti-reflet dans une salle climatisée. En 2009, une visitrice russe lui lança une tasse.",
"Quel peintre impressionniste est célèbre pour ses tableaux de danseuses ?":"Degas préférait se qualifier de « réaliste » plutôt qu'impressionniste. Il utilisait le pastel plus que la peinture. Ses danseuses sont souvent vues de dessous, depuis la fosse d'orchestre où il avait accès.",
"Quel peintre mexicaine est connue pour ses autoportraits et sa vie tumultueuse ?":"Frida Kahlo réalisa 55 autoportraits sur 143 peintures. Elle commença à peindre à 18 ans, alitée après un accident de bus. Elle et Diego Rivera se marièrent, divorcèrent et se remarièrent. Elle est devenue une icône féministe mondiale.",
"Quel peintre flamand baroque est connu pour ses scènes mythologiques et ses portraits opulents ?":"Rubens (1577–1640) était aussi diplomate : il négocia un traité de paix entre l'Espagne et l'Angleterre en 1630, ce qui lui valut un titre de chevalier. Son atelier de 100 assistants permettait une production industrielle.",
"Quel peintre belge a peint Le Fils de l'homme, un homme au chapeau melon avec une pomme devant le visage ?":"Magritte (1898–1967) peignit Le Fils de l'homme (1964) comme un autoportrait. L'homme en chapeau melon apparaît dans plus de 40 de ses tableaux. Il s'habillait lui-même en costume et chapeau melon tous les jours.",
"Quel artiste français est le chef de file du Fauvisme ?":"Matisse (1869–1954) fut profondément influencé par la lumière de la Méditerranée lors d'un séjour à Collioure avec Derain en 1905. Le terme « fauves » (bêtes sauvages) fut utilisé par le critique Louis Vauxcelles pour moquer leurs couleurs criardes.",
"Quel peintre post-impressionniste est surtout connu pour ses paysages de la Montagne Sainte-Victoire ?":"Cézanne peignit la Sainte-Victoire plus de 80 fois depuis les environs d'Aix-en-Provence. Picasso le considérait comme « le père de nous tous ». Il mourut d'une pneumonie en peignant dans son jardin en plein orage.",
"Quel peintre autrichien est l'auteur du tableau Le Baiser ?":"Klimt (1862–1918) utilisa des feuilles d'or véritable dans Le Baiser (1908). Il fut associé à la Sécession viennoise, mouvement contre l'académisme. Il refusa tous les titres et distinctions officiels de son vivant.",
"Quel peintre toulousain est connu pour ses affiches du Moulin Rouge ?":"Toulouse-Lautrec (1864–1901) mesurait seulement 1m54 en raison d'une maladie osseuse. Il passa ses soirées dans les cabarets et les maisons closes, capturant la vie nocturne parisienne avec un trait acéré.",
"Quels peintres sont associés au mouvement impressionniste ?":"Le terme « impressionniste » fut inventé par le critique Louis Leroy pour se moquer du tableau Impression, soleil levant de Monet (1872). Les impressionnistes peignaient en plein air et cherchaient à capturer la lumière instantanée.",
// PEINTURE MOYEN
"Qui a fondé le cubisme avec Pablo Picasso ?":"Georges Braque et Picasso développèrent le cubisme entre 1908 et 1914 dans un dialogue si étroit que même leurs amis proches confondaient leurs tableaux. Ils échangeaient quotidiennement travaux et idées.",
"Quel artiste dadaïste est connu pour avoir ajouté des moustaches à la Joconde dans l'œuvre L.H.O.O.Q. ?":"Duchamp créa L.H.O.O.Q. (1919) en dessinant moustaches et bouc sur une carte postale. Le titre, lu en français lettre par lettre, forme une phrase vulgaire. Duchamp est aussi l'inventeur du readymade (Fontaine, 1917).",
"Quels artistes sont associés au mouvement surréaliste en peinture ?":"Le Surréalisme fut fondé par André Breton avec le Manifeste surréaliste (1924). Les peintres voulaient libérer l'inconscient et le rêve. Dalí fut finalement exclu du mouvement par Breton qui l'appelait « Avida Dollars ».",
"Quel peintre espagnol du Siècle d'Or est l'auteur du tableau Las Meninas ?":"Las Meninas (1656) est considérée comme la première œuvre à réfléchir sur la nature de la peinture. Velázquez y intègre son propre portrait (il tient un pinceau) et le reflet du roi dans un miroir en fond de tableau.",
"Quel peintre espagnol a représenté les horreurs de la guerre dans Le 3 mai 1808 à Madrid ?":"Goya peignit Le 3 mai 1808 (1814) pour commémorer la répression napoléonienne. Ce tableau influença directement Édouard Manet (L'Exécution de Maximilien) et Pablo Picasso (Guernica).",
"Qui a peint le tableau Nighthawks (1942), scène nocturne dans un diner américain ?":"Edward Hopper (1882–1967) est le peintre de la solitude américaine. Nighthawks est le tableau américain le plus reproduit. Le diner est inspiré d'un restaurant de Greenwich Village, à New York, qui a été démoli.",
"Quel artiste américain est le chef de file du Pop Art ?":"Andy Warhol (1928–1987) dit : « À l'avenir, tout le monde aura son quart d'heure de célébrité. » Il transforma Campbell's Soup et Marilyn Monroe en icônes. Sa Factory était à la fois atelier, club et espace de performance.",
"Quel peintre américain est connu pour sa technique de dripping (action painting) ?":"Jackson Pollock (1912–1956) posait ses toiles au sol et dansait autour en laissant dégouliner la peinture. Il mourut dans un accident de voiture à 44 ans. Ses œuvres se vendent aujourd'hui jusqu'à 200 millions de dollars.",
"Quel peintre baroque est célèbre pour son utilisation du clair-obscur (chiaroscuro) dans des scènes violentes ?":"Le Caravage (1571–1610) vécut une vie violente : il tua un homme en 1606 et dut fuir Rome. Sa technique du clair-obscur radical (ténébrisme) révolutionna la peinture européenne du XVIIe siècle.",
"Dans quel musée parisien se trouvent principalement les œuvres du XIXe siècle français ?":"Le musée d'Orsay, ancienne gare (1900), fut transformé en musée en 1986. Il abrite notamment les grandes collections impressionnistes et post-impressionnistes. La gare devait être démolie en 1970 mais fut sauvée par un mouvement populaire.",
"Quel peintre romantique britannique est célèbre pour ses paysages atmosphériques, notamment avec The Fighting Temeraire ?":"Turner (1775–1851) anticipa l'impressionnisme d'un demi-siècle. Il demanda à être attaché au mât d'un navire dans une tempête pour peindre Tempête de neige (1842). Le critique Ruskin défendit son œuvre avec passion.",
"Quel peintre néoclassique français est l'auteur du Serment des Horaces (1784) ?":"David (1748–1825) fut le peintre officiel de la Révolution et de Napoléon. Il organisa les fêtes révolutionnaires et vota la mort de Louis XVI. Après la chute de Napoléon, il s'exila à Bruxelles où il mourut.",
"Quel peintre expressionniste allemand a fondé le mouvement Die Brücke ?":"Ernst Ludwig Kirchner (1880–1938) et le groupe Die Brücke (Le Pont) cherchaient à créer un pont entre l'art ancien et futur. Persécutés par les nazis comme « dégénérés », leurs œuvres furent confisquées ou brûlées.",
"Quel artiste de l'École de Paris, d'origine modiglianesque, est connu pour ses nus allongés ?":"Amedeo Modigliani (1884–1920) vécut dans la misère à Montparnasse et mourut à 35 ans de méningite tuberculeuse. Sa compagne Jeanne Hébuterne se jeta par une fenêtre le lendemain, enceinte de 9 mois.",
"Quel mouvement artistique est associé à Mark Rothko et ses grands aplats de couleur ?":"Mark Rothko (1903–1970) voulait que ses tableaux gigantesques enveloppent le spectateur et provoquent des émotions profondes. Il refusa une commande pour le restaurant Four Seasons, estimant que le cadre n'était pas digne de son art.",
"Quel peintre symboliste français est l'auteur de L'Apparition et Jupiter et Sémélé ?":"Gustave Moreau (1826–1898) fut longtemps incompris de son vivant. Il légua son atelier à l'État qui en fit un musée. Matisse et Rouault furent ses élèves. Huysmans lui consacra un chapitre entier dans À rebours (1884).",
"Quel peintre des primitifs flamands est l'auteur du Retable de l'Agneau mystique ?":"Jan van Eyck (v.1390–1441) est le maître de la peinture flamande. Le Retable de Gand (1432) fut fragmenté, volé par les nazis (Opération Monuments Men) et partiellement récupéré après la guerre.",
"Quel peintre post-impressionniste français partageait la vie des Tahitiens et peignait leurs couleurs vives ?":"Gauguin (1848–1903) abandonna sa femme, ses 5 enfants et sa carrière d'agent de change pour aller peindre en Bretagne, puis à Tahiti. Ses couleurs vives et ses formes simplifiées influencèrent le fauvisme et l'expressionnisme.",
"Quel peintre français du XVIIe siècle, fondateur du classicisme français, a vécu longtemps à Rome ?":"Nicolas Poussin (1594–1665) vécut presque toute sa vie à Rome. Ses tableaux sont construits comme des dissertations philosophiques. Il est le peintre préféré de Cézanne qui le voulait « refaire sur nature ».",
"Quels peintres sont associés au mouvement Art Nouveau ?":"L'Art Nouveau (1890–1910) cherchait à intégrer l'art dans tous les aspects de la vie quotidienne. Klimt, Mucha, Toorop et Gaudi s'inspiraient des formes organiques de la nature. Le style mourut avec la Première Guerre mondiale.",
// PEINTURE DIFFICILE
"Quel peintre maniériste florentin est l'auteur de la Déposition de croix à Santa Felicita de Florence ?":"Pontormo (1494–1557) peignit la Déposition (1525–1528) avec des couleurs acides et irréelles et une composition sans gravité, comme si les personnages flottaient. C'est l'une des premières œuvres maniéristes.",
"Quel artiste du Bauhaus, auteur de Autour du poisson, est connu pour ses compositions géométriques colorées ?":"Paul Klee (1879–1940) enseigna au Bauhaus de 1921 à 1931. Il fut persécuté par les nazis et s'exila en Suisse. Ses œuvres mêlent éléments enfantins, mystiques et architecturaux dans un style unique et poétique.",
"Quel peintre est à l'origine du mouvement De Stijl et du néoplasticisme, avec ses grilles de lignes noires et couleurs primaires ?":"Mondrian (1872–1944) fut d'abord peintre symboliste et paysagiste avant d'arriver à l'abstraction radicale en 1920. Il aimait le jazz et la danse. Ses œuvres inspirèrent la mode (Yves Saint Laurent, 1965), le design et l'architecture.",
"Quel peintre britannique d'origine irlandaise est connu pour ses triptiques de corps humains déformés ?":"Francis Bacon (1909–1992) avait un atelier si chaotique que le musée de Dublin a reconstitué 7 700 objets retrouvés dans la pièce. Ses triptiques, inspirés de photos médicales et de Velázquez, explorent la condition humaine.",
"Quel peintre américain, décédé en 1988 à 27 ans, a mêlé street art et néo-expressionnisme ?":"Jean-Michel Basquiat (1960–1988) commença comme graffeur à New York sous le pseudonyme SAMO. Découvert par Andy Warhol, il devint la star du marché de l'art en quelques années. Ses toiles se vendent jusqu'à 110 millions de dollars.",
"Qu'est-ce que l'Arte Povera, mouvement artistique italien des années 1960 ?":"Arte Povera (art pauvre) utilisait des matériaux bruts : charbon, terre, végétaux, acier, feu. Jannis Kounellis exposa 12 chevaux vivants dans une galerie en 1969. Le mouvement dénonçait la marchandisation de l'art.",
"Quel peintre allemand néo-expressionniste est connu pour ses grandes toiles évoquant la mythologie et l'histoire allemande ?":"Anselm Kiefer (né 1945) travaille avec du plomb, de la paille, du sable et des cendres. Ses œuvres monumentales affrontent directement la culpabilité allemande pour la Seconde Guerre mondiale et l'Holocauste.",
"Qui a réalisé le tableau Las Hilanderas (Les Fileuses) conservé au Prado, souvent considéré comme une des œuvres les plus complexes de Velázquez ?":"Las Hilanderas (1657) est une mise en abyme de la peinture dans la peinture. L'arrière-plan montrerait une tapisserie représentant un mythe d'Ovide. Velázquez y réfléchit sur la dignité du travail artistique.",
"Quel peintre français post-impressionniste est connu pour ses scènes intimistes et sa palette chaude, parfois comparé à Bonnard ?":"Pierre Bonnard (1867–1947) peignit sa compagne Marthe dans sa baignoire des centaines de fois pendant 25 ans. Ses couleurs vibrantes et ses compositions décentrées préfigurent l'art contemporain.",
"Qui était le maître de Léonard de Vinci ?":"Andrea del Verrocchio (1435–1488) était sculpteur, orfèvre et peintre. La légende veut que Léonard ait peint un ange si parfait dans le Baptême du Christ (v.1475) que Verrocchio, écrasé, aurait renoncé à peindre.",
"Quel peintre symboliste belge est l'auteur de La Femme en bleu et de ses tableaux énigmatiques à l'atmosphère onirique ?":"Fernand Khnopff (1858–1921) était un solitaire reclus dans une maison qu'il avait lui-même conçue. Il représentait souvent le même visage — celui de sa sœur Marguerite — dans ses œuvres chargées d'érotisme sublimé.",
"Quel peintre hollandais a peint La Ronde de nuit, conservée au Rijksmuseum d'Amsterdam ?":"La Ronde de nuit (1642) fut coupée sur ses bords pour tenir dans un couloir au XVIIIe siècle. Rembrandt (1606–1669) y peignit des personnages de tailles différentes selon leur rang social — rupture avec la convention.",
