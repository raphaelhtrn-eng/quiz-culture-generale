<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Culture Générale</title>
<style>
:root {
  --cream: #FFF8F0;
  --cream2: #F0E6D3;
  --border: #E0D0BC;
  --text: #2C2C2C;
  --muted: #888;
  --white: #FFFFFF;
  --shadow: rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; line-height: 1.5; }

/* NAV */
nav { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 8px var(--shadow); }
.logo { font-size: 1.25rem; font-weight: 800; margin-right: 2rem; padding: 1rem 0; }
.nav-btn { padding: 1.1rem 1.2rem; border: none; background: none; cursor: pointer; font-size: 0.95rem; color: var(--muted); border-bottom: 3px solid transparent; transition: all .2s; margin-bottom: -1px; font-weight: 500; }
.nav-btn.active { color: var(--text); font-weight: 700; border-bottom-color: var(--text); }

/* LAYOUT */
#app { padding: 2rem; max-width: 1000px; margin: 0 auto; }
.hidden { display: none !important; }

/* THEMES */
.page-title { font-size: 1.7rem; font-weight: 800; margin-bottom: .4rem; }
.page-sub { color: var(--muted); margin-bottom: 1.5rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 1rem; }
.theme-card { border: none; border-radius: 18px; padding: 1.8rem 1rem; cursor: pointer; font-size: 1rem; font-weight: 700; color: white; display: flex; flex-direction: column; align-items: center; gap: .6rem; transition: transform .18s, box-shadow .18s; box-shadow: 0 4px 15px rgba(0,0,0,.12); text-shadow: 0 1px 3px rgba(0,0,0,.2); }
.theme-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,0,0,.2); }
.theme-card .icon { font-size: 2rem; }

/* PANEL (setup) */
.panel { max-width: 480px; margin: 2rem auto; background: var(--white); border-radius: 20px; padding: 2rem; box-shadow: 0 4px 24px var(--shadow); }
.panel-title { font-size: 1.4rem; font-weight: 800; text-align: center; margin-bottom: .3rem; }
.panel-sub { color: var(--muted); text-align: center; margin-bottom: 1.8rem; font-size: .9rem; }
.form-group { margin-bottom: 1.4rem; }
.form-label { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: .6rem; display: block; }
.toggle-row { display: flex; gap: .5rem; }
.toggle-btn { flex: 1; padding: .7rem .5rem; border: 2px solid var(--border); border-radius: 10px; background: var(--white); cursor: pointer; font-size: .88rem; transition: all .15s; font-weight: 500; }
.toggle-btn.active { background: var(--text); border-color: var(--text); color: white; font-weight: 700; }
.btn-primary { width: 100%; padding: .9rem; background: var(--text); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background .15s; }
.btn-primary:hover { background: #444; }
.btn-back { width: 100%; padding: .7rem; background: none; border: 2px solid var(--border); border-radius: 12px; font-size: .95rem; cursor: pointer; margin-top: .5rem; transition: border-color .15s; font-weight: 500; }
.btn-back:hover { border-color: #999; }

/* QUIZ */
.quiz-wrap { max-width: 650px; margin: 0 auto; }
.quiz-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
.q-label { font-size: .85rem; font-weight: 700; color: var(--muted); white-space: nowrap; }
.prog-track { flex: 1; background: var(--cream2); height: 7px; border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; background: var(--text); transition: width .3s ease; }
.timer-circle { width: 42px; height: 42px; border-radius: 50%; background: var(--cream2); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.1rem; flex-shrink: 0; transition: background .3s; }
.timer-circle.warn { background: #FFF3CD; color: #856404; }
.timer-circle.danger { background: #FDEDEC; color: #C0392B; }
.question-card { background: var(--white); border-radius: 20px; padding: 2rem; box-shadow: 0 3px 20px var(--shadow); }
.q-num { font-size: .8rem; color: var(--muted); font-weight: 600; margin-bottom: .5rem; }
.q-text { font-size: 1.2rem; font-weight: 700; margin-bottom: .4rem; line-height: 1.4; }
.q-hint { font-size: .82rem; color: var(--muted); margin-bottom: 1.3rem; font-style: italic; }
.options { display: flex; flex-direction: column; gap: .6rem; }
.option { display: flex; align-items: center; gap: .75rem; padding: .85rem 1.1rem; border: 2px solid var(--border); border-radius: 12px; cursor: pointer; transition: all .15s; user-select: none; }
.option:hover:not(.locked) { border-color: #bbb; background: var(--cream); }
.option.chosen:not(.locked) { border-color: var(--text); background: #f5f5f5; }
.option.correct { border-color: #27AE60; background: #EAFAF1; }
.option.wrong { border-color: #E74C3C; background: #FDEDEC; }
.option.missed { border-color: #E67E22; background: #FEF9E7; }
.option.locked { cursor: default; }
.opt-box { width: 24px; height: 24px; border: 2px solid #CCC; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; transition: all .15s; }
.option.chosen .opt-box { background: var(--text); border-color: var(--text); color: white; }
.option.correct .opt-box { background: #27AE60; border-color: #27AE60; color: white; }
.option.wrong .opt-box { background: #E74C3C; border-color: #E74C3C; color: white; }
.option.missed .opt-box { background: #E67E22; border-color: #E67E22; color: white; }
.opt-text { font-size: .95rem; }
.validate-btn { margin-top: 1.2rem; }

/* RESULTS */
.res-wrap { max-width: 650px; margin: 0 auto; }
.score-hero { background: var(--white); border-radius: 20px; padding: 2.5rem; text-align: center; box-shadow: 0 3px 20px var(--shadow); margin-bottom: 1.5rem; }
.score-big { font-size: 5rem; font-weight: 900; line-height: 1; }
.score-sub { color: var(--muted); font-size: 1rem; margin-top: .3rem; }
.score-msg { font-size: 1.1rem; font-weight: 600; margin-top: 1rem; }
.recap-title { font-size: 1.05rem; font-weight: 700; margin: 1.5rem 0 .75rem; }
.recap-item { background: var(--white); border-radius: 14px; padding: 1.1rem 1.3rem; margin-bottom: .7rem; box-shadow: 0 2px 8px var(--shadow); border-left: 4px solid; }
.recap-item.ko { border-left-color: #E74C3C; }
.recap-q { font-weight: 600; margin-bottom: .35rem; font-size: .95rem; }
.recap-user { font-size: .83rem; color: var(--muted); }
.recap-ok { font-size: .83rem; color: #27AE60; font-weight: 600; margin-top: .2rem; }
.btn-row { display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap; }
.btn-row .btn-primary { width: auto; padding: .75rem 1.5rem; }
.btn-row .btn-back { width: auto; padding: .75rem 1.5rem; }

/* PROFILE */
.prof-wrap { max-width: 700px; margin: 0 auto; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(145px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.stat-card { background: var(--white); border-radius: 16px; padding: 1.4rem; box-shadow: 0 2px 10px var(--shadow); }
.stat-val { font-size: 2.2rem; font-weight: 900; line-height: 1; }
.stat-val.sm { font-size: 1.1rem; padding-top: .4rem; }
.stat-lbl { color: var(--muted); font-size: .82rem; margin-top: .3rem; }
.radar-card { background: var(--white); border-radius: 16px; padding: 1.5rem; box-shadow: 0 2px 10px var(--shadow); text-align: center; }
.radar-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
canvas { display: block; margin: 0 auto; max-width: 100%; }
.no-data { color: var(--muted); font-style: italic; padding: 2rem; }

@media(max-width:580px){
  #app { padding: 1rem; }
  .grid { grid-template-columns: repeat(2, 1fr); }
  .score-big { font-size: 3.5rem; }
  nav { padding: 0 1rem; }
  .toggle-row { flex-wrap: wrap; }
}

/* ===== XP BAR ===== */
.xp-card{background:var(--white);border-radius:16px;padding:1.4rem 1.5rem;box-shadow:0 2px 10px var(--shadow);margin-bottom:1rem;}
.xp-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.6rem;}
.xp-level{font-size:1.6rem;font-weight:900;}
.xp-label{font-size:.82rem;color:var(--muted);}
.xp-track{background:var(--cream2);height:14px;border-radius:99px;overflow:hidden;margin-bottom:.4rem;}
.xp-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#F39C12,#E67E22);transition:width .7s cubic-bezier(.22,1,.36,1);}
.xp-sub{font-size:.78rem;color:var(--muted);text-align:right;}

/* ===== BADGES ===== */
.badges-section{background:var(--white);border-radius:16px;padding:1.5rem;box-shadow:0 2px 10px var(--shadow);margin-bottom:1.5rem;}
.badges-section h3{font-size:1rem;font-weight:700;margin-bottom:1rem;}
.badges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:.7rem;}
.badge{background:var(--cream);border-radius:14px;padding:.9rem .7rem;text-align:center;border:2px solid var(--border);transition:all .2s;}
.badge.unlocked{background:white;border-color:#F39C12;box-shadow:0 3px 10px rgba(243,156,18,.2);}
.badge .b-icon{font-size:1.8rem;margin-bottom:.3rem;display:block;}
.badge .b-name{font-size:.78rem;font-weight:700;margin-bottom:.25rem;line-height:1.2;}
.badge .b-cond{font-size:.68rem;color:var(--muted);line-height:1.3;}
.badge.locked{opacity:.4;filter:grayscale(80%);}
.badge.unlocked .b-cond{color:#E67E22;font-weight:600;}

/* ===== THEME BARS ===== */
.theme-bars{background:var(--white);border-radius:16px;padding:1.5rem;box-shadow:0 2px 10px var(--shadow);margin-bottom:1.5rem;}
.theme-bars h3{font-size:1rem;font-weight:700;margin-bottom:1rem;}
.tb-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.65rem;}
.tb-name{font-size:.83rem;font-weight:600;width:105px;flex-shrink:0;white-space:nowrap;}
.tb-track{flex:1;background:var(--cream2);height:10px;border-radius:99px;overflow:hidden;}
.tb-fill{height:100%;border-radius:99px;transition:width .5s ease;}
.tb-pct{font-size:.78rem;font-weight:700;color:var(--muted);width:34px;text-align:right;flex-shrink:0;}

/* ===== FUN FACT ===== */
.fun-fact{background:linear-gradient(135deg,#FFF8E1,#FFF3CD);border-left:4px solid #F39C12;border-radius:0 12px 12px 0;padding:.85rem 1rem;margin-top:.9rem;font-size:.88rem;line-height:1.5;display:none;}
.fun-fact .ff-lbl{font-size:.7rem;font-weight:700;color:#E67E22;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem;}

/* ===== ANIMATIONS ===== */
@keyframes shake{0%,100%{transform:translateX(0)}10%,50%,90%{transform:translateX(-7px)}30%,70%{transform:translateX(7px)}}
@keyframes flashGreen{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
@keyframes flashRed{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
@keyframes cfFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes popIn{0%{transform:scale(0) translateY(20px);opacity:0}60%{transform:scale(1.1) translateY(-4px);opacity:1}100%{transform:scale(1) translateY(0);opacity:1}}
.shake{animation:shake .4s ease;}
.flash-overlay{position:fixed;inset:0;pointer-events:none;z-index:200;border-radius:0;animation-duration:.55s;animation-fill-mode:forwards;}
.flash-green-layer{background:rgba(39,174,96,.22);animation-name:flashGreen;}
.flash-red-layer{background:rgba(231,76,60,.22);animation-name:flashRed;}
.cf-piece{position:fixed;border-radius:2px;pointer-events:none;z-index:300;animation:cfFall linear forwards;}

/* ===== DUEL ===== */
.duel-btn{width:100%;margin-top:.75rem;padding:.9rem;background:linear-gradient(135deg,#8E44AD,#9B59B6);color:white;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .15s;box-shadow:0 4px 15px rgba(142,68,173,.3);}
.duel-btn:hover{opacity:.88;}
.p1-tag{display:inline-block;padding:.2rem .65rem;border-radius:99px;font-size:.78rem;font-weight:700;color:white;background:#2980B9;margin-bottom:.5rem;}
.p2-tag{display:inline-block;padding:.2rem .65rem;border-radius:99px;font-size:.78rem;font-weight:700;color:white;background:#C0392B;margin-bottom:.5rem;}
.duel-scores{display:flex;gap:1rem;margin-top:1rem;}
.dsc{flex:1;border-radius:16px;padding:1.5rem;text-align:center;color:white;box-shadow:0 4px 15px rgba(0,0,0,.15);}
.dsc.p1{background:linear-gradient(135deg,#2980B9,#3498DB);}
.dsc.p2{background:linear-gradient(135deg,#C0392B,#E74C3C);}
.dsc-big{font-size:3rem;font-weight:900;line-height:1;}
.duel-winner{font-size:1.1rem;font-weight:700;text-align:center;padding:1rem;background:linear-gradient(135deg,#F39C12,#E67E22);color:white;border-radius:16px;margin:1rem 0;}

/* ===== POPUPS ===== */
.xp-popup{position:fixed;bottom:2rem;right:2rem;background:#2C2C2C;color:white;padding:.7rem 1.2rem;border-radius:12px;font-weight:700;font-size:.92rem;z-index:400;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;}
.xp-popup.show{opacity:1;transform:translateY(0);}
.lvlup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:500;display:none;}
.lvlup-inner{background:white;border-radius:24px;padding:2.5rem 3rem;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:popIn .5s cubic-bezier(.175,.885,.32,1.275);}
.lvlup-inner .li-icon{font-size:3.5rem;margin-bottom:.5rem;}
.lvlup-inner h2{font-size:1.8rem;font-weight:900;margin-bottom:.3rem;}
.lvlup-inner p{color:var(--muted);}
</style>
</head>
<body>

<nav>
  <span class="logo" onclick="showPage('home')" style="cursor:pointer">🎓 Culture Générale</span>
  <button class="nav-btn active" id="nav-home" onclick="showPage('home')">Accueil</button>
  <button class="nav-btn" id="nav-profile" onclick="showPage('profile')">Mon Profil</button>
</nav>

<div id="app">

  <!-- ========== HOME PAGE ========== -->
  <div id="page-home">

    <!-- THEMES VIEW -->
    <div id="view-themes">
      <h1 class="page-title">Quiz Culture Générale</h1>
      <p class="page-sub">Choisissez une thématique pour commencer</p>
      <div id="resume-banner"></div>
      <div class="grid" id="themes-grid"></div>
      <button class="duel-btn" onclick="showDuelSetup()">⚔️ Mode Duel — 2 joueurs</button>
    </div>

    <!-- SETUP VIEW -->
    <div id="view-setup" class="hidden">
      <div class="panel">
        <div class="panel-title" id="setup-name"></div>
        <div class="panel-sub">Configurez votre partie</div>
        <div class="form-group">
          <label class="form-label">Difficulté</label>
          <div class="toggle-row" id="diff-row">
            <button class="toggle-btn active" onclick="selectDiff('Facile',this)">Facile</button>
            <button class="toggle-btn" onclick="selectDiff('Moyen',this)">Moyen</button>
            <button class="toggle-btn" onclick="selectDiff('Difficile',this)">Difficile</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Chronomètre (15 s / question)</label>
          <div class="toggle-row" id="timer-row">
            <button class="toggle-btn active" onclick="selectTimer(false,this)">Sans timer</button>
            <button class="toggle-btn" onclick="selectTimer(true,this)">Avec timer ⏱</button>
          </div>
        </div>
        <button class="btn-primary" onclick="startQuiz()">▶ Démarrer</button>
        <button class="btn-back" onclick="showView('themes')">← Retour</button>
      </div>
    </div>

    <!-- QUIZ VIEW -->
    <div id="view-quiz" class="hidden">
      <div class="quiz-wrap">
        <div class="quiz-header">
          <span class="q-label" id="q-counter">Q 1/10</span>
          <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
          <div class="timer-circle hidden" id="timer-el">15</div>
        </div>
        <div class="question-card" id="question-card"></div>
      </div>
    </div>

    <!-- RESULTS VIEW -->
    <div id="view-results" class="hidden">
      <div class="res-wrap" id="results-content"></div>
    </div>

    <!-- DUEL SETUP VIEW -->
    <div id="view-duel-setup" class="hidden">
      <div class="panel duel-panel">
        <div class="panel-title">⚔️ Mode Duel</div>
        <div class="panel-sub">Deux joueurs, même écran, même questions !</div>
        <div class="form-group">
          <label class="form-label">Prénom Joueur 1 🔵</label>
          <input id="p1-name" type="text" placeholder="Joueur 1" maxlength="20"
            style="width:100%;padding:.7rem 1rem;border:2px solid var(--border);border-radius:10px;font-size:.95rem;outline:none;">
        </div>
        <div class="form-group">
          <label class="form-label">Prénom Joueur 2 🔴</label>
          <input id="p2-name" type="text" placeholder="Joueur 2" maxlength="20"
            style="width:100%;padding:.7rem 1rem;border:2px solid var(--border);border-radius:10px;font-size:.95rem;outline:none;">
        </div>
        <div class="form-group">
          <label class="form-label">Thématique</label>
          <div class="toggle-row" id="duel-theme-row" style="flex-wrap:wrap;gap:.4rem;">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Difficulté</label>
          <div class="toggle-row" id="duel-diff-row">
            <button class="toggle-btn active" onclick="selectDuelDiff('Facile',this)">Facile</button>
            <button class="toggle-btn" onclick="selectDuelDiff('Moyen',this)">Moyen</button>
            <button class="toggle-btn" onclick="selectDuelDiff('Difficile',this)">Difficile</button>
          </div>
        </div>
        <button class="btn-primary" onclick="startDuel()">⚔️ C'est parti !</button>
        <button class="btn-back" onclick="showView('themes')">← Retour</button>
      </div>
    </div>

    <!-- DUEL QUIZ VIEW -->
    <div id="view-duel-quiz" class="hidden">
      <div class="quiz-wrap">
        <div class="quiz-header">
          <span class="q-label" id="duel-q-counter">Q 1/10</span>
          <div class="prog-track"><div class="prog-fill" id="duel-prog-fill" style="width:0%"></div></div>
        </div>
        <div id="duel-player-tag"></div>
        <div class="question-card" id="duel-question-card"></div>
      </div>
    </div>

    <!-- DUEL RESULTS VIEW -->
    <div id="view-duel-results" class="hidden">
      <div class="res-wrap" id="duel-results-content"></div>
    </div>

  </div>

  <!-- ========== PROFILE PAGE ========== -->
  <div id="page-profile" class="hidden">
    <div class="prof-wrap">
      <h2 class="page-title" style="margin-bottom:1.5rem">Mon Profil</h2>
      <!-- XP BAR -->
      <div class="xp-card" id="xp-card"></div>
      <!-- STATS -->
      <div class="stats-grid" id="stats-grid"></div>
      <!-- THEME BARS -->
      <div class="theme-bars" id="theme-bars">
        <h3>📊 Réussite par thématique</h3>
        <div id="theme-bars-content"></div>
      </div>
      <!-- BADGES -->
      <div class="badges-section" id="badges-section">
        <h3>🏅 Badges</h3>
        <div class="badges-grid" id="badges-grid"></div>
      </div>
      <!-- RADAR -->
      <div class="radar-card">
        <h3>🕸️ Radar des scores</h3>
        <canvas id="radar-canvas" width="520" height="520"></canvas>
      </div>
    </div>
  </div>

</div>

<!-- OVERLAYS -->
<div id="flash-overlay" class="flash-overlay hidden"></div>
<div id="xp-popup" class="xp-popup"></div>
<div id="lvlup-overlay" class="lvlup-overlay">
  <div class="lvlup-inner">
    <div class="li-icon">🎉</div>
    <h2 id="lvlup-title">Niveau atteint !</h2>
    <p id="lvlup-sub"></p>
    <button class="btn-primary" style="margin-top:1.5rem;width:auto;padding:.75rem 2rem;" onclick="closeLvlUp()">Super !</button>
  </div>
</div>

<script>
// ============================================================
// QUESTIONS — 10 thèmes × 3 niveaux × 20 questions = 600
// q: question, o: options (4), c: indices correctes (array)
// ============================================================
const QUESTIONS = {

"Histoire": {
"Facile": [
{q:"En quelle année a eu lieu la Révolution française ?",o:["1789","1799","1776","1815"],c:[0]},
{q:"Qui était le premier président des États-Unis ?",o:["George Washington","Abraham Lincoln","Thomas Jefferson","Benjamin Franklin"],c:[0]},
{q:"Quelle guerre s'est terminée en 1945 ?",o:["La Seconde Guerre mondiale","La Première Guerre mondiale","La Guerre de Corée","La Guerre du Vietnam"],c:[0]},
{q:"Qui a construit les pyramides de Gizeh ?",o:["Les Égyptiens de l'Antiquité","Les Romains","Les Grecs","Les Perses"],c:[0]},
{q:"En quelle année le mur de Berlin est-il tombé ?",o:["1989","1991","1985","1979"],c:[0]},
{q:"Qui dirigeait l'Allemagne nazie ?",o:["Adolf Hitler","Heinrich Himmler","Joseph Goebbels","Hermann Göring"],c:[0]},
{q:"Quelle bataille Napoléon a-t-il perdue en 1815 ?",o:["Waterloo","Trafalgar","Leipzig","Borodino"],c:[0]},

// ============================================================
// PROFILE (localStorage)
// ============================================================
const PROFILE_KEY = 'quiz-cg-v1';

function loadProfile() {
  try {
    const raw = localStorage.getItem(PROFILE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  const def = { themes: {}, totalGames: 0, totalTime: 0 };
  THEMES.forEach(t => { def.themes[t.name] = { played: 0, correct: 0, total: 0, timeSpent: 0 }; });
  return def;
}

function saveProfile(p) {
  try { localStorage.setItem(PROFILE_KEY, JSON.stringify(p)); } catch(e) {}
}

function ensureThemes(p) {
  THEMES.forEach(t => {
    if (!p.themes[t.name]) p.themes[t.name] = { played: 0, correct: 0, total: 0, timeSpent: 0 };
  });
}

function showPage(page) {
  clearTimer();
  document.getElementById('page-home').classList.toggle('hidden', page !== 'home');
  document.getElementById('page-profile').classList.toggle('hidden', page !== 'profile');
  document.getElementById('nav-home').classList.toggle('active', page === 'home');
  document.getElementById('nav-profile').classList.toggle('active', page === 'profile');
  if (page === 'home') { showView('themes'); renderResumeBanner(); }
  if (page === 'profile') renderProfile();
}

function showView(v) {
  ['themes','setup','quiz','results'].forEach(n => {
    document.getElementById('view-'+n).classList.toggle('hidden', n !== v);
  });
}

// ============================================================
// SESSION PERSISTENCE
// ============================================================
const SESSION_KEY = 'quiz-cg-session';

function saveSession() {
  const state = {
    theme: G.theme, diff: G.diff, timer: G.timer,
    questions: G.questions, qIdx: G.qIdx,
    score: G.score, results: G.results,
    elapsed: Math.round((Date.now() - G.startTime) / 1000)
  };
  try { localStorage.setItem(SESSION_KEY, JSON.stringify(state)); } catch(e) {}
}

function clearSession() {
  try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
}

function loadSession() {
  try { const r = localStorage.getItem(SESSION_KEY); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}

function resumeQuiz() {
  const s = loadSession();
  if (!s) return;
  G.theme = s.theme; G.diff = s.diff; G.timer = s.timer;
  G.questions = s.questions; G.qIdx = s.qIdx;
  G.score = s.score; G.results = s.results; G.selected = [];
  G.startTime = Date.now() - s.elapsed * 1000;
  showView('quiz');
  renderQ();
}

  const s = loadSession();
  const el = document.getElementById('resume-banner');

  const th = THEMES.find(t => t.name === s.theme);

      <div>
        <div style="font-weight:700;font-size:.95rem;">⏸️ Partie en cours</div>
        <div style="color:var(--muted);font-size:.82rem;margin-top:.2rem;">${th ? th.icon : ''} ${s.theme} · ${s.diff} · Question ${s.qIdx + 1}/10 · ${s.score} bonne${s.score > 1 ? 's' : ''}</div>
      </div>

// ============================================================
// QUIZ START
// ============================================================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  const pool = shuffle([...QUESTIONS[G.theme][G.diff]]);
  G.questions = pool.slice(0, 10);
  G.qIdx = 0; G.score = 0; G.results = []; G.selected = [];
  G.startTime = Date.now();
  showView('quiz');
  renderQ();
}

// ============================================================
// RENDER QUESTION
// ============================================================
function shuffleOptions(q) {
  const n = q.o.length;
  const order = Array.from({length: n}, (_, i) => i);
  for (let i = n - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  const oldC = q.c.slice();
  q.o = order.map(i => q.o[i]);
  q.c = order.reduce((acc, oldIdx, newIdx) => {
    if (oldC.includes(oldIdx)) acc.push(newIdx);
    return acc;
  }, []);
}

function renderQ() {
  const q = G.questions[G.qIdx];
  shuffleOptions(q);
  G.selected = [];

  document.getElementById('q-counter').textContent = `Q ${G.qIdx+1}/10`;
  document.getElementById('prog-fill').style.width = `${G.qIdx * 10}%`;

  const card = document.getElementById('question-card');
  card.innerHTML = `
    <div class="q-num">Question ${G.qIdx+1} sur 10</div>
    <div class="q-text">${q.q}</div>
    <div class="q-hint">Sélectionnez la ou les bonne(s) réponse(s)</div>
    <div class="options">
      ${q.o.map((opt,i) => `
        <div class="option" id="opt${i}" onclick="toggleOpt(${i})">
          <div class="opt-box" id="box${i}"></div>
          <span class="opt-text">${opt}</span>
        </div>`).join('')}
    </div>
    <button class="btn-primary validate-btn" id="val-btn" onclick="validate()">Valider</button>
  `;

  const tel = document.getElementById('timer-el');
  if (G.timer) { tel.classList.remove('hidden'); startTimer(); }
  else { tel.classList.add('hidden'); clearTimer(); }
  saveSession();
}

function toggleOpt(i) {
  const el = document.getElementById('opt'+i);
  if (el.classList.contains('locked')) return;
  const box = document.getElementById('box'+i);
  if (G.selected.includes(i)) {
    G.selected = G.selected.filter(x => x !== i);
    el.classList.remove('chosen'); box.textContent = '';
  } else {
    G.selected.push(i);
    el.classList.add('chosen'); box.textContent = '✓';
  }
}

// ============================================================
// VALIDATE
// ============================================================
function validate() {
  clearTimer();
  const q = G.questions[G.qIdx];
  const corr = q.c;
  const allOk = corr.every(c => G.selected.includes(c));
  const noWrong = G.selected.every(s => corr.includes(s));
  const isOk = allOk && noWrong;
  if (isOk) G.score++;

  G.results.push({ ok: isOk, q: q.q, opts: q.o, sel: [...G.selected], corr });

  // Animations
  if (isOk) triggerFlash('green');
  else triggerShakeAndFlash();

  // Show feedback
  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.add('locked');
    const box = document.getElementById('box'+i);
    if (corr.includes(i) && G.selected.includes(i)) {
      el.classList.remove('chosen'); el.classList.add('correct'); box.textContent = '✓';
    } else if (!corr.includes(i) && G.selected.includes(i)) {
      el.classList.remove('chosen'); el.classList.add('wrong'); box.textContent = '✗';
    } else if (corr.includes(i) && !G.selected.includes(i)) {
      el.classList.add('missed'); box.textContent = '!';
    }
  });

  // Fun fact
  const fact = FUN_FACTS[q.q];
  if (fact) {
    const card = document.getElementById('question-card');
    const ff = document.createElement('div');
    ff.className = 'fun-fact';
    ff.innerHTML = `<div class="ff-lbl">💡 Le savais-tu ?</div>${fact}`;
    ff.style.display = 'block';
    card.appendChild(ff);
  }

  const btn = document.getElementById('val-btn');
  btn.textContent = G.qIdx < 9 ? 'Question suivante →' : 'Voir les résultats →';
  btn.onclick = nextQ;
}

function nextQ() {
  G.qIdx++;
  if (G.qIdx >= 10) showResults();
  else renderQ();
}

// ============================================================
// TIMER
// ============================================================
function startTimer() {
  G.timerVal = 15;
  const el = document.getElementById('timer-el');
  el.textContent = 15; el.className = 'timer-circle';
  G.interval = setInterval(() => {
    G.timerVal--;
    el.textContent = G.timerVal;
    if (G.timerVal <= 5) el.className = 'timer-circle danger';
    else if (G.timerVal <= 8) el.className = 'timer-circle warn';
    if (G.timerVal <= 0) { clearTimer(); validate(); }
  }, 1000);
}

function clearTimer() {
  if (G.interval) { clearInterval(G.interval); G.interval = null; }
}

// ============================================================
// RESULTS
// ============================================================
function showResults() {
  clearTimer();
  clearSession();
  const elapsed = Math.round((Date.now() - G.startTime) / 1000);

  // Update profile
  const p = loadProfile(); ensureThemes(p);
  const prevLevel = getLevel(p.xp || 0);
  p.themes[G.theme].played++;
  p.themes[G.theme].correct += G.score;
  p.themes[G.theme].total += 10;
  p.themes[G.theme].timeSpent += elapsed;
  if (G.score === 10) p.themes[G.theme].hadPerfect = true;
  p.totalGames++; p.totalTime += elapsed;

  // XP
  const diffMult = {Facile:1, Moyen:1.5, Difficile:2}[G.diff] || 1;
  const timerBonus = G.timer ? 1.3 : 1;
  const xpEarned = Math.round(G.score * 10 * diffMult * timerBonus);
  if (!p.xp) p.xp = 0;
  p.xp += xpEarned;
  saveProfile(p);

  const newLevel = getLevel(p.xp);
  setTimeout(() => showXpPopup(xpEarned), 600);
  if (newLevel > prevLevel) setTimeout(() => showLevelUp(newLevel), 1400);

  let msg = G.score === 10 ? '🏆 Score parfait ! Félicitations !'
          : G.score >= 8  ? '🌟 Excellent résultat !'
          : G.score >= 6  ? '👍 Très bien !'
          : G.score >= 4  ? '💪 Pas mal, continuez !'
          : '📚 Révisez et réessayez !';

  const wrong = G.results.filter(r => !r.ok);
  const wrongHtml = wrong.length > 0
    ? `<div class="recap-title">❌ Questions manquées (${wrong.length}/${G.results.length})</div>
       ${wrong.map(r => `
        <div class="recap-item ko">
          <div class="recap-q">${r.q}</div>
          <div class="recap-user">Votre réponse : ${r.sel.length ? r.sel.map(i=>r.opts[i]).join(', ') : '(aucune)'}</div>
          <div class="recap-ok">✅ Réponse(s) correcte(s) : ${r.corr.map(i=>r.opts[i]).join(', ')}</div>
        </div>`).join('')}`
    : `<div class="recap-title">✅ Toutes les questions réussies !</div>`;

  document.getElementById('results-content').innerHTML = `
    <div class="score-hero">
      <div class="score-big">${G.score}<span style="font-size:2.5rem;opacity:.4">/10</span></div>
      <div class="score-sub">${G.theme} · ${G.diff}</div>
      <div class="score-msg">${msg}</div>
      <div style="margin-top:.75rem;font-size:.88rem;color:#E67E22;font-weight:600;">+${xpEarned} XP gagnés</div>
    </div>
    ${wrongHtml}
    <div class="btn-row">
      <button class="btn-primary" onclick="startQuiz()">🔄 Rejouer</button>
      <button class="btn-back" onclick="showView('themes')">🏠 Accueil</button>
    </div>
  `;
  showView('results');
}

function formatTime(s) {
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
  return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
}

function renderProfile() {
  const p = loadProfile(); ensureThemes(p);
  let gc = 0, gt = 0, favName = '–', maxP = 0;
  THEMES.forEach(t => {
    const td = p.themes[t.name];
    gc += td.correct; gt += td.total;
    if (td.played > maxP) { maxP = td.played; favName = t.icon + ' ' + t.name; }
  });
  const rate = gt > 0 ? Math.round(gc / gt * 100) : 0;

  // XP bar
  if (!p.xp) p.xp = 0;
  const lvl = getLevel(p.xp);
  const xpCur = p.xp - xpForLevel(lvl);
  const xpNext = xpForLevel(lvl + 1) - xpForLevel(lvl);
  const pct = lvl >= 99 ? 100 : Math.round(xpCur / xpNext * 100);
  const levelNames = ['','Apprenti','Curieux','Lettré','Érudit','Chercheur','Savant','Éclairé','Champion','Virtuose','Maître','Visionnaire','Sage','Légende','Oracle','Immortel'];
  const lvlName = levelNames[Math.min(lvl, levelNames.length-1)] || `Niveau ${lvl}`;
  document.getElementById('xp-card').innerHTML = `
    <div class="xp-header">
      <span class="xp-level">⭐ Niveau ${lvl}</span>
      <span class="xp-label">${lvlName} · ${p.xp.toLocaleString()} XP total</span>
    </div>
    <div class="xp-track"><div class="xp-fill" style="width:${pct}%"></div></div>
    <div class="xp-sub">${lvl < 99 ? `${xpCur} / ${xpNext} XP vers niveau ${lvl+1}` : 'Niveau maximum atteint ! 🏆'}</div>
  `;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-val">${p.totalGames}</div>
      <div class="stat-lbl">Parties jouées</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${rate}%</div>
      <div class="stat-lbl">Taux de réussite global</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${formatTime(p.totalTime)}</div>
      <div class="stat-lbl">Temps total passé</div>
    </div>
    <div class="stat-card">
      <div class="stat-val sm">${maxP > 0 ? favName : '–'}</div>
      <div class="stat-lbl">Thématique préférée</div>
    </div>
  `;

  // Theme bars
  const THEME_COLORS = ['#C0392B','#27AE60','#2980B9','#D35400','#8E44AD','#16A085','#B7950B','#D81B60','#1A237E','#37474F'];
  document.getElementById('theme-bars-content').innerHTML = THEMES.map((t, i) => {
    const td = p.themes[t.name];
    const pctT = td.total > 0 ? Math.round(td.correct / td.total * 100) : 0;
    return `<div class="tb-row">
      <span class="tb-name">${t.icon} ${t.name}</span>
      <div class="tb-track"><div class="tb-fill" style="width:${pctT}%;background:${THEME_COLORS[i]}"></div></div>
      <span class="tb-pct">${pctT}%</span>
    </div>`;
  }).join('');

  // Badges
  const unlocked = checkBadges(p);
  document.getElementById('badges-grid').innerHTML = ALL_BADGES.map(b => {
    const on = unlocked.has(b.id);
    return `<div class="badge ${on?'unlocked':'locked'}">
      <span class="b-icon">${b.icon}</span>
      <div class="b-name">${b.name}</div>
      <div class="b-cond">${on ? '✅ Débloqué' : b.cond}</div>
    </div>`;
  }).join('');

  drawRadar(p);
}

function drawRadar(p) {
  const canvas = document.getElementById('radar-canvas');
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const n = THEMES.length;
  const r = Math.min(W, H) * 0.3;
  const labelR = r + 42;
  const step = (2 * Math.PI) / n;

  const data = THEMES.map(t => {
    const td = p.themes[t.name];
    return td.total > 0 ? td.correct / td.total : 0;
  });

  // Grid
  for (let lv = 1; lv <= 5; lv++) {
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const a = i * step - Math.PI / 2;
      const x = cx + (r * lv / 5) * Math.cos(a);
      const y = cy + (r * lv / 5) * Math.sin(a);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = '#E0D0BC'; ctx.lineWidth = 1; ctx.stroke();
  }

  // Axes
  for (let i = 0; i < n; i++) {
    const a = i * step - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
    ctx.strokeStyle = '#E0D0BC'; ctx.lineWidth = 1; ctx.stroke();
  }

  // Data polygon
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const a = i * step - Math.PI / 2;
    const x = cx + r * data[i] * Math.cos(a);
    const y = cy + r * data[i] * Math.sin(a);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(44,44,44,0.12)'; ctx.fill();
  ctx.strokeStyle = '#2C2C2C'; ctx.lineWidth = 2.5; ctx.stroke();

  // Dots
  for (let i = 0; i < n; i++) {
    const a = i * step - Math.PI / 2;
    const x = cx + r * data[i] * Math.cos(a);
    const y = cy + r * data[i] * Math.sin(a);
    ctx.beginPath(); ctx.arc(x, y, 4, 0, 2*Math.PI);
    ctx.fillStyle = '#2C2C2C'; ctx.fill();
  }

  // Labels
  for (let i = 0; i < n; i++) {
    const a = i * step - Math.PI / 2;
    const lx = cx + labelR * Math.cos(a);
    const ly = cy + labelR * Math.sin(a);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#2C2C2C'; ctx.font = 'bold 13px "Segoe UI", sans-serif';
    ctx.fillText(THEMES[i].icon + ' ' + THEMES[i].name, lx, ly);
    ctx.fillStyle = '#888'; ctx.font = '11px "Segoe UI", sans-serif';
    const pct = p.themes[THEMES[i].name].total > 0
      ? Math.round(p.themes[THEMES[i].name].correct / p.themes[THEMES[i].name].total * 100) : 0;
    ctx.fillText(pct + '%', lx, ly + 17);
  }
}

// ============================================================
// XP & LEVELS
// ============================================================
function xpForLevel(n) {
  if (n <= 0) return 0;
  return Math.round(100 * n * Math.log(n + 1));
}
function getLevel(totalXp) {
  let lvl = 0;
  for (let n = 1; n <= 99; n++) {
    if (totalXp >= xpForLevel(n)) lvl = n; else break;
  }
  return lvl;
}

function checkBadges(p) {
  const unlocked = new Set(p.badges || []);
  const prev = unlocked.size;
  const lvl = getLevel(p.xp || 0);
  if (lvl >= 10) unlocked.add('lvl10');
  if (lvl >= 20) unlocked.add('lvl20');
  if (lvl >= 30) unlocked.add('lvl30');
  if (lvl >= 40) unlocked.add('lvl40');
  if (lvl >= 50) unlocked.add('lvl50');
  if (lvl >= 60) unlocked.add('lvl60');
  if (lvl >= 70) unlocked.add('lvl70');
  if (lvl >= 80) unlocked.add('lvl80');
  if (lvl >= 90) unlocked.add('lvl90');
  // Perfect score
  if (p.themes) {
    let anyPerfect = false;
    THEMES.forEach(t => { if (p.themes[t.name] && p.themes[t.name].hadPerfect) anyPerfect = true; });
    if (anyPerfect) unlocked.add('perfect');
  }
  // Polymath: played ≥5 different themes
  const playedThemes = THEMES.filter(t => p.themes && p.themes[t.name] && p.themes[t.name].played > 0).length;
  if (playedThemes >= 5) unlocked.add('polymath');
  // Games count
  if ((p.totalGames || 0) >= 10) unlocked.add('persist');
  if ((p.totalGames || 0) >= 50) unlocked.add('marathon');
  // Global success
  let gc = 0, gt = 0;
  THEMES.forEach(t => { if (p.themes && p.themes[t.name]) { gc += p.themes[t.name].correct; gt += p.themes[t.name].total; } });
  if (gt >= 20 && gc / gt >= 0.8) unlocked.add('master');
  // Theme badges
  THEMES.forEach(t => {
    const td = p.themes && p.themes[t.name];
    if (td && td.total >= 20 && td.correct / td.total >= 0.8) unlocked.add('th_' + t.name);
  });
  // Save if new badges
  if (unlocked.size > prev) { p.badges = [...unlocked]; saveProfile(p); }
  return unlocked;
}

let D = {
  names: ['Joueur 1','Joueur 2'],
  questions: [], qIdx: 0, turn: 0,
  scores: [0, 0], results: [[], []],
  theme: 'Histoire', diff: 'Facile',
  selected: [],
};

function showDuelSetup() {
  // Build theme toggle buttons
  const row = document.getElementById('duel-theme-row');
  row.innerHTML = THEMES.map((t, i) =>
    `<button class="toggle-btn${i===0?' active':''}" style="flex:0 0 auto;padding:.5rem .6rem;font-size:.78rem;" onclick="selectDuelTheme('${t.name}',this)">${t.icon} ${t.name}</button>`
  ).join('');
  D.theme = 'Histoire'; D.diff = 'Facile';
  showView('duel-setup');
}
function selectDuelTheme(name, btn) {
  D.theme = name;
  document.getElementById('duel-theme-row').querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function selectDuelDiff(d, btn) {
  D.diff = d;
  document.getElementById('duel-diff-row').querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function startDuel() {
  D.names[0] = document.getElementById('p1-name').value.trim() || 'Joueur 1';
  D.names[1] = document.getElementById('p2-name').value.trim() || 'Joueur 2';
  D.questions = shuffle([...QUESTIONS[D.theme][D.diff]]).slice(0, 10);
  D.qIdx = 0; D.turn = 0; D.scores = [0, 0]; D.results = [[], []]; D.selected = [];
  showView('duel-quiz');
  renderDuelQ();
}
function renderDuelQ() {
  const q = D.questions[D.qIdx];
  if (D.turn === 0) shuffleOptions(q);
  D.selected = [];
  document.getElementById('duel-q-counter').textContent = `Q ${D.qIdx+1}/10`;
  document.getElementById('duel-prog-fill').style.width = `${D.qIdx * 10}%`;
  const tag = document.getElementById('duel-player-tag');
  tag.innerHTML = `<span class="${D.turn===0?'p1-tag':'p2-tag'}">${D.names[D.turn]} joue</span>`;
  const card = document.getElementById('duel-question-card');
  card.innerHTML = `
    <div class="q-num">Question ${D.qIdx+1} sur 10</div>
    <div class="q-text">${q.q}</div>
    <div class="q-hint">Sélectionnez la ou les bonne(s) réponse(s)</div>
    <div class="options">
      ${q.o.map((opt,i) => `
        <div class="option" id="dopt${i}" onclick="toggleDuelOpt(${i})">
          <div class="opt-box" id="dbox${i}"></div>
          <span class="opt-text">${opt}</span>
        </div>`).join('')}
    </div>
    <button class="btn-primary validate-btn" id="dval-btn" onclick="validateDuel()">Valider</button>
  `;
}
function toggleDuelOpt(i) {
  const el = document.getElementById('dopt'+i);
  if (el.classList.contains('locked')) return;
  const box = document.getElementById('dbox'+i);
  if (D.selected.includes(i)) {
    D.selected = D.selected.filter(x=>x!==i);
    el.classList.remove('chosen'); box.textContent = '';
  } else {
    D.selected.push(i);
    el.classList.add('chosen'); box.textContent = '✓';
  }
}
function validateDuel() {
  const q = D.questions[D.qIdx];
  const corr = q.c;
  const allOk = corr.every(c => D.selected.includes(c));
  const noWrong = D.selected.every(s => corr.includes(s));
  const isOk = allOk && noWrong;
  if (isOk) { D.scores[D.turn]++; triggerFlash('green'); }
  else triggerShakeAndFlash('duel-question-card');
  D.results[D.turn].push({ ok: isOk, q: q.q });
  // Show feedback
  document.querySelectorAll('#duel-question-card .option').forEach((el, i) => {
    el.classList.add('locked');
    const box = document.getElementById('dbox'+i);
    if (corr.includes(i) && D.selected.includes(i)) { el.classList.remove('chosen'); el.classList.add('correct'); box.textContent='✓'; }
    else if (!corr.includes(i) && D.selected.includes(i)) { el.classList.remove('chosen'); el.classList.add('wrong'); box.textContent='✗'; }
    else if (corr.includes(i) && !D.selected.includes(i)) { el.classList.add('missed'); box.textContent='!'; }
  });
  // Fun fact
  const fact = FUN_FACTS[q.q];
  if (fact) {
    const card = document.getElementById('duel-question-card');
    const ff = document.createElement('div');
    ff.className = 'fun-fact'; ff.style.display = 'block';
    ff.innerHTML = `<div class="ff-lbl">💡 Le savais-tu ?</div>${fact}`;
    card.appendChild(ff);
  }
  const btn = document.getElementById('dval-btn');
  if (D.turn === 0) {
    btn.textContent = `Passer à ${D.names[1]} →`;
    btn.onclick = () => { D.turn = 1; D.selected = []; renderDuelQ(); };
  } else {
    D.qIdx++;
    if (D.qIdx >= 10) { btn.textContent = 'Voir les résultats →'; btn.onclick = showDuelResults; }
    else { btn.textContent = `Passer à ${D.names[0]} →`; btn.onclick = () => { D.turn = 0; D.selected = []; renderDuelQ(); }; }
  }
}
function showDuelResults() {
  const s0 = D.scores[0], s1 = D.scores[1];

  // Save profile stats & XP
  const p = loadProfile(); ensureThemes(p);
  const prevLevel = getLevel(p.xp || 0);
  const totalCorrect = s0 + s1;
  p.themes[D.theme].played++;
  p.themes[D.theme].correct += totalCorrect;
  p.themes[D.theme].total += 20;
  if (s0 === 10 || s1 === 10) p.themes[D.theme].hadPerfect = true;
  p.totalGames++;
  if (!p.xp) p.xp = 0;
  const diffMult = {Facile:1, Moyen:1.5, Difficile:2}[D.diff] || 1;
  const xpEarned = Math.round(totalCorrect * 5 * diffMult);
  p.xp += xpEarned;
  saveProfile(p);
  const newLevel = getLevel(p.xp);
  setTimeout(() => showXpPopup(xpEarned), 600);
  if (newLevel > prevLevel) setTimeout(() => showLevelUp(newLevel), 1400);

  const winner = s0 > s1 ? D.names[0] : s1 > s0 ? D.names[1] : null;
  const winMsg = winner ? `🏆 ${winner} remporte le duel !` : '🤝 Égalité parfaite !';
  document.getElementById('duel-results-content').innerHTML = `
    <div class="score-hero" style="margin-bottom:1rem;">
      <div style="font-size:1.6rem;font-weight:900;margin-bottom:.5rem;">⚔️ Résultat du duel</div>
      <div class="duel-scores">
        <div class="dsc p1"><div style="font-size:.9rem;font-weight:700;opacity:.8">${D.names[0]}</div><div class="dsc-big">${s0}/10</div></div>
        <div class="dsc p2"><div style="font-size:.9rem;font-weight:700;opacity:.8">${D.names[1]}</div><div class="dsc-big">${s1}/10</div></div>
      </div>
      <div class="duel-winner">${winMsg}</div>
      <div style="margin-top:.75rem;font-size:.88rem;color:#E67E22;font-weight:600;">+${xpEarned} XP gagnés</div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="startDuel()">🔄 Rejouer</button>
      <button class="btn-back" onclick="showView('themes')">🏠 Accueil</button>
    </div>
  `;
  showView('duel-results');
}

"Quel pays est surnommé « le pays du Soleil Levant » ?":"Le Japon est composé de plus de 6 800 îles et est situé dans la Ceinture de feu du Pacifique. En 2021, il comptait plus de 86 000 centenaires — le plus grand nombre par habitant au monde.",
"Quelle mer sépare l'Europe de l'Afrique au niveau du détroit de Gibraltar ?":"Le détroit de Gibraltar n'a que 14 km à son point le plus étroit. Les Colonnes d'Hercule marquaient pour les Grecs la fin du monde connu et le début des mers dangereuses.",
"Quelle est la capitale de l'Italie ?":"Rome est surnommée la « Ville éternelle » et a été habitée continuellement depuis plus de 2 800 ans. Le Vatican, enclavé dans Rome, est le plus petit État souverain du monde.",
"Quel est le plus grand désert chaud du monde ?":"Le Sahara (9,2 millions de km²) n'a pas toujours été désertique : il y a 10 000 ans, il était verdoyant et peuplé d'hippopotames, de crocodiles et d'humains.",
"Quelle est la capitale du Royaume-Uni ?":"Londres fut fondée par les Romains vers 43 ap. J.-C. sous le nom de Londinium. Avec 14 millions d'habitants dans son aire urbaine, c'est la plus grande ville du Royaume-Uni.",
"Quel continent est le plus grand en superficie ?":"L'Asie couvre 44,6 millions de km² et abrite 4,7 milliards de personnes — 60% de la population mondiale. Elle contient à la fois le point le plus haut (Everest) et le plus bas (Mer Morte) sur Terre.",
"Quelle est la capitale de la Chine ?":"Pékin (Beijing = « capitale du Nord ») fut capitale impériale pendant ~700 ans. La Cité interdite compte, selon la tradition, 9 999 pièces — une de moins que le palais céleste.",
"Quel fleuve traverse Paris ?":"La Seine fait 775 km de long, de sa source en Côte-d'Or jusqu'à son estuaire au Havre. Paris compte 37 ponts sur la Seine, dont le Pont Neuf, le plus ancien (1578), malgré son nom.",
"Quelle est la plus grande île du monde ?":"Le Groenland (2,16 millions de km²) est recouvert à 80% par un glacier. Sa fonte complète élèverait les océans de 7 mètres, engloutissant des millions de kilomètres de côtes.",
"Dans quel pays se trouve la Tour de Pise ?":"La Tour de Pise penchait déjà en cours de construction au XIIe siècle. Des travaux de 1990–2001 l'ont redressée de 44 cm, stabilisant son inclinaison pour environ 200 ans.",
"Quelle est la capitale de l'Australie ?":"Canberra fut choisie comme capitale en 1908 pour éviter la rivalité Sydney–Melbourne. Son nom viendrait du mot aborigène « Kamberra », signifiant « lieu de rassemblement ».",
"Quelle est la capitale de l'Espagne ?":"Madrid est la capitale la plus haute d'Europe occidentale (667 m). Elle est devenue la capitale de l'Espagne en 1561 sous Philippe II, qui y transféra la cour depuis Tolède.",
"Sur quel continent se trouve l'Égypte ?":"95% des Égyptiens vivent dans la vallée du Nil, qui ne représente que 4% du territoire. La péninsule du Sinaï se trouve techniquement en Asie : l'Égypte est un pays transcontinental.",
"Quelle est la capitale du Japon ?":"Tokyo, avec 37 millions d'habitants dans son aire urbaine, est la plus grande agglomération du monde. Elle s'appelait Edo et n'est devenue Tokyo (« capitale de l'Est ») qu'en 1868.",
// GÉOGRAPHIE MOYEN
"Quelle est la capitale du Canada ?":"Ottawa fut choisie comme capitale par la reine Victoria en 1857, pour son éloignement de la frontière américaine et pour équilibrer les rivalités entre Toronto et Montréal.",
"Quel est le lac le plus profond du monde ?":"Le lac Baïkal (1 642 m de profondeur) contient ~20% de l'eau douce liquide non gelée de la planète. Il héberge 1 200 espèces animales uniques au monde, dont l'unique espèce de phoque d'eau douce.",
"Quelle chaîne de montagnes constitue la frontière naturelle entre l'Europe et l'Asie ?":"L'Oural s'étend sur 2 500 km du nord au sud. Ses plus hauts sommets ne dépassent pas 1 895 m — l'une des plus basses frontières continentales du monde.",
"Dans quel pays se trouve le Machu Picchu ?":"Machu Picchu est construit sur une crête à 2 430 m d'altitude. Ses pierres sont assemblées sans mortier avec une précision telle qu'une lame de couteau ne peut pas passer entre deux blocs.",
"Quelle est la capitale de l'Inde ?":"New Delhi fut construite par les Britanniques entre 1911 et 1931 pour remplacer Calcutta comme capitale des Indes. L'architecte Edwin Lutyens en conçut le plan en seulement quelques semaines.",
"Quel pays est le plus peuplé du monde en 2024 ?":"L'Inde a dépassé la Chine en nombre d'habitants en 2023, avec 1,43 milliard de personnes. Contrairement à la Chine, elle n'a jamais eu de politique de l'enfant unique.",
"Quel est le plus long fleuve d'Amérique du Sud ?":"L'Amazone débite 209 000 m³/s dans l'Atlantique — 20% de tout le débit d'eau douce mondiale qui rejoint les océans. Certains le considèrent aussi comme le plus long fleuve du monde.",
"Dans quel pays se trouve le mont Kilimandjaro ?":"Le Kilimandjaro (5 895 m) est un stratovolcan dont le sommet glaciaire est en train de fondre à cause du réchauffement climatique. Il pourrait perdre 85% de sa glace d'ici 2033.",
"Quelle est la capitale de la Turquie ?":"Ankara est une petite ville de 30 000 habitants quand Atatürk en fait la capitale en 1923. Aujourd'hui elle compte 5 millions d'habitants, loin de l'ancienne capitale Istanbul.",
"Quelle est la plus grande ville d'Afrique par sa population ?":"Lagos (Nigeria) héberge entre 15 et 20 millions d'habitants selon les estimations. Elle croît si vite qu'elle pourrait devenir la plus grande ville du monde d'ici 2100.",
"Entre quels deux pays le lac Titicaca est-il partagé ?":"Le lac Titicaca (3 812 m d'altitude) est le plus grand lac navigable du monde en termes de surface. Il abrite les Uros, un peuple vivant sur des îles flottantes en roseaux.",
"Quel est le point culminant de l'Afrique ?":"Le Kilimandjaro est le seul « toit du continent » accessible à des randonneurs non expérimentés — sans matériel d'alpinisme. Pourtant, son altitude et ses conditions climatiques le rendent exigeant.",
"Quelle est la capitale du Mexique ?":"Mexico City est construite sur les ruines de Tenochtitlan, l'ancienne capitale aztèque, qui était bâtie sur un lac. La ville s'enfonce de ~50 cm par an à cause du pompage des eaux souterraines.",
"Quelle est la capitale de l'Argentine ?":"Buenos Aires (« bons vents ») fut fondée deux fois par les Espagnols : en 1535 (chassés par les Indiens) et définitivement en 1580. Son architecture lui vaut le surnom de « Paris de l'Amérique du Sud ».",
"Quel est le plus long fleuve d'Europe ?":"La Volga (3 531 km) coule entièrement en Russie et se jette dans la mer Caspienne. Elle représente ~33% du débit total des fleuves russes européens.",
"Quel est le plus grand lac d'eau douce du monde par superficie ?":"Le lac Supérieur (82 103 km²) est si grand qu'il génère son propre micro-climat. Sa profondeur atteint 406 m et il contient 10% des réserves mondiales d'eau douce de surface.",
"Quelle frontière terrestre est la plus longue du monde ?":"La frontière entre le Canada et les États-Unis mesure 8 891 km — 12 185 km avec l'Alaska. Elle est la frontière internationale la plus longue et est presque entièrement non militarisée.",
"Quels pays sont traversés par le tropique du Cancer ?":"Le tropique du Cancer (23°26' N) traverse 16 pays : Mexique, Bahamas, Mauritanie, Mali, Algérie, Libye, Égypte, Arabie saoudite, Émirats, Oman, Inde, Bangladesh, Myanmar, Chine, Taïwan et Philippines.",
"Quel détroit sépare l'Amérique du Nord de l'Asie ?":"Le détroit de Béring ne fait que 82 km de large à son point le plus étroit. Pendant les glaciations, il formait un « pont terrestre » par lequel les premiers humains ont peuplé les Amériques il y a ~20 000 ans.",
"Quelle est la capitale de la Corée du Sud ?":"Séoul héberge environ 10 millions d'habitants intra-muros et 25 millions dans son aire urbaine, soit la moitié de la population sud-coréenne. C'est l'une des villes les plus denses au monde.",
// GÉOGRAPHIE DIFFICILE
"Combien de pays la Russie et la Chine ont-elles chacune en commun comme plus grand nombre de voisins terrestres ?":"La Russie partage ses frontières avec : Norvège, Finlande, Estonie, Lettonie, Lituanie, Pologne, Biélorussie, Ukraine, Géorgie, Azerbaïdjan, Kazakhstan, Mongolie, Chine et Corée du Nord.",
"Quelle est la capitale du Kazakhstan depuis 2022 (après avoir été Nur-Sultan) ?":"La ville fut fondée en 1830 sous le nom d'Akmolinsk, rebaptisée Tselinograd, puis Akmola, puis Astana en 1998, Nur-Sultan en 2019 en hommage à l'ex-président, puis Astana à nouveau en 2022.",
"Quel est le plus petit État souverain du monde ?":"Le Vatican n'occupe que 0,44 km² pour environ 800 habitants. C'est le seul État au monde dont toute la superficie est classée au patrimoine mondial de l'UNESCO.",
"Quel est le point le plus bas de la surface terrestre ?":"La mer Morte est à ~430 m sous le niveau de la mer et baisse de ~1 m par an en raison des détournements du Jourdain. Sa salinité (34%) empêche tout organisme de s'y développer.",
"La mer Caspienne est-elle techniquement un lac ou une mer ?":"La mer Caspienne (371 000 km²) est le plus grand lac du monde par sa superficie. Malgré son nom, elle est enclavée, sans accès aux océans. Ses eaux sont légèrement salées.",
"Quelle est la capitale du Népal ?":"Katmandou est située à 1 400 m d'altitude dans une vallée himalayenne. Elle fut fondée au VIIIe siècle et est entourée de 7 des 14 sommets de plus de 8 000 m dans un rayon de 150 km.",
"Quel pays possède la plus forte densité de population en excluant les micro-États ?":"Le Bangladesh concentre ~170 millions d'habitants sur 147 570 km², soit une densité de ~1 150 hab/km². C'est l'équivalent de la population du Pakistan entassée dans la moitié de la France.",
"Quelle est la capitale du Myanmar (Birmanie) ?":"Naypyidaw fut construite en secret par la junte militaire et inaugurée le 6 novembre 2005 (à 6h37 du matin, heure jugée favorable par les astrologues). Elle est quasi-déserte malgré sa superficie.",
"Quel est le plus grand delta du monde en superficie ?":"Le delta du Gange-Brahmapoutre (Sundarbans, 105 000 km²) est partagé entre le Bangladesh et l'Inde. Il abrite la plus grande forêt de mangroves du monde et est particulièrement vulnérable au changement climatique.",
"À quelle latitude approximative se situe Paris ?":"Paris (48°52'N) est plus proche du pôle Nord que de l'équateur. À la même latitude se trouvent Vancouver (Canada), Minsk (Biélorussie) et l'Île de Vancouver.",
"Quel canal relie la mer Rouge à la Méditerranée ?":"Le canal de Suez (193 km) a été inauguré en 1869. Il réduit de ~7 000 km le trajet entre l'Europe et l'Asie. En 2021, le porte-conteneurs Ever Given l'a bloqué 6 jours, coûtant ~9 milliards de dollars par jour.",
"Quel fleuve forme en grande partie la frontière entre l'Argentine et l'Uruguay ?":"Le Río de la Plata est en réalité le plus large estuaire du monde (220 km à son embouchure). Il est si large que depuis Buenos Aires on ne peut pas voir la rive uruguayenne.",
"Dans quel pays se trouve l'isthme de Panama ?":"L'isthme de Panama sépare les océans Atlantique et Pacifique sur seulement 80 km. Son canal (inauguré 1914) permet le passage de ~14 000 navires par an, dont dépend 5% du commerce mondial.",
"Quel archipel est à la fois le plus à l'est et au centre du fuseau international de changement de date ?":"Kiribati (prononcé « Kiribass ») est le premier pays à voir se lever le soleil au Nouvel An. Il s'étend sur 3,5 millions de km² d'océan, mais ne représente que 811 km² de terres émergées.",
"Quel pays d'Afrique australe est entièrement enclavé dans l'Afrique du Sud ?":"Le Lesotho (30 355 km²) est entièrement enclavé dans l'Afrique du Sud — l'un des trois États entièrement enclavés dans un seul autre pays (avec le Vatican et Saint-Marin, enclavés en Italie).",
"Combien de pays partagent une frontière avec la France métropolitaine ?":"La France partage ses frontières avec : Belgique, Luxembourg, Allemagne, Suisse, Italie, Monaco, Andorre et Espagne. Elle est le pays ayant le plus de voisins en Europe occidentale.",
"Quel est le plus long tunnel ferroviaire sous-marin du monde ?":"Le tunnel du Seikan (Japon, 53,85 km) relie l'île de Honshū à Hokkaidō sous le détroit de Tsugaru. Construit entre 1961 et 1988, il reste le tunnel ferroviaire sous-marin le plus long du monde.",
"Quelle ville est la capitale administrative du Sri Lanka ?":"Sri Jayawardenepura Kotte est la capitale législative tandis que Colombo est la capitale commerciale et de facto. Ce statut double est le résultat d'une décision politique symbolique de 1982.",
"Dans quelle chaîne de montagnes se trouve le mont Blanc ?":"Le mont Blanc (4 808 m) est à cheval sur la France, l'Italie et la Suisse. Sa nationalité est disputée : la France et l'Italie revendiquent toutes deux le sommet, la frontière passant sur la crête.",
"Quelle est la capitale de la Mongolie ?":"Oulan-Bator (Ulaanbaatar = « Héros rouge ») est la capitale la plus froide du monde avec une température moyenne annuelle de -1,3°C. En hiver, elle peut descendre à -40°C.",
// SCIENCES FACILE
"Quel est l'élément le plus abondant dans l'atmosphère terrestre ?":"L'azote (N₂) représente 78% de l'atmosphère terrestre, contre seulement 21% pour l'oxygène. L'azote est chimiquement inerte et essentiel à la vie via le cycle de l'azote.",
"Quelle est la vitesse approximative de la lumière dans le vide ?":"La lumière parcourt 299 792 458 m/s — soit 1 079 252 848 km/h. Elle fait le tour de la Terre 7,5 fois par seconde et met ~1,3 secondes pour atteindre la Lune.",
"À qui attribue-t-on l'invention du téléphone ?":"Graham Bell a déposé son brevet le 14 février 1876, soit quelques heures avant Elisha Gray. Cette avance de quelques heures lui a valu la paternité officielle d'une invention qui a changé le monde.",
"Qui a formulé la loi de la gravitation universelle ?":"La légende de la pomme de Newton qui tomba n'est pas totalement fausse : il affirma lui-même que l'observation d'une pomme tombant l'avait inspiré dans sa réflexion sur la gravitation.",
"Qui a classé les éléments chimiques dans le premier tableau périodique ?":"Mendeleïev (1869) laissa des cases vides pour des éléments non encore découverts. Il prédit si précisément leurs propriétés que leur découverte ultérieure confirma brillamment son système.",
"Qui a proposé la théorie de l'évolution des espèces par sélection naturelle ?":"Darwin attendit 20 ans avant de publier L'Origine des espèces (1859), de peur des réactions religieuses. La réception du livre dépassa ses craintes : il se vendit entièrement le jour de sa sortie.",
"Quelle est la formule chimique de l'eau ?":"La molécule d'eau est asymétrique (angle de 104,5°), ce qui lui confère un moment dipolaire. C'est cette propriété qui explique la plupart des propriétés uniques de l'eau, comme sa tension de surface.",
"Quel processus permet aux plantes de produire leur nourriture grâce à la lumière ?":"La photosynthèse convertit ~1% de l'énergie solaire reçue en matière organique. Les plantes ont ainsi absorbé et stocké une quantité colossale d'énergie solaire — que nous brûlons sous forme de charbon.",
"Combien de planètes compte notre système solaire ?":"Depuis 2006, Pluton est reclassifiée en « planète naine ». Notre Soleil est entouré de 8 planètes, 5 planètes naines officielles, des centaines de lunes et des milliards de petits corps.",
"Qui a découvert la pénicilline ?":"Fleming découvrit la pénicilline par accident en 1928 : une moisissure contamina une boîte de Petri et tua les bactéries autour d'elle. Ce hasard a sauvé des centaines de millions de vies.",
"Quelle célèbre équation Albert Einstein a-t-il formulée ?":"E=mc² implique qu'une petite masse correspond à une énergie colossale. 1 gramme de matière converti en énergie libère l'équivalent de 21 kilotonnes de TNT — la puissance d'une petite bombe atomique.",
"Quelle est la formule chimique du sel de table ?":"Le chlorure de sodium (NaCl) fond à 801°C. Le sodium seul explose au contact de l'eau, le chlore seul est un gaz toxique, mais ensemble ils forment un sel inoffensif indispensable à la vie.",
"Quel organe pompe le sang dans le corps humain ?":"Le cœur humain bat ~100 000 fois par jour et pompe ~7 000 litres de sang. En 70 ans de vie, il bat ~2,5 milliards de fois — sans jamais s'arrêter pour se reposer.",
"En combien de minutes environ la lumière du Soleil met-elle pour atteindre la Terre ?":"La lumière du Soleil met 8 minutes 20 secondes pour nous parvenir. Cela signifie que nous voyons le Soleil tel qu'il était 8 minutes auparavant — nous observons donc le passé.",
"Quelle est la planète rouge de notre système solaire ?":"Mars doit sa couleur rougeâtre à l'oxyde de fer (rouille) qui recouvre sa surface. Elle possède le plus grand volcan du système solaire, l'Olympus Mons, qui culmine à 21 km.",
"Qu'est-ce qu'un virus par rapport à une bactérie ?":"Les virus ne sont pas des cellules vivantes : ils ne peuvent pas se reproduire seuls et ont besoin d'une cellule hôte. Avec ~30 nm en moyenne, ils sont 10 à 100 fois plus petits que les bactéries.",
"Quel scientifique est lié à la théorie de la relativité restreinte et générale ?":"Einstein a publié 4 articles révolutionnaires en 1905, dont la relativité restreinte et l'explication de l'effet photoélectrique. Cette annus mirabilis a transformé la physique moderne.",
"Quel est le numéro atomique de l'oxygène ?":"Le numéro atomique 8 signifie que l'oxygène possède 8 protons dans son noyau. C'est l'élément le plus abondant de la croûte terrestre (46%) et le troisième de l'univers après H et He.",
"Combien de bases azotées constituent l'ADN ?":"Les 4 bases de l'ADN (Adénine, Thymine, Guanine, Cytosine) s'associent par paires (A-T et G-C). Le génome humain contient ~3 milliards de paires de bases, soit l'équivalent de 1 000 romans.",
"Quelles affirmations sur l'ADN sont correctes ?":"Si on déroulait tout l'ADN d'une seule cellule humaine, il mesurerait ~2 mètres. Le corps humain contient ~37 000 milliards de cellules — soit environ 74 milliards de km d'ADN en tout.",
// SCIENCES MOYEN
"De quoi est composé le noyau atomique ?":"Le noyau atomique est 100 000 fois plus petit que l'atome entier. Si un atome était la taille d'un stade de football, son noyau serait un grain de sable au centre.",
"Combien de chromosomes une cellule humaine diploïde normale possède-t-elle ?":"Les 46 chromosomes humains, mis bout à bout, mesurent environ 2 mètres. Mais leur ADN est si condensé qu'il tient dans un noyau cellulaire d'à peine 6 micromètres de diamètre.",
"Quelle est la vitesse approximative du son dans l'air à 20 °C ?":"Le son voyage à 340 m/s dans l'air, mais à 1 500 m/s dans l'eau et à 5 000 m/s dans l'acier. C'est pourquoi on entend un train arriver avant de le voir — en posant l'oreille sur le rail.",
"Quelle valeur de pH est considérée comme neutre ?":"L'échelle de pH va de 0 (très acide) à 14 (très basique). Le sang humain doit rester entre 7,35 et 7,45 ; une variation de 0,3 peut être mortelle.",
"Comment appelle-t-on la division cellulaire qui produit deux cellules filles identiques ?":"La mitose produit des cellules génétiquement identiques à la cellule mère. Elle est à la base de la croissance et de la réparation tissulaire. Notre corps réalise ~3,8 millions de mitoses par seconde.",
"Qu'est-ce qu'une enzyme ?":"Les enzymes peuvent accélérer les réactions chimiques d'un facteur de 10⁶ à 10¹². Sans elles, les réactions qui se produisent en une milliseconde dans notre corps prendraient des millions d'années.",
"Quelle est la pression atmosphérique standard au niveau de la mer ?":"1 013 hPa correspond au poids d'une colonne d'air de toute l'atmosphère au-dessus d'un cm². Cela représente environ 10 tonnes de pression sur chaque m² de notre corps, compensée par la pression interne.",
"Quelle couche de l'atmosphère contient la couche d'ozone ?":"La stratosphère s'étend de 12 à 50 km d'altitude. La couche d'ozone absorbe 97 à 99% des rayons UV-B solaires. Sans elle, la vie terrestre telle qu'elle existe aujourd'hui serait impossible.",
"De quoi les protéines sont-elles constituées ?":"Il existe 20 acides aminés différents dans les protéines humaines. Les 3 milliards de paires de bases de l'ADN encodent ~20 000 protéines différentes, dont des milliers sont encore mal comprises.",
"Quelle est la masse volumique de l'eau liquide à 4 °C ?":"L'eau est maximalement dense à 4°C. En dessous de cette température, elle se dilate — c'est pourquoi la glace flotte sur l'eau. Si l'eau se comportait comme la plupart des liquides, les lacs gèleraient depuis le fond.",
"Comment s'appelle la réaction entre un acide et une base ?":"Une neutralisation acide-base produit de l'eau et un sel. Le sel de table (NaCl) est le produit de la neutralisation de l'acide chlorhydrique (HCl) par la soude (NaOH).",
"Quelle est la formule de l'énergie cinétique ?":"Ec = ½mv² explique pourquoi doubler la vitesse quadruple l'énergie cinétique. C'est pourquoi les accidents de voiture à 120 km/h sont 4 fois plus graves qu'à 60 km/h.",
"Environ combien de neurones compte le cerveau humain ?":"86 milliards de neurones forment jusqu'à 100 000 milliards de connexions synaptiques. Le cerveau humain consomme 20% de l'énergie totale du corps malgré son poids de seulement 1,3 kg.",
"Quelle loi décrit la relation entre pression et volume d'un gaz à température constante ?":"Boyle (1662) et Mariotte (1676) découvrirent indépendamment que P×V est constant à température fixe. Cette loi explique pourquoi une bouteille de plongée doit rester à l'ombre : la chaleur augmente la pression.",
"Quels sont les quatre groupes sanguins du système ABO ?":"Le groupe AB est le « receveur universel » et le groupe O le « donneur universel ». La découverte des groupes sanguins par Karl Landsteiner en 1901 a rendu les transfusions sûres et lui a valu le Nobel en 1930.",
"Qu'est-ce que l'ADN mitochondrial ?":"L'ADN mitochondrial (16 569 paires de bases) est hérité uniquement de la mère car seul l'ovule contribue des mitochondries à l'embryon. Il permet de retracer la lignée maternelle sur des milliers de générations.",
"Quel est le symbole chimique du fer ?":"Fe vient du latin « ferrum ». Le fer est l'élément le plus abondant de la Terre en masse totale (32%), concentré dans son noyau. Il est indispensable à l'hémoglobine qui transporte l'oxygène dans le sang.",
"Quelle est la structure de la molécule d'ADN ?":"Watson et Crick ont élucidé la double hélice en 1953 grâce notamment aux clichés de diffraction X de Rosalind Franklin. Cette découverte a révolutionné la biologie et ouvert l'ère de la génétique moléculaire.",
"Qu'est-ce que la respiration cellulaire produit principalement ?":"La respiration cellulaire produit de l'ATP (adénosine triphosphate), la « monnaie énergétique » universelle des cellules. Une cellule musculaire peut consommer jusqu'à 10 millions de molécules d'ATP par seconde.",
"Quels sont les composants de l'atome ?":"L'atome est presque entièrement vide : si le noyau était une balle de golf, les électrons orbiteraient à 2,5 km. La matière « solide » est en réalité presque essentiellement du vide.",
// SCIENCES DIFFICILE
"Quelle est la valeur approximative du nombre d'Avogadro ?":"6,022 × 10²³ mol⁻¹ : c'est le nombre d'atomes dans 12 grammes de carbone-12. Si on empilait autant de billes de 1 cm, la pile atteindrait 1 milliard d'années-lumière de hauteur.",
"Quel physicien a énoncé le principe d'incertitude qui limite la mesure simultanée de la position et de la quantité de mouvement ?":"Le principe d'Heisenberg (1927) implique que mesurer précisément la position d'une particule perturbe nécessairement son élan. Ce n'est pas une limitation technique mais une propriété fondamentale de la nature.",
"Que désigne la technologie CRISPR-Cas9 ?":"CRISPR-Cas9 est inspiré du système immunitaire des bactéries. Il permet de « couper-coller » l'ADN avec une précision inédite. Ses inventrices Charpentier et Doudna ont reçu le Nobel de chimie 2020.",
"Quelle loi de la thermodynamique définit le concept d'entropie ?":"Le 2e principe stipule que l'entropie d'un système isolé ne diminue jamais. L'entropie mesure le désordre : une tasse cassée ne se reconstitue jamais spontanément.",
"Qu'est-ce que la méiose ?":"La méiose produit des cellules haploïdes (23 chromosomes chez l'humain). Elle génère aussi de la diversité génétique par recombinaison. Sans méiose, tous les enfants d'un même couple seraient génétiquement identiques.",
"Quelle est la loi de Hardy-Weinberg ?":"Hardy-Weinberg (1908) démontra mathématiquement que les fréquences alléliques restent stables dans une grande population en absence de sélection, mutations, migrations ou dérive génétique.",
"Comment se nomme le rayonnement théorique émis par les trous noirs selon Stephen Hawking ?":"Le rayonnement de Hawking (1974) prédit que les trous noirs ne sont pas éternels : ils « s'évaporent » en émettant des particules à leur horizon. Ce phénomène n'a jamais été observé directement.",
"Que postule la relativité générale d'Einstein ?":"La relativité générale (1915) a prédit que la lumière se courbe près des masses, confirmé en 1919 lors d'une éclipse. Elle a aussi prédit les ondes gravitationnelles, confirmées 100 ans plus tard par LIGO.",
"Qu'est-ce qu'une liaison hydrogène ?":"Les liaisons hydrogène expliquent pourquoi l'eau a un point d'ébullition de 100°C alors que des molécules similaires (H₂S, H₂Se) sont gazeuses à température ambiante. Sans elles, la vie telle qu'on la connaît serait impossible.",
"Qu'est-ce que le point triple d'une substance ?":"Le point triple de l'eau est à 273,16 K (0,01°C) et 611,7 Pa. Il sert de point de référence fondamental en thermométrie car c'est un point parfaitement reproductible.",
"Quelle est la constante de Planck (valeur approchée) ?":"La constante de Planck (1900) marqua la naissance de la mécanique quantique. Planck lui-même fut surpris par ses propres résultats et espéra longtemps que la physique classique pourrait les absorber.",
"Qu'est-ce que la saponification ?":"La saponification (du latin sapo = savon) a été utilisée depuis l'Antiquité. Les anciens Babyloniens fabriquaient du savon en faisant bouillir de la graisse avec des cendres (hydroxyde de potassium) dès 2800 av. J.-C.",
"Qu'est-ce qu'un prion ?":"Le prion est une protéine normale (PrPc) qui se replie anormalement et convertit d'autres protéines normales en prions. Stanley Prusiner a reçu le Nobel 1997 pour cette découverte que la communauté scientifique avait d'abord rejetée.",
"Quel phénomène explique la déviation de la lumière lorsqu'elle passe d'un milieu à un autre ?":"La réfraction est due au changement de vitesse de la lumière en changeant de milieu. Elle explique pourquoi un objet dans l'eau paraît décalé et pourquoi les lentilles de lunettes ou loupes fonctionnent.",
"Qu'est-ce que l'antimatière ?":"Chaque particule a une antiparticule de charge opposée. Quand matière et antimatière se rencontrent, elles s'annihilent en libérant de l'énergie pure. Le Big Bang aurait dû créer des quantités égales des deux — le déséquilibre reste un mystère.",
"Comment s'appelle la technique de séparation des composants d'un mélange par leur migration différentielle ?":"La chromatographie (du grec : écriture de couleur) fut inventée en 1900 par Mikhaïl Tswett pour séparer des pigments végétaux. Elle est aujourd'hui indispensable en analyse chimique, biochimie et pharmacologie.",
"Qu'est-ce qu'une réaction de polymérisation ?":"La polymérisation est à la base des plastiques, mais aussi du vivant : l'ADN est un polymère de nucléotides, les protéines sont des polymères d'acides aminés. Sans polymérisation, la vie complexe n'existerait pas.",
"Quel est l'angle d'inclinaison de l'axe de la Terre par rapport à l'écliptique ?":"L'inclinaison de 23,5° est à l'origine des saisons. Sans elle, la Terre ne connaîtrait pas de saisons et les zones polaires seraient éternellement froides tandis que les zones équatoriales resteraient toujours chaudes.",
"Quelles affirmations sur la fission nucléaire sont correctes ?":"1 kg d'uranium-235 fissionné produit autant d'énergie que 3 000 tonnes de charbon brûlé. Les centrales nucléaires produisent ~10% de l'électricité mondiale sans émissions directes de CO₂.",
"Que désigne la loi de Coulomb ?":"La loi de Coulomb (1785) est analogue à la loi de Newton mais pour les charges électriques. Elle démontra que la force électrique suit également une loi en 1/r². Coulomb inventa le premier pour mesurer ces forces.",
// SPORT FACILE
"Combien y a-t-il de joueurs par équipe sur un terrain de football ?":"Le règlement avec 11 joueurs par équipe fut standardisé en 1863 lors de la fondation de la Football Association en Angleterre. Avant cela, le nombre variait considérablement selon les clubs.",
"Sur quelle surface se dispute le tournoi de Roland-Garros ?":"La terre battue rouge de Roland-Garros est en fait de la brique pilée (du quartz rouge pulvérisé). Elle ralentit la balle et favorise les longs échanges. Le tournoi fut créé en 1925 pour célébrer la victoire de la France en Coupe Davis.",
"En quelle ville et année ont eu lieu les premiers Jeux Olympiques modernes ?":"Les JO d'Athènes 1896 réunirent 241 athlètes de 14 nations. Les athlètes américains pensaient avoir plus de temps pour voyager en Europe et manquèrent presque les épreuves à cause d'un décalage calendrier.",
"Quel sport se pratique lors du Tour de France ?":"Le Tour de France fut créé par Henri Desgrange en 1903 pour augmenter les ventes du journal L'Auto. Le premier vainqueur, Maurice Garin, avala 2 428 km en 19 jours à 26 km/h de moyenne.",
"Quel nageur américain détient le record du plus grand nombre de médailles olympiques ?":"Michael Phelps (28 médailles olympiques dont 23 d'or) a dit qu'il pouvait retenir son souffle pendant 5 minutes. Il s'est entraîné en se concentrant sur ses erreurs en les rejoignant jusqu'à leurs moindres détails.",
"Quelle ligue professionnelle de basketball américaine est la plus célèbre au monde ?":"La NBA fut fondée en 1946. Le premier match de l'histoire opposa les Toronto Huskies aux New York Knicks. Le billet coûtait 75 cents et la salle n'était pas remplie.",
"Quel trophée récompense le meilleur club européen de football chaque saison ?":"La Ligue des Champions fut appelée « Coupe d'Europe des clubs champions » de 1955 à 1992. Le Real Madrid l'a remportée 15 fois — le record absolu — dont 3 fois d'affilée entre 2016 et 2018.",
"Combien de titres de champion du monde de Formule 1 Michael Schumacher a-t-il remportés ?":"Schumacher remporta ses 5 premiers titres avec Ferrari (2000–2004). Lewis Hamilton l'a égalé avec 7 titres en 2020. Schumacher fut aussi le premier pilote à 100 podiums et 70 victoires.",
"Sur quelle surface se joue Wimbledon ?":"Le gazon de Wimbledon est coupé à 8 mm très précisément. Le tournoi dure 2 semaines en juin-juillet. Les joueurs portent du blanc depuis 1877 — règle toujours en vigueur.",
"Quel boxeur était surnommé « The Greatest » ?":"Muhammad Ali (Cassius Clay) refusa l'incorporation dans l'armée américaine en 1967 pour raisons religieuses. Il fut déchu de son titre et interdit de boxe pendant 3 ans et demi — au sommet de sa carrière.",
"Quelle est la distance officielle d'un marathon ?":"La distance de 42,195 km fut standardisée aux JO de Londres en 1908 pour que la course parte du château de Windsor et arrive face à la loge royale au stade. Avant cela, la distance variait selon les JO.",
"Quel footballeur français a inscrit 2 buts en finale de la Coupe du Monde 1998 ?":"Zidane marqua deux buts de la tête en finale contre le Brésil (3-0). C'est le seul joueur à avoir gagné le Mondial, l'Euro et la Ligue des Champions.",
"Quel sprinter jamaïcain est considéré comme l'homme le plus rapide du monde ?":"Usain Bolt a couru le 100m en 9,58s à Berlin en 2009, soit 44,72 km/h à vitesse de pointe. Il est aussi le seul athlète à avoir gagné 3 fois consécutivement les 100m et 200m aux JO.",
"Quelle joueuse de tennis américaine a dominé la discipline féminine pendant des années avec 23 titres du Grand Chelem ?":"Serena Williams remporta son 23e titre du Grand Chelem à l'Open d'Australie 2017 alors qu'elle était enceinte de 8 semaines. Elle est la joueuse ayant remporté le plus de titres du Grand Chelem de l'ère Open.",
"Quel judoka français a remporté de nombreux titres mondiaux et olympiques ?":"Teddy Riner a remporté 10 titres de champion du monde et 3 médailles d'or olympiques. Sa domination (-100 kg puis +100 kg) est sans équivalent : il a enchaîné 154 victoires consécutives sans défaite.",
"Tous les combien d'années la Coupe du Monde de rugby a-t-elle lieu ?":"La Coupe du Monde de rugby fut créée en 1987, disputée en Australie et Nouvelle-Zélande. La Nouvelle-Zélande (All Blacks) est l'équipe la plus titrée avec 3 victoires.",
"Quel pays a remporté le plus de Coupes du Monde de football masculin ?":"Le Brésil (5 victoires : 1958, 1962, 1970, 1994, 2002) est le seul pays à avoir participé à toutes les Coupes du Monde. Pelé est le seul joueur à avoir remporté 3 titres mondiaux.",
"Quelle est la distance entre le point de penalty et la ligne de but au football ?":"Le penalty est à 11 mètres (12 yards). Un gardien ne peut pas anticiper le côté du tir car la distance est trop courte (~0,3 secondes). Les buteurs de très haut niveau tirent au centre plus souvent qu'on ne le croit.",
"Quel est le principal trophée de tennis masculin par équipes nationales ?":"La Coupe Davis fut fondée en 1900 par l'Américain Dwight Davis, qui offrit la coupe de sa propre poche. C'est la plus ancienne compétition internationale par équipes de tennis.",
"Quels sports font partie du triathlon olympique ?":"La distance olympique (1,5 km natation, 40 km vélo, 10 km course) fut introduite aux JO de Sydney 2000. L'Ironman full (3,86 km / 180 km / 42,2 km) est 4 fois plus long.",
// SPORT MOYEN
"Quel est le record du monde du 100 m masculin et qui le détient ?":"Bolt a couru les 60-80 derniers mètres en décélérant, ayant gagné d'avance ! Son coefficient de traînée aérodynamique est exceptionnel. Des biologistes estiment qu'un humain ne peut physiquement pas courir le 100m en moins de 9,48s.",
"En quelles années la France a-t-elle remporté la Coupe du Monde de football ?":"En 1998 à domicile, la France battit l'Espagne, l'Italie, la Croatie et le Brésil. En 2018 en Russie, elle battit notamment l'Argentine, l'Uruguay et la Croatie. Les deux victoires ont eu lieu sous Deschamps.",
