"Quel courant artistique abstrait américain des années 1950 regroupe Rothko, Newman et Still dans leur approche méditative de la couleur ?":"Le Color Field painting s'opposa à l'action painting de Pollock. Rothko voulait que ses toiles induisent des émotions religieuses. Barnett Newman déclara : « L'esthétique pour les artistes, c'est comme l'ornithologie pour les oiseaux. »",
"Quel peintre de la Renaissance allemande est l'auteur des célèbres gravures du Chevalier, la Mort et le Diable ?":"Dürer (1471–1528) fut le premier artiste allemand à être reconnu en Italie de son vivant. Il théorisa les proportions du corps humain en s'inspirant de Vitruve. Il est aussi le premier à avoir réalisé un autoportrait en pied.",
"Quel artiste français d'origine ukrainienne est connu pour ses grandes peintures aux couleurs vives et ses thèmes bibliques ou du shtetl ?":"Marc Chagall (1887–1985) vécut 98 ans et fut témoin de toute l'histoire moderne. Il réalisa les vitraux de la cathédrale de Reims (1974), de la synagogue de Jérusalem et du plafond de l'Opéra de Paris.",
"Quel peintre flamand du XVe siècle, auteur du Triptyque de l'Annonciation, est associé au Retable de Mérode ?":"Robert Campin (Maître de Flémalle) fut le premier à peindre des scènes religieuses dans des intérieurs bourgeois contemporains, rompant avec le fond doré byzantin. Il est le maître de Rogier van der Weyden.",
"Quel artiste abstrait français, influencé par Mondrian, a développé une peinture totalement non figurative dès 1910 ?":"Robert Delaunay (1885–1941) créa l'orphisme, variante du cubisme utilisant des couleurs pures juxtaposées. Le poète Guillaume Apollinaire nomma ce courant « simultanéisme ». Ses œuvres influencèrent l'art abstrait mondial.",
"Quel artiste américain minimaliste est connu pour ses cubes et volumes géométriques en acier inoxydable ?":"Donald Judd (1928–1994) affirma que ses objets n'étaient ni peinture ni sculpture : de simples « objets spécifiques ». Il acquit une ville fantôme au Texas (Marfa) pour créer une fondation d'art contemporain dans le désert.",
"Quel peintre espagnol du XVIIe siècle est connu pour ses moines capucins aux blancs éclatants ?":"Francisco de Zurbarán (1598–1664) est surnommé le « Caravage espagnol ». Ses représentations de moines en prière capturent une spiritualité austère et intense. Il mourut dans la pauvreté malgré son talent.",
"Quels peintres sont associés au mouvement expressionniste allemand Der Blaue Reiter ?":"Der Blaue Reiter (Le Cavalier bleu, 1911) réunit Kandinsky, Marc, Macke, Klee et d'autres. Franz Marc mourut à Verdun en 1916. Kandinsky avait vu un tableau de Monet qui lui révéla que « l'objet nuisait à la peinture ».",
// ASTRONOMIE FACILE
"Quelle est la planète la plus proche du Soleil ?":"Mercure n'est pas la planète la plus chaude du système solaire — c'est Vénus, avec ~465°C. Mercure a une amplitude thermique de plus de 600°C entre le jour (+430°C) et la nuit (-180°C).",
"Comment appelle-t-on la planète rouge de notre système solaire ?":"Mars doit sa couleur rougeâtre à l'oxyde de fer (rouille) en surface. Elle possède Olympus Mons, le plus grand volcan du système solaire (21 km de haut) et Valles Marineris, un canyon long de 4 000 km.",
"Quel est le satellite naturel de la Terre ?":"La Lune est le 5e plus grand satellite du système solaire. Elle s'éloigne de la Terre de ~3,8 cm par an. Son influence gravitationnelle stabilise l'axe de rotation terrestre, rendant les saisons stables.",
"Quelle est l'étoile la plus proche du système solaire ?":"Proxima Centauri, à 4,22 années-lumière, est une naine rouge qui orbite autour du système Alpha Centauri. En 2016, on a découvert une exoplanète dans sa zone habitable : Proxima b.",
"Dans quelle galaxie se trouve notre système solaire ?":"La Voie Lactée contient entre 100 et 400 milliards d'étoiles. Notre Soleil se trouve dans un bras périphérique (bras d'Orion). La Voie Lactée fait ~100 000 années-lumière de diamètre.",
"Quel astronaute américain a été le premier à marcher sur la Lune en 1969 ?":"Neil Armstrong posa le pied sur la Lune le 21 juillet 1969 à 02h56 UTC. Ses premières paroles furent : « C'est un petit pas pour l'homme, un grand bond pour l'humanité. » Il y eut en tout 12 hommes sur la Lune.",
"Quelle est la plus grande planète de notre système solaire ?":"Jupiter est si massif qu'il pourrait contenir 1 300 Terres. Sa Grande Tache Rouge est une tempête qui dure depuis au moins 350 ans, bien qu'elle rétrécisse depuis les années 1970.",
"Quel est le type d'étoile de notre Soleil ?":"Le Soleil est une naine jaune de type G, en milieu de vie (~4,6 milliards d'années). Dans ~5 milliards d'années, il deviendra une géante rouge, engloutissant Mercure et Vénus avant de finir en naine blanche.",
"Quelle comète passe près de la Terre tous les 75-76 ans environ ?":"La comète de Halley fut observée en 1066 (tapisserie de Bayeux) et identifiée par Edmond Halley en 1705 comme étant toujours la même. Sa prochaine apparition est prévue pour 2061.",
"Lors d'une éclipse solaire totale, quel astre cache le Soleil ?":"La Lune est 400 fois plus petite que le Soleil mais aussi 400 fois plus proche — ce qui fait qu'ils paraissent la même taille vue de la Terre. Cette coïncidence extraordinaire permet les éclipses totales.",
"Quelle planète du système solaire est connue pour ses spectaculaires anneaux ?":"Les anneaux de Saturne ont un diamètre de 282 000 km mais seulement 10 à 1 000 mètres d'épaisseur. Ils sont composés de glace et de roche et pourraient disparaître dans ~100 millions d'années.",
"Quel fut le nom du premier satellite artificiel lancé en 1957 ?":"Spoutnik 1 (4 octobre 1957) pesait 84 kg et transmettait un simple bip radio. Son lancement par l'URSS provoqua un choc aux USA (« Sputnik shock ») et fut à l'origine de la création de la NASA.",
"Quel cosmonaute soviétique a été le premier humain dans l'espace en 1961 ?":"Gagarine orbita la Terre pendant 108 minutes le 12 avril 1961. Sa phrase « La Terre est bleue » est restée célèbre. Il mourut en 1968 lors d'un vol d'entraînement à 34 ans, devenant une légende soviétique.",
"Combien de temps met la lumière du Soleil pour parvenir jusqu'à la Terre ?":"La lumière met 8 minutes 20 secondes à parcourir les 150 millions de km Soleil-Terre. Quand on observe une étoile distante, on voit son passé — certaines étoiles visibles à l'œil nu sont mortes depuis longtemps.",
"Quel est le statut actuel de Pluton dans la classification de l'Union Astronomique Internationale ?":"Pluton fut déclassée en planète naine en 2006 lors de l'assemblée de l'UAI à Prague. Cette décision, très controversée, avait notamment pour cause la découverte d'Éris (2005), encore plus massif que Pluton.",
"Quelle constellation contient l'étoile Bételgeuse, une supergéante rouge ?":"Bételgeuse est ~1 400 fois plus grande que le Soleil. En décembre 2019, elle s'assombrit brusquement (« le Grand Assombrissement »), faisant craindre une supernova imminente. Elle devrait exploser dans ~100 000 ans.",
"Qu'est-ce qu'une année-lumière ?":"Une année-lumière = 9,46 × 10¹² km. L'étoile la plus proche de nous (Proxima Centauri) est à 4,22 années-lumière. Il faudrait ~70 000 ans avec notre vaisseau spatial le plus rapide pour l'atteindre.",
"Quel télescope spatial célèbre, lancé en 1990, a révolutionné notre vision de l'univers ?":"Hubble fut lancé avec un miroir défectueux, corrigé lors d'une mission en 1993. Il a fourni des images de galaxies à milliards d'années-lumière et contribué à la découverte de l'accélération de l'expansion de l'univers.",
"Quelles planètes du système solaire ont des anneaux visibles ?":"Les 4 planètes géantes ont des anneaux. Ceux de Saturne sont de loin les plus visibles. Les anneaux d'Uranus furent découverts en 1977 lors d'une occultation stellaire, et ceux de Neptune en 1989 par Voyager 2.",
"En quelle décennie l'Homme a-t-il marché sur la Lune pour la première fois ?":"Apollo 11 se posa sur la Mer de la Tranquillité le 20 juillet 1969. La course à la Lune (1961–1969) mobilisa 400 000 personnes aux USA. Le programme Apollo coûta l'équivalent de 250 milliards de dollars actuels.",
// ASTRONOMIE MOYEN
"Qu'est-ce qu'un trou noir ?":"À l'horizon des événements d'un trou noir, même la lumière ne peut s'échapper. La première image d'un trou noir (M87, 6,5 milliards de masses solaires) fut publiée le 10 avril 2019 par l'Event Horizon Telescope.",
"Quelle est la théorie sur l'origine de l'univers, selon laquelle tout aurait commencé il y a environ 13,8 milliards d'années ?":"Les 380 000 premières années après le Big Bang, l'univers était opaque. C'est seulement après que la lumière put se propager librement — ce « rayonnement fossile » est encore détectable aujourd'hui.",
"Que devient généralement une étoile similaire au Soleil en fin de vie ?":"En fin de vie, le Soleil grossira pour devenir une géante rouge avant de rejeter ses couches externes en nébuleuse planétaire, laissant un noyau dense : une naine blanche de la taille de la Terre.",
"Quel phénomène astronomique se produit lorsqu'une étoile massive explose en fin de vie ?":"Une supernova peut briller autant qu'une galaxie entière pendant quelques semaines. La supernova de 1987 dans le Grand Nuage de Magellan (à 168 000 années-lumière) est la plus proche observée à l'ère moderne.",
"Quelle particularité a la planète Uranus par rapport aux autres planètes ?":"L'axe d'Uranus est incliné à 97,77° — elle « roule » sur son orbite comme une bille. Ses saisons durent 21 ans chacune. Cela pourrait être dû à une collision avec une planète de la taille de la Terre dans le passé.",
"Où se situe la ceinture d'astéroïdes principale de notre système solaire ?":"La ceinture d'astéroïdes contient des millions de corps mais leur masse totale est environ 4% de la masse de la Lune. Jupiter empêche ces débris de s'agglomérer en planète par son attraction gravitationnelle.",
"Quel nouveau télescope spatial, successeur de Hubble, a été lancé fin 2021 ?":"Le JWST observe l'infrarouge thermique depuis le point de Lagrange L2, à 1,5 million de km de la Terre. En 2022, il fournit les images les plus profondes jamais obtenues, montrant des galaxies formées 300 millions d'années après le Big Bang.",
"Quelle est la distance approximative entre la Terre et le Soleil ?":"L'unité astronomique (UA = 150 millions km) est la base des mesures dans le système solaire. La lumière met 8'20\" pour la franchir. Neptune est à 30 UA du Soleil.",
"Comment s'appelle la zone au-delà de Neptune contenant des corps glacés dont proviennent de nombreuses comètes ?":"La ceinture de Kuiper (30–50 UA) contient Pluton, Éris et des milliers d'objets glacés. Au-delà se trouve le nuage d'Oort (jusqu'à 100 000 UA), réservoir des comètes à longue période.",
"Qu'est-ce que la précession des équinoxes ?":"La précession de l'axe terrestre (26 000 ans) déplace lentement les constellations du zodiaque. Dans 14 000 ans, l'étoile polaire sera Véga, non l'Étoile du Nord. Cette précession était connue des anciens Grecs.",
"Quelle est la distance approximative entre la Terre et la Lune ?":"La distance Terre-Lune varie de 356 500 km (périgée) à 406 700 km (apogée). Les astronautes d'Apollo mirent environ 3 jours pour l'atteindre. Un laser envoyé vers les rétroréflecteurs laissés sur la Lune revient en ~2,5 secondes.",
"Quelle est la dernière planète (la plus éloignée) de notre système solaire ?":"Neptune fut découverte en 1846 par calcul mathématique avant d'être observée. Sa couleur bleue est due au méthane atmosphérique. Ses vents atteignent 2 100 km/h — les plus rapides du système solaire.",
"Que recherche le programme SETI ?":"SETI (Search for Extraterrestrial Intelligence) analyse les ondes radio depuis les années 1960. En 1977, le signal « Wow! » fut détecté mais jamais reproductible. Avec des milliards de planètes dans la Voie Lactée, la probabilité de vie extraterrestre paraît élevée.",
"Quelle est la composition principale de l'atmosphère de Mars ?":"L'atmosphère martienne (CO₂ à 95%) est 100 fois moins dense que sur Terre. La pression atmosphérique à la surface est de 600 Pa (vs 101 325 Pa sur Terre). Des tempêtes de poussière globales peuvent durer des mois.",
"Combien de fois le Soleil est-il plus grand que la Terre en diamètre ?":"Le diamètre du Soleil (~1,4 million km) est 109 fois celui de la Terre. En volume, le Soleil pourrait contenir 1,3 million de Terres. Sa masse représente 99,86% de toute la masse du système solaire.",
"Comment appelle-t-on les rayonnements très énergétiques provenant de l'espace interstellaire ?":"Les rayons cosmiques sont des protons et noyaux atomiques voyageant à ~99,99% de la vitesse de la lumière. Ils provoquent des aurores boréales et peuvent endommager les satellites et les astronautes en orbite.",
"Que désigne le terme « exoplanète » ?":"La première exoplanète fut confirmée en 1992 (autour d'un pulsar). En 2024, plus de 5 700 exoplanètes sont connues. Le télescope Kepler en découvrit des milliers. Certaines sont dans la zone habitable de leur étoile.",
"Quelle est l'origine de la lumière des étoiles ?":"Dans le noyau du Soleil, 4 protons fusionnent en un noyau d'hélium, libérant 0,7% de leur masse en énergie (E=mc²). Le Soleil convertit 600 millions de tonnes d'hydrogène en hélium chaque seconde.",
"Quelles caractéristiques distinguent une nébuleuse d'une galaxie ?":"Les nébuleuses (nuages de gaz et poussière) sont les « pépinières » des étoiles. La nébuleuse d'Orion, visible à l'œil nu, se trouve dans notre galaxie. Les galaxies au contraire sont des systèmes stellaires entiers.",
"Qu'est-ce qu'une éclipse lunaire ?":"Lors d'une éclipse lunaire totale, la Lune prend une teinte rouge-orangée (« Lune de sang ») car la lumière solaire réfractée par l'atmosphère terrestre baigne la Lune d'une lumière filtrée de toutes ses longueurs d'onde sauf le rouge.",
// ASTRONOMIE DIFFICILE
"Qu'est-ce que la constante de Hubble ?":"La constante de Hubble (H₀ ≈ 70 km/s/Mpc) mesure la vitesse d'expansion de l'univers. Sa valeur précise est encore débattue (tension de Hubble) : différentes méthodes donnent des résultats légèrement incohérents.",
"Quelle fraction approximative de l'univers l'énergie sombre représente-t-elle ?":"L'énergie sombre (~68%) est une force inconnue qui accélère l'expansion de l'univers. Elle fut découverte en 1998 (Nobel 2011 pour Perlmutter, Schmidt et Riess). Sa nature profonde reste le grand mystère de la cosmologie.",
"Quelle fraction approximative de l'univers la matière sombre représente-t-elle ?":"La matière sombre (~27%) n'émet ni n'absorbe de lumière mais révèle sa présence par son influence gravitationnelle. Elle maintient les galaxies unies et est 5 fois plus abondante que la matière ordinaire.",
"Comment appelle-t-on le rayonnement fossile, vestige du Big Bang, qui baigne uniformément l'univers ?":"Le CMB (Fond Diffus Cosmologique) fut découvert par accident en 1965 par Penzias et Wilson (Nobel 1978) qui croyaient avoir affaire à des parasites radio dus à des fientes de pigeon dans leur antenne.",
"Quel est le type stellaire le plus commun dans l'univers ?":"Les naines rouges (type M) représentent ~70-75% de toutes les étoiles. Elles brûlent si lentement qu'elles peuvent vivre des dizaines à des centaines de milliards d'années — bien plus que l'âge actuel de l'univers.",
"Que désigne la magnitude absolue d'une étoile ?":"La magnitude absolue mesure la luminosité intrinsèque d'une étoile si elle était à 10 parsecs (32,6 années-lumière). Le Soleil a une magnitude absolue de +4,83 — une étoile de luminosité ordinaire.",
"Quelle est la période de rotation de Mercure sur elle-même en jours terrestres ?":"La résonance orbitale de Mercure (3:2) signifie qu'elle fait 3 rotations pour 2 révolutions autour du Soleil. Un jour solaire sur Mercure (lever à coucher du soleil) dure 176 jours terrestres.",
"Qu'est-ce que la parallaxe stellaire ?":"La parallaxe stellaire permet de mesurer les distances jusqu'à ~10 000 années-lumière. Pour les distances plus grandes, on utilise les céphéides (variable standard de luminosité connue) puis les supernovae de type Ia.",
"Qu'est-ce qu'un pulsar ?":"Les pulsars émettent des impulsions radio si régulières que Jocelyn Bell Burnell et Anthony Hewish (qui reçut le Nobel) les surnommèrent d'abord « LGM-1 » (Little Green Men) en pensant à une balise extraterrestre.",
"Quelle observation a fourni la première preuve directe de l'existence des ondes gravitationnelles, en 2015 ?":"LIGO détecta le 14 septembre 2015 la fusion de deux trous noirs de 29 et 36 masses solaires, à 1,3 milliard d'années-lumière. Le signal fut une distorsion spatiale de 1/1000ème du diamètre d'un proton.",
"Comment appelle-t-on l'hypothétique tunnel reliant deux points distincts de l'espace-temps ?":"Le trou de ver (wormhole ou pont d'Einstein-Rosen) est une solution mathématique de la relativité générale mais aucun n'a jamais été observé. Même si il existait, le traverser exigerait de la matière exotique à énergie négative.",
"Qu'est-ce qu'une lentille gravitationnelle ?":"Einstein prédit la lentille gravitationnelle dans sa théorie. En 1979, le premier doublet de quasar gravitationnel fut observé. Aujourd'hui, les lentilles gravitationnelles permettent d'observer des galaxies autrement inaccessibles.",
"Quel est l'horizon des événements d'un trou noir ?":"Au-delà de l'horizon des événements, la courbure de l'espace-temps est telle que toutes les trajectoires possibles (même celles de la lumière) pointent vers la singularité. C'est une frontière d'où rien ne revient.",
"Que désigne le terme « chromosphère » ?":"La chromosphère (épaisseur ~2 000 km) est visible comme un fin anneau rouge lors des éclipses totales. La couronne solaire au-delà atteint plusieurs millions de degrés — paradoxalement plus chaude que la surface (~5 500°C).",
"Qu'est-ce qu'un quasar ?":"Les quasars (quasi-stellar objects) sont parmi les objets les plus lumineux de l'univers. Ils alimentent en énergie des trous noirs supermassifs qui accrètent de la matière. Les plus lointains sont vus à plus de 13 milliards d'années-lumière.",
"Dans quel groupe local de galaxies se trouve la Voie Lactée ?":"Le Groupe Local comprend ~80 galaxies dont la Voie Lactée et Andromède (les deux plus massives). Andromède se rapproche de nous à 120 km/s et entrera en collision dans ~4,5 milliards d'années.",
"Qu'est-ce que le catalogue Messier ?":"Charles Messier (1730–1817) dressa son catalogue pour ne pas confondre ces « nébuleuses fixes » avec les comètes qu'il cherchait. L'objet M1 est le rémanent de la supernova de 1054 observée par les astronomes chinois.",
"Comment appelle-t-on le point d'espace où la gravité est nulle entre deux corps en orbite mutuelle, permettant à un troisième corps d'y rester stable ?":"Les 5 points de Lagrange furent calculés par Lagrange en 1772. Le JWST orbite autour du point L2 du système Terre-Soleil. Les astéroïdes troyens de Jupiter occupent les points L4 et L5.",
"Que signifie le terme « magnitude apparente » d'un astre ?":"L'échelle de magnitude remonte à l'astronome grec Hipparque (IIe s. av. J.-C.) qui classa les étoiles de 1 (plus brillantes) à 6 (à la limite de l'œil nu). Les valeurs négatives furent ajoutées pour les corps très brillants.",
"Quels phénomènes sont liés aux étoiles à neutrons ?":"Les étoiles à neutrons (masse ~1,4 solaire, rayon ~10 km) ont une densité telle qu'une cuillère à café de leur matière pèse un milliard de tonnes. Certaines (magnétars) ont les champs magnétiques les plus intenses connus.",
// POLITIQUE FACILE
"En quelle année l'ONU (Organisation des Nations Unies) a-t-elle été fondée ?":"L'ONU fut fondée le 24 octobre 1945 à San Francisco, avec 51 États membres fondateurs. Elle remplaçait la Société des Nations (SDN, 1920) qui n'avait pas empêché la Seconde Guerre mondiale.",
"Quel est le rôle principal du Parlement dans une démocratie ?":"Le rôle des parlements remonte aux assemblées médiévales. Le Parlement anglais (XIIIe s.) fut le premier à contraindre le roi. En France, l'Assemblée nationale hérite de la Révolution de 1789.",
"Qu'est-ce qu'une démocratie ?":"Le mot « démocratie » vient du grec demos (peuple) et kratos (pouvoir). Elle fut inventée à Athènes au Ve s. av. J.-C. par Clisthène et Périclès — mais excluait femmes, esclaves et étrangers.",
"Quelles sont les deux chambres du Parlement français ?":"Le bicamérisme français (Assemblée nationale + Sénat) date de la IIIe République (1875). En cas de désaccord entre les deux chambres, l'Assemblée nationale a le dernier mot.",
"En quelle année la Constitution de la Ve République française a-t-elle été adoptée ?":"La Constitution du 4 octobre 1958 fut rédigée sous l'influence de De Gaulle par Michel Debré. Elle renforce l'exécutif face au Parlement, rompant avec les traditions des IIIe et IVe Républiques.",
"En quelle année les femmes ont-elles obtenu le droit de vote en France ?":"Les Françaises obtinrent le droit de vote par l'ordonnance du GPRF du 21 avril 1944 — sur proposition du Comité français de la Libération nationale. Les premières élections avec ce droit eurent lieu en avril 1945.",
"Quelle alliance militaire occidentale, fondée en 1949, regroupe de nombreux pays d'Europe et d'Amérique du Nord ?":"L'OTAN (Organisation du traité de l'Atlantique Nord) fut fondée le 4 avril 1949 pour contenir l'URSS. Article 5 : une attaque contre un membre est une attaque contre tous. Il ne fut invoqué qu'une seule fois — après le 11 septembre 2001.",
"Quel traité a fondé l'Union européenne (UE) en 1992 ?":"Le traité de Maastricht (7 février 1992) créa l'Union européenne, la citoyenneté européenne et posa les bases de l'euro. En France, il fut approuvé par référendum avec seulement 51,05% des voix.",
"Combien d'années dure un mandat présidentiel en France ?":"Le quinquennat fut instauré en 2002 pour remplacer le septennat de De Gaulle. Le premier président à bénéficier de ce mandat fut Jacques Chirac. La coïncidence avec les mandats législatifs (5 ans) réduit le risque de cohabitation.",
"Qu'est-ce qu'un référendum ?":"Le référendum est un outil de démocratie directe. En France, il peut être convoqué par le Président (art. 11) ou dans le cadre d'une révision constitutionnelle (art. 89). De Gaulle en fit sa marque politique — et démissionna en 1969 suite à un échec.",
"Quelle est la différence entre une République et une Monarchie ?":"Il existe des monarchies constitutionnelles démocratiques (Suède, Norvège, Pays-Bas) plus démocratiques que certaines républiques. La forme du régime (roi/président) importe moins que l'état de droit et les libertés.",
"Quelle organisation internationale défend les droits de l'homme à travers le monde ?":"Amnesty International fut fondée en 1961 par l'avocat Peter Benenson suite à un article dans The Observer sur des étudiants portugais emprisonnés. Elle compte aujourd'hui 8 millions de membres dans 150 pays.",
"Qu'est-ce que le suffrage universel ?":"La France instaura le suffrage universel masculin en 1848 sous la IIe République. Le suffrage universel féminin ne fut accordé qu'en 1944. Plus de la moitié de la population mondiale vit aujourd'hui dans des démocraties électorales.",
"Quel est le siège de l'ONU ?":"Le siège de l'ONU à New York fut construit entre 1948 et 1952 sur un terrain acheté à John D. Rockefeller Jr. Il est extraterritorial : les 65 000 m² sont sous juridiction internationale.",
"Comment appelle-t-on le chef du gouvernement en France ?":"Le Premier ministre est nommé par le Président qui peut le révoquer quand il le souhaite. La cohabitation — quand Président et Premier ministre sont de partis opposés — est un phénomène spécifique à la Ve République.",
"Qu'est-ce qu'une monarchie constitutionnelle ?":"Le Royaume-Uni, la Belgique, les Pays-Bas, la Suède, la Norvège, le Danemark, l'Espagne et le Japon sont des monarchies constitutionnelles parmi les plus démocratiques du monde.",
"Qu'est-ce qu'un droit de veto ?":"Au Conseil de sécurité de l'ONU, les 5 membres permanents (USA, Russie, Chine, France, Royaume-Uni) disposent d'un veto. Ce droit a été utilisé des centaines de fois, souvent par l'URSS/Russie et les USA.",
"Que signifie « gauche » et « droite » en politique ?":"La distinction gauche/droite vient de l'Assemblée nationale de 1789 où les partisans du roi s'asseyaient à droite de l'orateur et les révolutionnaires à gauche. 235 ans plus tard, ces termes restent les repères centraux du débat politique.",
"En combien d'États membres l'Union européenne comptait-elle en 2024 ?":"L'UE compte 27 membres depuis le Brexit (2020) par lequel le Royaume-Uni la quitta. L'UE est passée de 6 membres fondateurs (1957) à 28 avant le Brexit. Plusieurs pays sont candidats à l'adhésion.",
"Quels pouvoirs sont traditionnellement séparés dans une démocratie libérale ?":"La séparation des pouvoirs fut théorisée par Montesquieu dans De l'esprit des lois (1748). Il s'inspirait du système politique anglais. Sans cette séparation, « tout serait perdu » selon lui.",
// POLITIQUE MOYEN
"Quel traité a fondé la Communauté Économique Européenne (CEE) en 1957 ?":"Le traité de Rome (25 mars 1957) fut signé par 6 pays : France, RFA, Italie, Belgique, Pays-Bas, Luxembourg. Il créa un marché commun. Le Royaume-Uni avait refusé d'y participer et ne rejoignit l'UE qu'en 1973.",
"Qui sont les 5 membres permanents du Conseil de sécurité de l'ONU, disposant du droit de veto ?":"Les 5 membres permanents (P5) correspondent aux vainqueurs de 1945. Leur veto a été utilisé plus de 250 fois depuis 1946. La France l'a utilisé 18 fois, bien moins que les USA (86) et l'URSS/Russie (122).",
"Comment appelle-t-on la situation en France où le Président et le Premier ministre appartiennent à des partis opposés ?":"Il y eut 3 cohabitations en France : 1986–1988 (Mitterrand/Chirac), 1993–1995 (Mitterrand/Balladur) et 1997–2002 (Chirac/Jospin). Le passage au quinquennat en 2002 a rendu ce scénario moins probable.",
"Dans quelle(s) ville(s) le Parlement européen siège-t-il ?":"Le siège officiel du Parlement européen est à Strasbourg (12 sessions plénières/an). Les commissions travaillent à Bruxelles. Le Secrétariat général est au Luxembourg. Ce fonctionnement trisite est coûteux et souvent critiqué.",
"Que désigne le FMI ?":"Le FMI (Fonds Monétaire International) fut créé à Bretton Woods en 1944. Il accorde des prêts aux pays en difficulté, souvent assortis de conditions (« plans d'ajustement structurel ») très contestées socialement.",
"Quel groupe de 7 pays industrialisés se réunit annuellement pour discuter des grandes questions mondiales ?":"Le G7 (USA, Japon, Allemagne, France, Royaume-Uni, Italie, Canada + UE) représente ~40% du PIB mondial. La Russie en fut exclue en 2014 suite à l'annexion de la Crimée.",
"Qu'est-ce que le GIEC ?":"Le GIEC (Groupe d'experts intergouvernemental sur l'évolution du climat) fut créé en 1988. Ses rapports synthétisent les publications scientifiques mondiales sur le climat. Il a partagé le Nobel de la Paix en 2007 avec Al Gore.",
"Qu'est-ce que le lobbying ?":"Le terme « lobby » vient du hall (lobby) du Parlement britannique où les représentants d'intérêts attendaient les parlementaires. Aux USA, c'est une activité légale et très organisée. En Europe, elle est de plus en plus réglementée.",
"Quelle est la durée d'un mandat présidentiel aux États-Unis ?":"Le 22e amendement (1951) limite les présidents américains à 2 mandats, suite aux 4 mandats de Franklin Roosevelt (1933–1945). Un président peut donc exercer au maximum 10 ans si sa première entrée en fonction était à mi-mandat.",
"Devant quelle juridiction internationale peuvent être jugés les crimes de guerre ?":"La CPI (Cour Pénale Internationale), créée en 2002 à Rome, peut juger génocide, crimes contre l'humanité et crimes de guerre. Les USA, la Russie et la Chine n'ont pas ratifié le Statut de Rome.",
"Qu'est-ce que le BRICS ?":"BRICS (2006) = Brésil, Russie, Inde, Chine, Afrique du Sud. Depuis 2023, l'organisation s'est élargie à 10 membres. Ce bloc représente ~40% de la population mondiale et cherche à contrebalancer l'influence occidentale.",
"Comment s'appelle le phénomène par lequel une armée ou un pouvoir conserve son influence en dehors des gouvernements ?":"L'État profond (deep state) désigne les structures permanentes de l'État (armée, renseignement, haute fonction publique) qui persistent au-delà des alternances politiques. Ce concept est aussi souvent instrumentalisé par des théoriciens du complot.",
"Qu'est-ce que la proportionnelle dans un système électoral ?":"La représentation proportionnelle (RP) favorise le pluralisme politique mais peut créer des assemblées fragmentées et instables. La France utilise un système majoritaire à 2 tours pour les législatives et présidentielles.",
"Qu'est-ce que le « soft power » dans les relations internationales ?":"Le soft power fut théorisé par Joseph Nye (Harvard) en 1990. Les USA exercent un soft power considérable via Hollywood, les universités, les marques. La France le fait via la langue française et la diplomatie culturelle.",
"Quel régime politique caractérise la Chine depuis 1949 ?":"La Chine est gouvernée par le Parti communiste chinois (PCC) depuis 1949. Xi Jinping, secrétaire général depuis 2012, a fait modifier la Constitution pour supprimer la limite de 2 mandats présidentiels en 2018.",
"Qu'est-ce qu'une oligarchie ?":"L'oligarchie (du grec oligos = peu nombreux) peut être économique (les riches gouvernent) ou politique. Le terme est souvent utilisé pour désigner les milliardaires russes proches du Kremlin issus des privatisations post-soviétiques.",
"Que désigne le terme « séparation des pouvoirs » ?":"La séparation des pouvoirs de Montesquieu (1748) inspira la Constitution américaine de 1787 et les démocraties modernes. Elle cherche à éviter la tyrannie en faisant en sorte que « le pouvoir arrête le pouvoir ».",
"Qui est nommé Premier ministre en France et par qui ?":"Depuis la pratique de la Ve République, le Président nomme un Premier ministre qui dispose d'une majorité à l'Assemblée nationale. En période de cohabitation, il peut nommer un PM de l'opposition pour éviter la crise institutionnelle.",
"Quelle a été la première présidente d'un grand pays démocratique en Europe ?":"Vigdís Finnbogadóttir fut élue présidente d'Islande en 1980 et réélue jusqu'en 1996. Elle était directrice d'un théâtre et défenseure de la culture islandaise. Elle fut la première femme au monde élue chef d'État.",
"Quelles institutions composent l'Union européenne (principaux organes) ?":"Le Parlement européen est élu au suffrage universel depuis 1979. Le Conseil de l'UE représente les États membres. La Commission est l'exécutif de l'UE. La CJUE garantit le droit de l'UE sur tout le territoire.",
// POLITIQUE DIFFICILE
"Comment Montesquieu a-t-il théorisé la séparation des pouvoirs dans De l'esprit des lois (1748) ?":"Montesquieu (1689–1755) s'inspirait de la constitution anglaise (Bill of Rights, 1689). Sa théorie des 3 pouvoirs influença directement la Constitution américaine de 1787 et la Déclaration des droits de l'homme de 1789.",
"Qui est l'auteur du Prince (1532), manuel de politique réaliste ?":"Machiavel (1469–1527) écrivit Le Prince après avoir été torturé et exilé par les Médicis. Il voulait offrir un guide à un prince capable de réunifier l'Italie. Le terme « machiavélique » est devenu synonyme de cynisme politique.",
"Comment Thomas Hobbes justifie-t-il l'État dans le Léviathan (1651) ?":"Hobbes (1588–1679) écrivit le Léviathan pendant la guerre civile anglaise. Son « état de nature » (« guerre de tous contre tous ») justifie un État autoritaire fort. John Locke lui répondit avec un contrat social plus libéral.",
"Qu'est-ce que le système de Bretton Woods mis en place en 1944 ?":"Bretton Woods (1944) établit le dollar comme monnaie de réserve mondiale (indexé sur l'or). Ce système s'effondra en 1971 quand Nixon suspendit la convertibilité dollar-or. Nous vivons encore dans les institutions qu'il créa.",
"Que désignent la glasnost et la perestroïka ?":"Gorbatchev lança la glasnost (transparence) et la perestroïka (restructuration) à partir de 1985. Ces réformes, destinées à moderniser l'URSS, déclenchèrent des forces centrifuges qui menèrent à la dissolution de l'URSS en 1991.",
"Qu'est-ce que le réalisme en relations internationales ?":"Le réalisme (Morgenthau, Waltz) considère que les États sont des acteurs rationnels dans un système anarchique. Hans Morgenthau, juif allemand fuyant le nazisme, développa sa théorie à l'Université de Chicago après 1945.",
"Qu'est-ce que l'équilibre de Nash en théorie des jeux ?":"John Nash (1928–2015) développa cet équilibre dans sa thèse de 27 pages en 1950. Il reçut le Nobel d'économie en 1994. Sa vie avec la schizophrénie fut racontée dans le film A Beautiful Mind (2001).",
"Quelle était la position de John Maynard Keynes concernant la politique économique ?":"Keynes (1883–1946) théorisa l'interventionnisme dans La Théorie générale (1936), réponse à la Grande Dépression. Il représenta la Grande-Bretagne à Bretton Woods en 1944. Le « New Deal » de Roosevelt fut keynésien avant la lettre.",
"Qu'est-ce que l'Habeas Corpus ?":"L'Habeas Corpus Act (1679) consolida un principe issu de la Magna Carta (1215). Il protège contre la détention arbitraire. Sa suspension dans les démocraties est considérée comme un signe de dérive autoritaire.",
"Qu'est-ce que le suffrage censitaire ?":"En France, le suffrage censitaire (1815–1848) limitait le vote à ceux payant plus de 300 francs d'impôt direct — soit 100 000 personnes sur 30 millions. Le suffrage universel masculin fut instauré en 1848.",
"Qu'est-ce que le Komintern (IIIe Internationale) fondé en 1919 ?":"Le Komintern (1919–1943) imposait aux partis communistes du monde entier de suivre la ligne de Moscou. Staline le dissout en 1943 pour rassurer ses alliés occidentaux. Il fut remplacé par le Kominform (1947–1956).",
"Que désigne le concept de « spoils system » aux États-Unis ?":"Le « spoils system » (système des dépouilles) fut popularisé par Andrew Jackson après 1829 : « To the victor belong the spoils. » Il fut partiellement réformé par les lois Pendleton (1883) créant une fonction publique non partisane.",
"Qu'est-ce que le constructivisme en relations internationales ?":"Le constructivisme (Wendt, Finnemore) s'opposa au réalisme en soulignant le rôle des idées, normes et identités. Alexander Wendt formula cette idée dans sa phrase célèbre : « L'anarchie est ce que les États en font. »",
"Quelle est la différence entre un État fédéral et un État unitaire ?":"Les États-Unis, l'Allemagne, la Suisse et l'Australie sont fédéraux. La France est unitaire (centralisé), bien que décentralisée depuis 1982. Dans un État fédéral, les entités fédérées ont leurs propres constitutions et lois.",
"Qu'est-ce que la doctrine Monroe (1823) ?":"Le président James Monroe affirma en 1823 que l'Amérique était fermée aux nouvelles colonisations européennes. Cette doctrine justifiera des interventions américaines en Amérique latine au XXe siècle.",
"Que désigne le terme « État de droit » ?":"L'État de droit (Rechtsstaat) implique que la loi s'applique à tous — gouvernants et gouvernés. C'est le fondement des démocraties libérales. Son opposé est l'État discrétionnaire où le pouvoir agit sans cadre légal.",
"Qu'est-ce que le dilemme du prisonnier en théorie des jeux appliquée à la politique internationale ?":"Ce modèle s'applique aux courses aux armements : deux pays préfèrent ne pas s'armer mais s'arment tous deux par crainte de l'autre, finissant dans une situation sous-optimale. La coopération internationale cherche à sortir de ce piège.",
"Qu'est-ce que la Convention citoyenne pour le climat, mise en place en France en 2019 ?":"La CCC réunit 150 citoyens de tous horizons tirés au sort en 2019. Elle produisit 149 propositions dont certaines furent intégrées à la loi Climat et Résilience (2021). C'est l'une des plus grandes expériences de démocratie délibérative.",
"Quelle théorie politique, associée à Friedrich Hayek, soutient que les marchés libres sont plus efficaces que la planification centrale ?":"Hayek (1899–1992) publia La Route de la servitude (1944), avertissement contre le collectivisme. Marguerite Thatcher le lisait et brandissait son œuvre. Il reçut le Nobel d'économie en 1974 qu'il partagea avec Myrdal.",
"Quels penseurs sont associés à la théorie du contrat social ?":"Hobbes (État autoritaire), Locke (État libéral protecteur des droits) et Rousseau (volonté générale) ont chacun proposé une version différente du contrat social. Ces 3 penseurs ont fondé la théorie politique moderne.",
};
